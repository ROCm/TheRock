# rocshmem
[components.lib."comm-libs/rocshmem/stage"]
include = [
  "lib/*.bc",
]
[components.run."comm-libs/rocshmem/stage"]
include = [
  "bin/rocshmem_info",
  "share/rocshmem/rocshmem_functional_driver.sh",
]
[components.dbg."comm-libs/rocshmem/stage"]
[components.dev."comm-libs/rocshmem/stage"]
include = [
  "include/**",
  "lib/*.a",
]
[components.doc."comm-libs/rocshmem/stage"]
include = [
  "share/doc/**",
]
# Tests
[components.test."comm-libs/rocshmem/stage"]
include = [
  # Install-tree CTest files: test_runner.py runs `ctest --test-dir bin/rocshmem`,
  # whose root CTestTestfile.cmake subdirs into tests/functional and tests/unit.
  "bin/rocshmem/**",
  # Test binaries. Both the functional and unit test executables install to
  # share/rocshmem/ (CMAKE_INSTALL_DATADIR). The install-tree CTestTestfile.cmake
  # invokes them via absolute install paths baked in at configure time
  # (@CMAKE_INSTALL_PREFIX@/@CMAKE_INSTALL_DATADIR@/rocshmem/rocshmem_*_tests).
  "share/rocshmem/rocshmem_functional_tests",
  "share/rocshmem/rocshmem_unit_tests",
  # CTest wrapper scripts referenced (by relative path) from the install-tree
  # CTestTestfile.cmake, plus the retry helper.
  "share/rocshmem/test_wrapper.sh",
  "share/rocshmem/unit_test_wrapper.sh",
  "share/rocshmem/ctest_with_retry.sh",
  # HSACOs used by the device_bitcode functional tests (quick tier).
  "share/rocshmem/*.hsaco",
]
optional = true
