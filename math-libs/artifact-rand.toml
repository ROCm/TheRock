# rocRAND
[components.lib."math-libs/rocRAND/stage"]
[components.dbg."math-libs/rocRAND/stage"]
[components.dev."math-libs/rocRAND/stage"]
# TODO: rocRAND's generated package config currently requires this root-level
# Fortran source tree. Keep packaging it until rocRAND fixes that install
# contract upstream.
include = [
  "rocrand/src/fortran/**",
]
[components.doc."math-libs/rocRAND/stage"]
[components.test."math-libs/rocRAND/stage"]
include = [
  "bin/test_*",
  "bin/benchmark_*",
  "bin/rocRAND/CTestTestfile.cmake"
]

