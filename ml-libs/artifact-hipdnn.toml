# hipDNN
[components.lib."ml-libs/hipDNN/stage"]
exclude = [
  "lib/libhipdnn_backend_private.a",
  "lib/test_plugins/**",
  # The hipDNN frontend Python bindings (prebuilt nanobind extension + test
  # suite) ship only via the dedicated Python wheel, not the shared-library
  # tarball. The prebuilt .so carries a CI-only RPATH, so it is not a
  # user-loadable library here.
  # See https://github.com/ROCm/TheRock/issues/5678
  "share/hipdnn/python/**",
]
[components.run."ml-libs/hipDNN/stage"]
include = [
  "bin/hipdnn_list_engines*",
]
[components.dbg."ml-libs/hipDNN/stage"]
[components.dev."ml-libs/hipDNN/stage"]
exclude = [
  # The hipDNN frontend Python bindings (prebuilt nanobind extension + test
  # suite) ship only via the dedicated Python wheel, not the devel component.
  # The prebuilt .so carries a CI-only RPATH, so `rocm-sdk test` cannot load
  # it from here.
  # See https://github.com/ROCm/TheRock/issues/5678
  "share/hipdnn/python/**",
]
[components.doc."ml-libs/hipDNN/stage"]
[components.test."ml-libs/hipDNN/stage"]
include = [
  "bin/*hipdnn_*_test*",
  "bin/hipdnn/CTestTestfile.cmake",
  "lib/test_plugins/**",
]
# Exclude python frontend from the test artifact; ships with a dead CI RPATH
# and is ABI-locked to cp312. See https://github.com/ROCm/TheRock/issues/5678
# Needed because single-arch builds don't exclude test artifacts (multi-arch
# does); remove this once single-arch is removed.
exclude = [
  "share/hipdnn/python/**",
]
