# hipDNN
[components.lib."ml-libs/hipDNN/stage"]
exclude = [
  "lib/libhipdnn_backend_private.a",
  "lib/test_plugins/**",
  # The Python bindings ship only via the test artifact and the dedicated
  # wheel, never the runtime tree: the package source
  # (lib/python/hipdnn_frontend/__init__.py), the pytest suite
  # (lib/python/tests/*.py), and the compiled extension
  # (hipdnn_frontend_python.* in lib/ on Linux, bin/ on Windows) are all
  # excluded here.
  "lib/python/hipdnn_frontend/**",
  "lib/python/tests/**",
  "lib/hipdnn_frontend_python*",
  "bin/hipdnn_frontend_python*",
]
[components.run."ml-libs/hipDNN/stage"]
include = [
  "bin/hipdnn_list_engines*",
]
[components.dbg."ml-libs/hipDNN/stage"]
[components.dev."ml-libs/hipDNN/stage"]
exclude = [
  # The Python bindings ship only via the test artifact and the wheel, never
  # the devel tree: the package source
  # (lib/python/hipdnn_frontend/__init__.py), the pytest suite
  # (lib/python/tests/*.py), and the compiled extension
  # (hipdnn_frontend_python.* in lib/ on Linux, bin/ on Windows) are all
  # excluded here.
  "lib/python/hipdnn_frontend/**",
  "lib/python/tests/**",
  "lib/hipdnn_frontend_python*",
  "bin/hipdnn_frontend_python*",
]
[components.doc."ml-libs/hipDNN/stage"]
[components.test."ml-libs/hipDNN/stage"]
include = [
  "bin/*hipdnn_*_test*",
  "bin/hipdnn/CTestTestfile.cmake",
  "lib/test_plugins/**",
  # Python package source (__init__.py) staged into the wheel at pack time.
  "lib/python/hipdnn_frontend/**/*.py",
  # pytest suite run against the installed wheel.
  "lib/python/tests/**/*.py",
  # Compiled extension (Linux lib/, Windows bin/): reunited with __init__.py
  # into the wheel by the test, and the sole place it ships.
  "lib/hipdnn_frontend_python*",
  "bin/hipdnn_frontend_python*",
]
