# hipDNN
[components.lib."ml-libs/hipDNN/stage"]
exclude = [
  "lib/libhipdnn_backend_private.a",
  "lib/test_plugins/**",
  # Python bindings (package, tests, extension) ship via the test artifact and
  # the wheel only, never the runtime tree.
  "lib/python/hipdnn_frontend/__init__.py",
  "lib/python/tests/**/*.py",
  "lib/hipdnn_frontend_python.abi3.so",
  "bin/hipdnn_frontend_python.pyd",
]
[components.run."ml-libs/hipDNN/stage"]
include = [
  "bin/hipdnn_list_engines*",
]
[components.dbg."ml-libs/hipDNN/stage"]
[components.dev."ml-libs/hipDNN/stage"]
exclude = [
  # Python bindings (package, tests, extension) ship via the test artifact and
  # the wheel only, never the devel tree.
  "lib/python/hipdnn_frontend/__init__.py",
  "lib/python/tests/**/*.py",
  "lib/hipdnn_frontend_python.abi3.so",
  "bin/hipdnn_frontend_python.pyd",
]
[components.doc."ml-libs/hipDNN/stage"]
[components.test."ml-libs/hipDNN/stage"]
include = [
  "bin/*hipdnn_*_test*",
  "bin/hipdnn/CTestTestfile.cmake",
  "lib/test_plugins/**",
  # Python bindings: package source, pytest suite, and the extension. The
  # extension sits apart (as a libhipdnn_backend sibling); the test's
  # stage_package step reunites it with __init__.py into the wheel.
  "lib/python/hipdnn_frontend/__init__.py",
  "lib/python/tests/**/*.py",
  "lib/hipdnn_frontend_python.abi3.so",
  "bin/hipdnn_frontend_python.pyd",
]
