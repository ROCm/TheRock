# hipkernelprovider
[components.dbg."ml-libs/hipkernelprovider/stage"]
[components.lib."ml-libs/hipkernelprovider/stage"]
# The default lib component captures the shared-library plugins (*.so/*.dll).
# rocKE's per-arch AOT bundles (kpack + JSON sidecar + heuristics) are not shared
# libraries, so include the generic per-arch container explicitly. It splits
# per-arch via BUILD_TOPOLOGY split_databases = ["hipkernelprovider"] (handler
# anchors on the engines/arch_content dir), and it is deliberately NOT under
# engines/hip_kernel_provider/, whose name would collide with the
# hip_kernel_provider plugin file and shadow it from hipDNN's plugin loader.
# Future engines (aiter, asm) drop under arch_content/<engine>/ with no changes.
# NOTE: the rocKE Python SDK (bin/hip_kernel_provider/rocke/**) is dev/test
# content captured by the [test] component below; it is intentionally NOT shipped
# in the runtime lib artifact.
include = [
  "**/engines/arch_content/**",
]
exclude = [
  "lib/*.a",
]
[components.test."ml-libs/hipkernelprovider/stage"]
include = [
  "bin/hip_kernel_provider*_test*",
  "bin/hip_kernel_provider/CTestTestfile.cmake",
  # Test config TOMLs (e.g. HIP_KERNEL_ENGINE.toml) consumed by the cross-provider
  # integration suite (hipdnn_integration_tests --test-config).
  "bin/hip_kernel_provider/*.toml",
  # rocKE IR parity gate: Python test scripts, harness, golden data, and the
  # rocke Python package they import.
  "bin/hip_kernel_provider/*.py",
  "bin/hip_kernel_provider/golden/**",
  "bin/hip_kernel_provider/rocke/**",
  # rocKE pytest suite
  "bin/hip_kernel_provider/tests/**",
]
