[options]
unmatched_exclude = [
  # The LLVM install also emits per config CMake objects directories. These
  # are ok to ignore.
  "lib/llvm/lib/objects-*/**",

  # Various docs or utilities we don't care about.
  "lib/llvm/share/clang-doc/**",
  "lib/llvm/share/clang/**",
]

# LLVM deviates from the defaults in some key ways:
#   lib/llvm/clang : Contains a prefix like tree that must always be
#     accessible for library use, regardless of file type/association
#     (and should be excluded from other components).
[components.lib."compiler/amd-llvm/stage"]
include = [
  "lib/llvm/amdgcn/**",
  "lib/llvm/lib/*.bc",
  "lib/llvm/lib/*.ll",
  "lib/llvm/lib/*.modules.json",
  "lib/llvm/include/c++/**",
]
force_include = [
  "lib/llvm/lib/clang/**",
]
[components.run."compiler/amd-llvm/stage"]
include = [
  "lib/llvm/bin/**",
  "lib/llvm/libexec/**",
  "lib/llvm/hip/**",
]
exclude = [
  "lib/llvm/lib/clang/**",
]
[components.dbg."compiler/amd-llvm/stage"]
[components.dev."compiler/amd-llvm/stage"]
include = [
  "lib/llvm/share/libc++/**",
]
exclude = [
  "lib/llvm/lib/clang/**",
]
[components.doc."compiler/amd-llvm/stage"]

# comgr and hipcc are considered part of the LLVM artifact (they are separated
# in the build tree because they need to be built separately in order to
# install to different prefixes).
[components.lib."compiler/amd-comgr/stage"]
[components.run."compiler/amd-comgr/stage"]
[components.dbg."compiler/amd-comgr/stage"]
[components.dev."compiler/amd-comgr/stage"]
[components.doc."compiler/amd-comgr/stage"]

# LLVM/Clang/LLD lit test configurations, test tool binaries, plugin shared
# libraries, and unit test (gtest) binaries from the build tree.
# Lit site configs contain build-time paths fixed up by the test script.
# Example binaries are installed to stage/bin/ and shipped by amd-llvm_run.
[components.test."compiler/amd-llvm/build"]
include = [
  # Lit site configs
  "test/lit.site.cfg.py",
  "test/lit.local.cfg",
  "test/Unit/lit.site.cfg.py",
  "tools/clang/test/lit.site.cfg.py",
  "tools/clang/test/lit.local.cfg",
  "tools/clang/test/Unit/lit.site.cfg.py",
  "tools/lld/test/lit.site.cfg.py",
  "tools/lld/test/lit.local.cfg",
  "tools/lld/test/Unit/lit.site.cfg.py",

  # Fuzzers and test tools (no install rules in upstream LLVM)
  "bin/llvm-isel-fuzzer*",
  "bin/llvm-opt-fuzzer*",
  "bin/apinotes-test*",
  "bin/clang-import-test*",
  "bin/clang-fuzzer*",

  # Plugin shared libraries (MODULE targets, not installed by default)
  "lib/Bye.*",
  "lib/ExampleIRTransforms.*",
  "lib/PrintFunctionNames.*",
  "lib/LLVMPrintFunctionNames.*",
  "lib/AnnotateFunctions.*",
  "lib/Attribute.*",
  "lib/CallSuperAttribute.*",
  "lib/PluginsOrder.*",

  # Unit test binaries (gtest)
  "unittests/**",
  "tools/clang/unittests/**",
  "tools/lld/unittests/**",
]

# hipcc
[components.lib."compiler/hipcc/stage"]
[components.run."compiler/hipcc/stage"]
[components.dbg."compiler/hipcc/stage"]
[components.dev."compiler/hipcc/stage"]
[components.doc."compiler/hipcc/stage"]
