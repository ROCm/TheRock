[options]
unmatched_exclude = [
  # The LLVM install also emits per config CMake objects directories. These
  # are ok to ignore.
  "lib/llvm/lib/objects-*/**",

  # Various docs or utilities we don't care about.
  "lib/llvm/share/clang-doc/**",
  "lib/llvm/share/clang/**",
]

# LLVM deviates from the defaults in some key ways:
#   lib/llvm/clang : Contains a prefix like tree that must always be
#     accessible for library use, regardless of file type/association
#     (and should be excluded from other components).
[components.lib."compiler/amd-llvm/stage"]
include = [
  "lib/llvm/amdgcn/**",
  "lib/llvm/lib/*.bc",
  "lib/llvm/lib/*.ll",
  "lib/llvm/lib/*.modules.json",
  "lib/llvm/include/c++/**",
]
force_include = [
  "lib/llvm/lib/clang/**",
]

# All tools go to run by default. Test-only tools (those built exclusively
# when LLVM tests are enabled) are excluded below and fall through to the
# test component via the extends chain. This blacklist approach fails safe:
# new upstream tools default to run (larger artifact is acceptable; a missing
# production tool is not).
[components.run."compiler/amd-llvm/stage"]
include = [
  "lib/llvm/bin/**",
  "lib/llvm/libexec/**",
  "lib/llvm/hip/**",
]
exclude = [
  "lib/llvm/lib/clang/**",

  # -- LIT test infrastructure utilities --
  "lib/llvm/bin/count*",
  "lib/llvm/bin/FileCheck*",
  "lib/llvm/bin/not",
  "lib/llvm/bin/not.exe",
  "lib/llvm/bin/split-file*",
  "lib/llvm/bin/UnicodeNameMappingGenerator*",
  "lib/llvm/bin/verify-uselistorder*",
  "lib/llvm/bin/yaml-bench*",

  # -- Clang test-only tools --
  "lib/llvm/bin/c-index-test*",
  "lib/llvm/bin/clang-check*",
  "lib/llvm/bin/clang-diff*",
  "lib/llvm/bin/clang-extdef-mapping*",
  "lib/llvm/bin/clang-format*",
  "lib/llvm/bin/clang-fuzzer*",
  "lib/llvm/bin/clang-import-test*",
  "lib/llvm/bin/clang-installapi*",
  "lib/llvm/bin/clang-nvlink-wrapper*",
  "lib/llvm/bin/clang-refactor*",
  "lib/llvm/bin/clang-repl*",
  # clang-scan-deps is NOT excluded: it is a production tool on Windows
  # (added to _clang_required_tools when WIN32).
  "lib/llvm/bin/clang-ssaf-linker*",
  "lib/llvm/bin/clang-sycl-linker*",
  "lib/llvm/bin/diagtool*",
  "lib/llvm/bin/git-clang-format*",
  "lib/llvm/bin/ssaf-format*",

  # -- LLVM test-only tools --
  "lib/llvm/bin/llc",
  "lib/llvm/bin/llc.exe",
  "lib/llvm/bin/lli",
  "lib/llvm/bin/lli.exe",
  "lib/llvm/bin/lli-child-target*",
  "lib/llvm/bin/llubi*",
  "lib/llvm/bin/llvm-bcanalyzer*",
  "lib/llvm/bin/llvm-cas*",
  "lib/llvm/bin/llvm-cat*",
  "lib/llvm/bin/llvm-cfi-verify*",
  "lib/llvm/bin/llvm-cgdata*",
  "lib/llvm/bin/llvm-cov*",
  "lib/llvm/bin/llvm-c-test*",
  "lib/llvm/bin/llvm-ctxprof-util*",
  "lib/llvm/bin/llvm-cvtres*",
  "lib/llvm/bin/llvm-cxx*",
  "lib/llvm/bin/llvm-debuginfo-analyzer*",
  "lib/llvm/bin/llvm-debuginfod*",
  "lib/llvm/bin/llvm-diff*",
  "lib/llvm/bin/llvm-dwarfutil*",
  "lib/llvm/bin/llvm-dwp*",
  "lib/llvm/bin/llvm-exegesis*",
  "lib/llvm/bin/llvm-extract*",
  "lib/llvm/bin/llvm-gpu-loader*",
  "lib/llvm/bin/llvm-gsymutil*",
  "lib/llvm/bin/llvm-ifs*",
  "lib/llvm/bin/llvm-ir2vec*",
  "lib/llvm/bin/llvm-jitlink*",
  "lib/llvm/bin/llvm-libtool-darwin*",
  "lib/llvm/bin/llvm-lipo*",
  "lib/llvm/bin/llvm-lto*",
  "lib/llvm/bin/llvm-mca*",
  "lib/llvm/bin/llvm-ml*",
  "lib/llvm/bin/llvm-modextract*",
  "lib/llvm/bin/llvm-offload-wrapper*",
  "lib/llvm/bin/llvm-opt-report*",
  "lib/llvm/bin/llvm-pdbutil*",
  "lib/llvm/bin/llvm-PerfectShuffle*",
  "lib/llvm/bin/llvm-profdata*",
  "lib/llvm/bin/llvm-profgen*",
  "lib/llvm/bin/llvm-rc*",
  "lib/llvm/bin/llvm-readtapi*",
  "lib/llvm/bin/llvm-reduce*",
  "lib/llvm/bin/llvm-remarkutil*",
  "lib/llvm/bin/llvm-rtdyld*",
  "lib/llvm/bin/llvm-sim*",
  "lib/llvm/bin/llvm-size*",
  "lib/llvm/bin/llvm-split*",
  "lib/llvm/bin/llvm-stress*",
  "lib/llvm/bin/llvm-strings*",
  "lib/llvm/bin/llvm-test-mustache-spec*",
  "lib/llvm/bin/llvm-tli-checker*",
  "lib/llvm/bin/llvm-undname*",
  "lib/llvm/bin/llvm-windres*",
  "lib/llvm/bin/llvm-xray*",

  # -- MLIR test-only tools --
  "lib/llvm/bin/mlir-cat*",
  "lib/llvm/bin/mlir-minimal-opt*",
  "lib/llvm/bin/mlir-transform-opt*",

  # -- Other test-only tools --
  "lib/llvm/bin/dsymutil*",
  "lib/llvm/bin/obj2yaml*",
  "lib/llvm/bin/reduce-chunk-list*",
  "lib/llvm/bin/sancov*",
  "lib/llvm/bin/sanstats*",
  "lib/llvm/bin/yaml2obj*",
]
[components.dbg."compiler/amd-llvm/stage"]
[components.dev."compiler/amd-llvm/stage"]
include = [
  "lib/llvm/share/libc++/**",
]
exclude = [
  "lib/llvm/lib/clang/**",
]
[components.doc."compiler/amd-llvm/stage"]

# Test-only tools (everything in bin/ not claimed by the run component).
[components.test."compiler/amd-llvm/stage"]
include = [
  "lib/llvm/bin/**",
]

# comgr and hipcc are considered part of the LLVM artifact (they are separated
# in the build tree because they need to be built separately in order to
# install to different prefixes).
[components.lib."compiler/amd-comgr/stage"]
[components.run."compiler/amd-comgr/stage"]
[components.dbg."compiler/amd-comgr/stage"]
[components.dev."compiler/amd-comgr/stage"]
[components.doc."compiler/amd-comgr/stage"]

# hipcc
[components.lib."compiler/hipcc/stage"]
[components.run."compiler/hipcc/stage"]
[components.dbg."compiler/hipcc/stage"]
[components.dev."compiler/hipcc/stage"]
[components.doc."compiler/hipcc/stage"]
