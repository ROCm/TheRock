name: Build Multi-Arch Native Linux Packages

on:
  workflow_call:
    inputs:
      dist_amdgpu_families:
        description: "Semicolon-separated list of all GPU families (e.g., 'gfx94X-dcgpu;gfx120X-all')"
        required: true
        type: string
      artifact_run_id:
        description: "Workflow run id to download the artifacts from"
        required: true
        type: string
      rocm_version:
        description: "ROCm version to append to the package (8.0.0, 8.0.1rc1, ...)"
        required: true
        type: string
      native_package_type:
        description: "Package type (deb or rpm)"
        required: true
        type: string
      package_suffix:
        description: "The suffix to be added to package name (asan, tsan, static or rpath)"
        required: false
        type: string
        default: ""
      release_type:
        description: "The type of release to build ('dev', 'nightly', or 'release'). Empty string for CI builds."
        required: false
        type: string
        default: ""
      repository:
        description: "Repository to checkout. Otherwise, defaults to `github.repository`"
        type: string
        required: false
      ref:
        description: "Branch, tag or SHA to checkout. Defaults to the reference or SHA that triggered the workflow"
        type: string
        required: false

permissions:
  id-token: write
  contents: read

run-name: Build multi-arch native Linux packages (${{ inputs.dist_amdgpu_families }}, ${{ inputs.rocm_version }}, ${{ inputs.native_package_type }}, ${{ inputs.release_type }})

jobs:
  build_native_packages:
    name: Build ${{ inputs.native_package_type }} packages
    strategy:
      fail-fast: false
    runs-on: ${{ github.repository_owner == 'ROCm' && 'azure-linux-scale-rocm' || 'ubuntu-24.04' }}
    env:
      ARTIFACT_RUN_ID: ${{ inputs.artifact_run_id }}
      DIST_AMDGPU_FAMILIES: ${{ inputs.dist_amdgpu_families }}
      PACKAGE_SUFFIX: ${{ inputs.package_suffix }}
      OUTPUT_DIR: ${{ github.workspace }}/output
      ARTIFACTS_DIR: ${{ github.workspace }}/output/artifacts
      PACKAGE_DIST_DIR: ${{ github.workspace }}/output/packages
      RELEASE_TYPE: ${{ inputs.release_type }}
    steps:
      - name: "Checking out repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || '' }}

      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: '3.12'

      - name: Install Python requirements
        run: |
          pip install pyelftools boto3 jinja2

      - name: Install System requirements
        run: |
          # Install the needed tools for creating rpm / deb packages
          # Also install tools for creating repo files
          sudo apt update
          sudo apt install -y llvm
          sudo apt install -y rpm debhelper-compat build-essential
          sudo apt install -y dpkg-dev createrepo-c

      - name: Determine S3 bucket and prefix
        id: s3_config
        run: |
          # ================================================================
          # S3 Bucket Selection Logic
          # ================================================================
          # Determines which S3 bucket and prefix to use based on:
          #   1. release_type input (dev/nightly/prerelease/release)
          #   2. Repository name (ROCm/TheRock, ROCm/therock-releases-internal, etc.)
          #   3. Whether this is a fork PR
          #
          # Decision Tree:
          #   ├─ IF release_type is set (dev/nightly/prerelease/release)
          #   │  └─ Use: therock-${release_type}-packages bucket
          #   │     ├─ prerelease/release → prefix: v3/packages/<pkg_type>
          #   │     └─ dev/nightly → prefix: v3/packages/<pkg_type>/<YYYYMMDD>-<artifact_id>
          #   │
          #   ├─ ELSE IF repository is "ROCm/therock-releases-internal"
          #   │  └─ Use: therock-artifacts-internal bucket (internal releases)
          #   │     └─ prefix: v3/packages/<pkg_type>/<YYYYMMDD>-<artifact_id>
          #   │
          #   ├─ ELSE IF fork PR OR non-ROCm/TheRock repository
          #   │  └─ Use: therock-ci-artifacts-external bucket (external CI)
          #   │     └─ prefix: v3/packages/<pkg_type>/<YYYYMMDD>-<artifact_id>
          #   │
          #   └─ ELSE (default: ROCm/TheRock non-fork)
          #      └─ Use: therock-ci-artifacts bucket (internal CI)
          #         └─ prefix: v3/packages/<pkg_type>/<YYYYMMDD>-<artifact_id>
          # ================================================================

          RELEASE_TYPE="${{ env.RELEASE_TYPE }}"
          GITHUB_REPO="${{ github.repository }}"
          IS_FORK="${{ github.event.pull_request.head.repo.fork || 'false' }}"
          PKG_TYPE="${{ inputs.native_package_type }}"
          ARTIFACT_ID="${{ env.ARTIFACT_RUN_ID }}"
          YYYYMMDD=$(date +%Y%m%d)

          # Branch 1: Release-type-specific package buckets (dev/nightly/prerelease/release)
          if [[ -n "${RELEASE_TYPE}" && "${RELEASE_TYPE}" != "" ]]; then
            S3_BUCKET="therock-${RELEASE_TYPE}-packages"

            if [[ "${RELEASE_TYPE}" == "prerelease" || "${RELEASE_TYPE}" == "release" ]]; then
              # Prerelease/Release packages go to stable prefix (no date subfolder)
              S3_PREFIX="v3/packages/${PKG_TYPE}"
              JOB_TYPE="${RELEASE_TYPE}"
            else
              # Dev/Nightly packages go to dated subfolder for versioning
              S3_PREFIX="v3/packages/${PKG_TYPE}/${YYYYMMDD}-${ARTIFACT_ID}"
              JOB_TYPE="${RELEASE_TYPE}"
            fi
            echo "✓ Using release-type bucket: ${S3_BUCKET}"

          # Branch 2: Internal releases repository
          elif [[ "${GITHUB_REPO}" == "ROCm/therock-releases-internal" ]]; then
            S3_BUCKET="therock-artifacts-internal"
            S3_PREFIX="v3/packages/${PKG_TYPE}/${YYYYMMDD}-${ARTIFACT_ID}"
            JOB_TYPE="ci"
            echo "✓ Using internal releases bucket: ${S3_BUCKET}"

          # Branch 3: Fork PRs or external repositories
          elif [[ "${IS_FORK}" == "true" || "${GITHUB_REPO}" != "ROCm/TheRock" ]]; then
            S3_BUCKET="therock-ci-artifacts-external"
            S3_PREFIX="v3/packages/${PKG_TYPE}/${YYYYMMDD}-${ARTIFACT_ID}"
            JOB_TYPE="ci"
            echo "✓ Using external bucket: ${S3_BUCKET}"

          # Branch 4: Default - ROCm/TheRock non-fork (normal CI builds)
          else
            S3_BUCKET="therock-ci-artifacts"
            S3_PREFIX="v3/packages/${PKG_TYPE}/${YYYYMMDD}-${ARTIFACT_ID}"
            JOB_TYPE="ci"
            echo "✓ Using default CI bucket: ${S3_BUCKET}"
          fi

          echo "S3 bucket: ${S3_BUCKET}"
          echo "S3 prefix: ${S3_PREFIX}"
          echo "Job type: ${JOB_TYPE}"

          echo "s3_bucket=${S3_BUCKET}" >> $GITHUB_OUTPUT
          echo "s3_prefix=${S3_PREFIX}" >> $GITHUB_OUTPUT
          echo "job_type=${JOB_TYPE}" >> $GITHUB_OUTPUT

      - name: Determine IAM role
        id: iam_role
        run: |
          # ================================================================
          # IAM Role Selection Logic
          # ================================================================
          # Determines which AWS IAM role to assume based on job_type from s3_config step.
          #
          # Role Mapping:
          #   ├─ IF job_type == "ci"
          #   │  └─ Use: therock-ci role
          #   │     (For all CI artifact buckets: therock-ci-artifacts, therock-ci-artifacts-external, therock-artifacts-internal)
          #   │
          #   └─ ELSE (job_type == dev/nightly/prerelease/release)
          #      └─ Use: therock-${job_type} role
          #         (For release package buckets: therock-dev-packages, therock-nightly-packages, etc.)
          #
          # Examples:
          #   job_type="ci"         → role/therock-ci
          #   job_type="dev"        → role/therock-dev
          #   job_type="nightly"    → role/therock-nightly
          #   job_type="prerelease" → role/therock-prerelease
          #   job_type="release"    → role/therock-release
          # ================================================================

          JOB_TYPE="${{ steps.s3_config.outputs.job_type }}"

          if [[ "${JOB_TYPE}" == "ci" ]]; then
            # CI builds use the shared CI role (for all artifact buckets)
            IAM_ROLE="arn:aws:iam::692859939525:role/therock-ci"
            echo "✓ Using CI role: ${IAM_ROLE}"
          else
            # Release builds use release-type-specific roles (for package buckets)
            IAM_ROLE="arn:aws:iam::692859939525:role/therock-${JOB_TYPE}"
            echo "✓ Using release-type role: ${IAM_ROLE}"
          fi

          echo "iam_role=${IAM_ROLE}" >> $GITHUB_OUTPUT

      - name: Fetch Artifacts for all GPU families
        run: |
          echo "Fetching artifacts for build ${{ env.ARTIFACT_RUN_ID }}"
          echo "GPU families: ${{ env.DIST_AMDGPU_FAMILIES }}"

          # Convert semicolon-separated list to array using parameter expansion
          FAMILIES=(${DIST_AMDGPU_FAMILIES//;/ })

          # Create artifacts directory
          mkdir -p "${{ env.ARTIFACTS_DIR }}"

          # Download artifacts for each family to the same output directory
          # Artifact filenames are unique per family (e.g., blas_lib_gfx94X.tar.zst)
          # so they won't conflict
          for family in "${FAMILIES[@]}"; do
            echo "Fetching artifacts for family: ${family}"
            python ./build_tools/fetch_artifacts.py \
              --run-id=${{ env.ARTIFACT_RUN_ID }} \
              --run-github-repo=${{ github.repository }} \
              --artifact-group="${family}" \
              --output-dir="${{ env.ARTIFACTS_DIR }}"
          done

          echo "Fetched artifacts:"
          ls -lh "${{ env.ARTIFACTS_DIR }}" || echo "No artifacts found"

      - name: Build Packages
        id: build-packages
        run: |
          echo "Building ${{ inputs.native_package_type }} packages for all GPU families"
          echo "Families: ${{ env.DIST_AMDGPU_FAMILIES }}"

          # Pass the target families as-is (semicolon-separated)
          # build_package.py's normalize_target_list() handles all separators
          python ./build_tools/packaging/linux/build_package.py \
            --dest-dir ${{ env.PACKAGE_DIST_DIR }} \
            --rocm-version  ${{ inputs.rocm_version }} \
            --target "${{ env.DIST_AMDGPU_FAMILIES }}" \
            --artifacts-dir ${{ env.ARTIFACTS_DIR }} \
            --pkg-type ${{ inputs.native_package_type }} \
            --version-suffix ${{ env.ARTIFACT_RUN_ID }} \
            --enable-multi-arch

      - name: Install AWS CLI
        run: bash ./dockerfiles/install_awscli.sh

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          aws-region: us-east-2
          role-to-assume: ${{ steps.iam_role.outputs.iam_role }}

      - name: Upload Package repo to S3
        id: upload-packages
        run: |
          echo "Uploading to S3 bucket: ${{ steps.s3_config.outputs.s3_bucket }}"
          echo "Using prefix: ${{ steps.s3_config.outputs.s3_prefix }}"
          echo "Job type: ${{ steps.s3_config.outputs.job_type }}"

          python ./build_tools/packaging/linux/upload_package_repo.py \
            --pkg-type ${{ inputs.native_package_type }} \
            --s3-bucket ${{ steps.s3_config.outputs.s3_bucket }} \
            --artifact-id ${{ env.ARTIFACT_RUN_ID }} \
            --job ${{ steps.s3_config.outputs.job_type }} \
            --s3-prefix "${{ steps.s3_config.outputs.s3_prefix }}"
