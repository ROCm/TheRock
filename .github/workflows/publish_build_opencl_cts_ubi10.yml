name: Publish build_opencl_cts_ubi10 image
on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
      - 'stage/docker/**'
    paths:
      - dockerfiles/build_opencl_cts_ubi10.Dockerfile
      - dockerfiles/no_rocm_image_ubi10.Dockerfile
      - .github/workflows/publish_build_opencl_cts_ubi10.yml

permissions:
  contents: read
  packages: write

jobs:
  publish_build_opencl_cts_ubi10:
    uses: ./.github/workflows/publish_dockerfile.yml
    with:
      DOCKER_FILE_NAME: build_opencl_cts_ubi10
      DOCKER_IMAGE_NAME: build_opencl_cts_ubi10
