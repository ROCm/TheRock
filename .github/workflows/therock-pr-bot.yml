name: TheRock PR Bot

on:
  workflow_dispatch:
  pull_request:
    branches: [ main, pr-bot-test ]
    types:
      [
        opened,
        synchronize,
        reopened,
        ready_for_review,
        edited,
      ]

permissions:
  contents: read
  pull-requests: write
  issues: write    # required for adding/removing labels on PRs
  checks: read
  security-events: read  # required for Code Scanning alerts API

jobs:
  policy:
    name: therock-pr-bot
    runs-on: ubuntu-24.04
    steps:
      # Checkout the BASE repo's default branch (NOT the PR head). This ensures
      # we run OUR policy_check.py / policy.yml, never the fork's version.
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Create a short-lived GitHub App installation token
      - name: Create GitHub App token (TheRock PR Bot)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.THEROCK_PR_BOT_APPID }}
          private-key: ${{ secrets.THEROCK_PRBOT_KEY }}

      - name: Install deps
        run: python -m pip install --upgrade pip requests pyyaml

      # Full policy check + wait for required checks.
      - name: Enforce policy (waits for required checks like pre-commit)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: python .github/therock_pr_bot/policy_check.py --timeout-seconds 900 --poll-seconds 15
