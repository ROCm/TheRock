name: Bump IREE libs submodules

on:
  workflow_dispatch:
  schedule:
    # Weekdays at 12:00 UTC (04:00 PST / 05:00 PDT), same as fusilli.
    # Reads whatever iree-version is on fusilli main at the time.
    - cron: "0 12 * * 1-5"

permissions:
  contents: write
  pull-requests: write

jobs:

  bump-iree-libs:
    # Only run scheduled workflows on the main repo, not forks.
    if: github.repository_owner == 'ROCm' || github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Bump dependency versions
        run: python3 build_tools/github_actions/bump_iree_libs.py

      # App token so the created PR triggers CI (GITHUB_TOKEN cannot).
      - name: Generate GitHub App token
        if: env.VERSIONS_CHANGED == 'true'
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: generate-token
        with:
          app-id: ${{ secrets.IREE_LIBS_BUMP_APP_ID }}
          private-key: ${{ secrets.IREE_LIBS_BUMP_APP_PRIVATE_KEY }}

      - name: Create pull request
        if: env.VERSIONS_CHANGED == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ steps.generate-token.outputs.token }}
          base: main
          # Static branch name: if a PR is already open, peter-evans
          # updates it in place (new commit, title, and body) rather
          # than creating a duplicate.
          branch: bump-iree-libs
          author: "therockbot <therockbot@amd.com>"
          committer: "therockbot <therockbot@amd.com>"
          delete-branch: true
          title: "Bump IREE libs: IREE to `iree-${{ env.LATEST_IREE_VERSION }}`, fusilli to `${{ env.LATEST_FUSILLI_SHA }}`"
          commit-message: |
            Bump IREE libs: IREE to iree-${{ env.LATEST_IREE_VERSION }}, fusilli to ${{ env.LATEST_FUSILLI_SHA }}

            IREE: ${{ env.CURRENT_IREE_SHA }} -> ${{ env.LATEST_IREE_SHA }} (tag iree-${{ env.LATEST_IREE_VERSION }})
            Fusilli: ${{ env.CURRENT_FUSILLI_SHA }} -> ${{ env.LATEST_FUSILLI_SHA }}
          body: |
            ## Summary
            Automated daily bump of IREE libs submodules.

            IREE version is pinned to the tag declared in
            [fusilli's `version.json`](https://github.com/iree-org/fusilli/blob/main/version.json).

            | Submodule | Old | New |
            |-----------|-----|-----|
            | iree-libs/iree | `${{ env.CURRENT_IREE_SHA }}` | `${{ env.LATEST_IREE_SHA }}` (tag `iree-${{ env.LATEST_IREE_VERSION }}`) |
            | iree-libs/fusilli | `${{ env.CURRENT_FUSILLI_SHA }}` | `${{ env.LATEST_FUSILLI_SHA }}` |

            **IREE diff**: https://github.com/iree-org/iree/compare/${{ env.CURRENT_IREE_SHA }}...${{ env.LATEST_IREE_SHA }}
            **Fusilli diff**: https://github.com/iree-org/fusilli/compare/${{ env.CURRENT_FUSILLI_SHA }}...${{ env.LATEST_FUSILLI_SHA }}

            Auto-generated by [`bump_iree_libs.yml`](https://github.com/${{ github.repository }}/blob/main/.github/workflows/bump_iree_libs.yml).

      - name: Write summary
        if: steps.cpr.outputs.pull-request-number
        run: |
          echo "### IREE Libs Bump PR Created" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "PR: ${{ steps.cpr.outputs.pull-request-url }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Submodule | Old | New |" >> "${GITHUB_STEP_SUMMARY}"
          echo "|-----------|-----|-----|" >> "${GITHUB_STEP_SUMMARY}"
          echo "| iree-libs/iree | \`${CURRENT_IREE_SHA}\` | \`${LATEST_IREE_SHA}\` (tag iree-${LATEST_IREE_VERSION}) |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| iree-libs/fusilli | \`${CURRENT_FUSILLI_SHA}\` | \`${LATEST_FUSILLI_SHA}\` |" >> "${GITHUB_STEP_SUMMARY}"
