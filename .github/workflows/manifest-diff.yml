name: Manifest Diff Report

on:
  push:
    branches:
      - amd/hsivasun/add-manifest-diff-workflow
  workflow_dispatch:
    inputs:
      start_commit:
        description: 'Start Commit SHA or Workflow Run ID (required when using workflow mode or commit SHA mode without find-last-successful)'
        required: false
        type: string
      end_commit:
        description: 'End Commit SHA or Workflow Run ID'
        required: true
        type: string
      workflow_mode:
        description: 'Treat inputs as workflow run IDs instead of commit SHAs'
        required: false
        type: boolean
        default: false
      find_last_successful:
        description: 'Workflow file to find last successful run (e.g., ci_nightly.yml)'
        required: false
        type: string
  workflow_call:
    inputs:
      start_commit:
        required: false
        type: string
      end_commit:
        required: true
        type: string
      workflow_mode:
        required: false
        type: boolean
        default: false
      find_last_successful:
        required: false
        type: string

permissions:
  contents: read

jobs:
  generate-report:
    name: Generate Manifest Diff Report
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # On push: test Case 1 (find-last-successful + workflow mode; end = current run ID)
      - name: Generate manifest diff report
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 build_tools/generate_manifest_diff_report.py \
            --end "${{ github.event_name == 'push' && github.run_id || inputs.end_commit }}" \
            --start "${{ inputs.start_commit || '' }}" \
            --find-last-successful "${{ github.event_name == 'push' && 'ci_nightly.yml' || (inputs.find_last_successful || '') }}" \
            ${{ (github.event_name == 'push' || inputs.workflow_mode) && '--workflow-mode' || '' }} \
            --output-dir reports

      - name: Configure AWS Credentials
        if: ${{ !cancelled() && (github.event_name == 'push' || inputs.find_last_successful || inputs.start_commit) && (github.event.pull_request == null || !github.event.pull_request.head.repo.fork) }}
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          aws-region: us-east-2
          role-to-assume: arn:aws:iam::692859939525:role/therock-ci

      - name: Upload Report to S3
        if: ${{ !cancelled() && (github.event_name == 'push' || inputs.find_last_successful || inputs.start_commit) && (github.event.pull_request == null || !github.event.pull_request.head.repo.fork) }}
        run: |
          python3 build_tools/github_actions/upload_test_report_script.py \
            --run-id ${{ github.run_id }} \
            --amdgpu-family manifest-diff \
            --report-path reports \
            --log-destination logs/manifest-diff \
            --index-file-name index.html
