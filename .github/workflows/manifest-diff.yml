name: TheRock Manifest Diff Report

on:
  workflow_dispatch:
    inputs:
      start_ref:
        description: 'Start commit SHA or workflow run ID (required when using workflow mode or commit SHA mode without find-last-run / pr-base-ref)'
        required: false
        type: string
      end_ref:
        description: 'End commit SHA or workflow run ID'
        required: true
        type: string
      workflow_mode:
        description: 'Treat inputs as workflow run IDs instead of commit SHAs'
        required: false
        type: boolean
        default: false
      find_last_run:
        description: 'Workflow file to find last run on the branch (e.g., ci_nightly.yml). Run status filter is set via accepted_statuses.'
        required: false
        type: string
      accepted_statuses:
        description: 'Comma-separated workflow run statuses accepted by --find-last-run (default: success).'
        required: false
        type: string
        default: 'success'
      pr_base_ref:
        description: 'PR base branch name. When set, start_ref is resolved as the merge-base between end_ref and origin/<pr_base_ref> via the GitHub Compare API.'
        required: false
        type: string
  workflow_call:
    inputs:
      start_ref:
        required: false
        type: string
      end_ref:
        required: true
        type: string
      workflow_mode:
        required: false
        type: boolean
        default: false
      find_last_run:
        required: false
        type: string
      accepted_statuses:
        required: false
        type: string
        default: 'success'
      pr_base_ref:
        required: false
        type: string

permissions:
  contents: read

jobs:
  generate-report:
    name: Generate Manifest Diff Report
    runs-on: ubuntu-24.04
    # Informational job: never block the build/test jobs that needs: setup.
    continue-on-error: true
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Generate manifest diff report
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 build_tools/generate_manifest_diff_report.py \
            --end "${{ inputs.end_ref }}" \
            --start "${{ inputs.start_ref }}" \
            --find-last-run "${{ inputs.find_last_run }}" \
            --accepted-statuses "${{ inputs.accepted_statuses }}" \
            --pr-base-ref "${{ inputs.pr_base_ref }}" \
            ${{ inputs.workflow_mode && '--workflow-mode' || '' }} \
            --output-dir reports

      - name: Configure AWS Credentials
        if: ${{ github.repository == 'ROCm/TheRock' }}
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          aws-region: us-east-2
          role-to-assume: arn:aws:iam::692859939525:role/therock-ci

      # upload_test_report_script.py appends the S3 report link to
      # $GITHUB_STEP_SUMMARY itself, so no extra link step is needed.
      - name: Upload Report to S3
        if: ${{ github.repository == 'ROCm/TheRock' }}
        run: |
          python3 build_tools/github_actions/upload_test_report_script.py \
            --run-id ${{ github.run_id }} \
            --amdgpu-family manifest-diff \
            --report-path reports \
            --index-file-name index.html
