name: TheRock Manifest Diff Report

on:
  workflow_dispatch:
    inputs:
      start_ref:
        description: 'Start commit SHA or workflow run ID (required when using workflow mode or commit SHA mode without find-last-run)'
        required: false
        type: string
      end_ref:
        description: 'End commit SHA or workflow run ID'
        required: true
        type: string
      workflow_mode:
        description: 'Treat inputs as workflow run IDs instead of commit SHAs'
        required: false
        type: boolean
        default: false
      find_last_run:
        description: 'Workflow file to find last completed run (e.g., ci_nightly.yml)'
        required: false
        type: string
      accepted_statuses:
        description: 'Comma-separated conclusions accepted for find_last_run (default: success; e.g. success,failure)'
        required: false
        type: string
        default: 'success'
      branch:
        description: 'Branch to search when using find_last_run (default: main)'
        required: false
        type: string
        default: 'main'
  workflow_call:
    inputs:
      start_ref:
        required: false
        type: string
      end_ref:
        required: true
        type: string
      workflow_mode:
        required: false
        type: boolean
        default: false
      find_last_run:
        required: false
        type: string
      accepted_statuses:
        required: false
        type: string
        default: 'success'
      branch:
        required: false
        type: string
        default: 'main'

permissions:
  contents: read

jobs:
  generate-report:
    name: Generate Manifest Diff Report
    runs-on: ubuntu-24.04
    # When this workflow is called via `uses:` (e.g. from ci_nightly.yml) the
    # report is informational and a failure must not fail the parent run.
    # When invoked directly via workflow_dispatch, failures should surface.
    continue-on-error: ${{ github.event_name != 'workflow_dispatch' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Generate manifest diff report
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 build_tools/generate_manifest_diff_report.py \
            --end "${{ inputs.end_ref }}" \
            --start "${{ inputs.start_ref || '' }}" \
            --find-last-run "${{ inputs.find_last_run || '' }}" \
            --accepted-statuses "${{ inputs.accepted_statuses }}" \
            --branch "${{ inputs.branch }}" \
            ${{ inputs.workflow_mode && '--workflow-mode' || '' }} \
            --output-dir reports

      - name: Configure AWS Credentials
        if: ${{ github.repository == 'ROCm/TheRock' }}
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          aws-region: us-east-2
          role-to-assume: arn:aws:iam::692859939525:role/therock-ci

      - name: Upload Report to S3
        if: ${{ github.repository == 'ROCm/TheRock' }}
        run: |
          python3 build_tools/github_actions/upload_test_report_script.py \
            --run-id ${{ github.run_id }} \
            --amdgpu-family manifest-diff \
            --report-path reports \
            --index-file-name index.html
