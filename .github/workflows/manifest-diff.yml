name: TheRock Manifest Diff Report

on:
  workflow_dispatch:
    inputs:
      start_ref:
        description: 'Start commit SHA or workflow run ID. Used when neither pr_base_ref nor find_last_run is set (start resolution precedence: pr_base_ref > find_last_run > start_ref).'
        required: false
        type: string
      end_ref:
        description: 'End commit SHA (or, with workflow_mode=true, a workflow run ID).'
        required: true
        type: string
      workflow_mode:
        description: 'Interpret start_ref and end_ref as workflow run IDs instead of commit SHAs (pr_base_ref and find_last_run are unaffected).'
        required: false
        type: boolean
        default: false
      find_last_run:
        description: 'Workflow filename (e.g. multi_arch_ci.yml). When set, start_ref is resolved as the head SHA of that workflow''s most recent run on `branch` that concluded with success or failure (cancelled / skipped / in-progress runs are ignored).'
        required: false
        type: string
      pr_base_ref:
        description: 'PR base branch name (e.g. main). When set, start_ref is resolved as the merge-base between end_ref and the named branch via the GitHub Compare API — rebase-safe, works on rewritten PR histories.'
        required: false
        type: string
      branch:
        description: 'Branch to scope find_last_run lookups against (default: main). Only consulted when find_last_run is set; ignored otherwise.'
        required: false
        type: string
        default: 'main'
      repository:
        description: 'Repository to check out (default: the repository hosting this workflow run).'
        required: false
        type: string
        default: ''
      ref:
        description: 'Git ref to check out (default: the ref hosting this workflow run).'
        required: false
        type: string
        default: ''
  workflow_call:
    inputs:
      start_ref:
        required: false
        type: string
      end_ref:
        required: true
        type: string
      workflow_mode:
        required: false
        type: boolean
        default: false
      find_last_run:
        required: false
        type: string
      pr_base_ref:
        required: false
        type: string
      branch:
        required: false
        type: string
        default: 'main'
      repository:
        required: false
        type: string
        default: ''
      ref:
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  generate-report:
    name: Generate Manifest Diff Report
    # Canonical fork-safe runner pattern: ROCm-org runs use the self-hosted
    # pool (with baseline AWS creds mounted at /home/awsconfig/); downstream
    # forks fall back to GitHub-hosted runners and degrade gracefully.
    runs-on: ${{ github.repository_owner == 'ROCm' && 'azure-linux-scale-rocm' || 'ubuntu-24.04' }}
    # Informational job: never fail the parent caller.
    continue-on-error: true
    permissions:
      id-token: write
      contents: read
    container:
      image: ubuntu:24.04
      options: -v /runner/config:/home/awsconfig/
    env:
      AWS_SHARED_CREDENTIALS_FILE: /home/awsconfig/credentials.ini
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || '' }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Generate manifest diff report
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 build_tools/generate_manifest_diff_report.py \
            --end "${{ inputs.end_ref }}" \
            --start "${{ inputs.start_ref }}" \
            --find-last-run "${{ inputs.find_last_run }}" \
            --pr-base-ref "${{ inputs.pr_base_ref }}" \
            --branch "${{ inputs.branch }}" \
            ${{ inputs.workflow_mode && '--workflow-mode' || '' }} \
            --output-dir reports

      # `if: always()` so we still attempt to upload partial output if an
      # earlier step crashed. Job-level `continue-on-error` already prevents
      # any failure from red-lighting the parent caller.
      - name: Configure AWS credentials for artifact uploads
        if: ${{ always() }}
        uses: ./.github/actions/configure_aws_artifacts_credentials

      - name: Upload Report to S3
        if: ${{ always() }}
        run: |
          python3 build_tools/github_actions/upload_test_report_script.py \
            --run-id ${{ github.run_id }} \
            --amdgpu-family manifest-diff \
            --report-path reports \
            --index-file-name index.html
