name: TheRock Manifest Diff Report

# Push trigger for testing the 4 input cases (change MANIFEST_DIFF_PUSH_CASE per commit).
on:
  push:
    branches: [amd/hsivasun/add-manifest-diff-workflow]
  workflow_dispatch:
    inputs:
      start_ref:
        description: 'Start commit SHA or workflow run ID (required when using workflow mode or commit SHA mode without find-last-successful)'
        required: false
        type: string
      end_ref:
        description: 'End commit SHA or workflow run ID'
        required: true
        type: string
      workflow_mode:
        description: 'Treat inputs as workflow run IDs instead of commit SHAs'
        required: false
        type: boolean
        default: false
      find_last_successful:
        description: 'Workflow file to find last successful run (e.g., ci_nightly.yml)'
        required: false
        type: string
  workflow_call:
    inputs:
      start_ref:
        required: false
        type: string
      end_ref:
        required: true
        type: string
      workflow_mode:
        required: false
        type: boolean
        default: false
      find_last_successful:
        required: false
        type: string

permissions:
  contents: read

jobs:
  generate-report:
    name: Generate Manifest Diff Report
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
    # For push: which of the 4 test cases to run (change this in each of 4 commits).
    env:
      MANIFEST_DIFF_PUSH_CASE: "4"
      # For Case 3 (workflow mode): start run ID (e.g. a run before rocm-systems/rocm-libraries bump).
      MANIFEST_DIFF_PUSH_START_RUN_ID: "22468436712"
      # For Case 4 (commit SHAs): start commit (e.g. 5f60db78).
      MANIFEST_DIFF_PUSH_START_SHA: "5f60db78"
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # --- Push test cases (exactly one runs per push based on MANIFEST_DIFF_PUSH_CASE) ---
      - name: Generate manifest diff report (push Case 1 – find-last-successful + workflow-mode)
        if: ${{ github.event_name == 'push' && env.MANIFEST_DIFF_PUSH_CASE == '1' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 build_tools/generate_manifest_diff_report.py \
            --find-last-successful ci_nightly.yml \
            --workflow-mode \
            --end "${{ github.run_id }}" \
            --output-dir reports

      - name: Generate manifest diff report (push Case 2 – find-last-successful only)
        if: ${{ github.event_name == 'push' && env.MANIFEST_DIFF_PUSH_CASE == '2' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 build_tools/generate_manifest_diff_report.py \
            --find-last-successful ci_nightly.yml \
            --end "${{ github.sha }}" \
            --output-dir reports

      - name: Generate manifest diff report (push Case 3 – workflow-mode, start/end run IDs)
        if: ${{ github.event_name == 'push' && env.MANIFEST_DIFF_PUSH_CASE == '3' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 build_tools/generate_manifest_diff_report.py \
            --workflow-mode \
            --start "${{ env.MANIFEST_DIFF_PUSH_START_RUN_ID }}" \
            --end "${{ github.run_id }}" \
            --output-dir reports

      - name: Generate manifest diff report (push Case 4 – start/end commit SHAs)
        if: ${{ github.event_name == 'push' && env.MANIFEST_DIFF_PUSH_CASE == '4' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 build_tools/generate_manifest_diff_report.py \
            --start "${{ env.MANIFEST_DIFF_PUSH_START_SHA }}" \
            --end "${{ github.sha }}" \
            --output-dir reports

      # --- Manual / workflow_call (uses inputs) ---
      - name: Generate manifest diff report (dispatch/call)
        if: ${{ github.event_name != 'push' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 build_tools/generate_manifest_diff_report.py \
            --end "${{ inputs.end_ref }}" \
            --start "${{ inputs.start_ref || '' }}" \
            --find-last-successful "${{ inputs.find_last_successful || '' }}" \
            ${{ inputs.workflow_mode && '--workflow-mode' || '' }} \
            --output-dir reports

      - name: Configure AWS Credentials
        if: ${{ github.repository == 'ROCm/TheRock' }}
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          aws-region: us-east-2
          role-to-assume: arn:aws:iam::692859939525:role/therock-ci

      - name: Upload Report to S3
        if: ${{ github.repository == 'ROCm/TheRock' }}
        run: |
          python3 build_tools/github_actions/upload_test_report_script.py \
            --run-id ${{ github.run_id }} \
            --amdgpu-family manifest-diff \
            --report-path reports \
            --index-file-name index.html
