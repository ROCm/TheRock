name: Test Linux Packages

on:
  workflow_dispatch:
    inputs:
      artifact_run_id:
        type: string
        default: ""
  push:
    branches:
      - ADHOCBUILD
  workflow_call:

jobs:
  test_sanity_check:
    name: 'Test Sanity Check'
    uses: './.github/workflows/test_sanity_check.yml'
    with:
      artifact_run_id: ${{ inputs.artifact_run_id }}

  test_rocprim:
    name: 'Test rocPRIM'
    needs: test_sanity_check
    uses: './.github/workflows/test_rocprim.yml'
    with:
      artifact_run_id: ${{ inputs.artifact_run_id }}
