name: Publish PyTorch Dev Dockers

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *" # Runs Nightly at 2 AM UTC

jobs:
  build-and-push-image:
    strategy:
      fail-fast: false
      matrix:
        targets:
          - amdgpu_target: "gfx942"
          - amdgpu_target: "gfx1100"
          - amdgpu_target: "gfx1201"

    name: ${{ matrix.targets.amdgpu_target }}::Build
    runs-on: azure-linux-scale-rocm
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ROCm/therock_pytorch_dev_ubuntu_24_04_${{ matrix.targets.amdgpu_target }}
    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Runner Health Settings
        run: |
          df -h
          echo "python: $(which python), python3: $(which python3)"
          echo "Git version: $(git --version)"
          git config --global --add safe.directory $PWD
          git config fetch.parallel 10
          git config --global user.email "nobody@amd.com"
          git config --global user.name "Nobody"

      - name: Fetch sources
        run: |
          python3 ./build_tools/fetch_sources.py --jobs 10

      - name: Log in to the Container registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set nightly version
        run: |
          BASE_VERSION=$(jq -r '.["rocm-version"]' version.json)
          echo "VERSION=${BASE_VERSION}rc$(date +'%Y%m%d')" >> "$GITHUB_ENV"

      - name: Log digest
        run: |
          echo "Built image with digest: sha256:e9264097876429cea59f3dd6eedc0e7e22647cc1ba74c479fba84c5b12f8bc23"

      - name: Trigger verification workflow
        id: trigger_verification
        uses: benc-uk/workflow-dispatch@e2e5e9a103e331dad343f381a29e654aea3cf8fc
        with:
          workflow: verify_docker_image.yml
          token: ${{ github.token }}
          inputs: |
            {
              "amdgpu_target": "${{ matrix.targets.amdgpu_target }}",
              "image_digest": "sha256:e9264097876429cea59f3dd6eedc0e7e22647cc1ba74c479fba84c5b12f8bc23",
              "runner_type": "${{ matrix.targets.amdgpu_target == 'gfx942' && 'linux-mi300-1gpu-ossci-rocm' || (matrix.targets.amdgpu_target == 'gfx1201' && 'linux-rx9070-gpu-rocm') || 'linux-mi300-1gpu-ossci-rocm' }}"
            }

      - name: Print WORKFLOW_RUN_ID
        run: echo "WORKFLOW_RUN_ID for ${{ matrix.targets.amdgpu_target }} is ${{ steps.trigger_verification.outputs.workflow_run_id }}"

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Check verification workflow status
        run: |
          WORKFLOW_RUN_ID=${{ steps.trigger_verification.outputs.workflow_run_id }}
          echo "Checking status of verification workflow for ${{ matrix.targets.amdgpu_target }} with ID $WORKFLOW_RUN_ID"
          STATUS=""
          for i in {1..30}; do
            STATUS=$(gh run view $WORKFLOW_RUN_ID --json conclusion --jq '.conclusion')
            if [ "$STATUS" = "success" ]; then
              echo "Verification workflow succeeded"
              exit 0
            elif [ "$STATUS" = "failure" ] || [ "$STATUS" = "cancelled" ]; then
              echo "Verification workflow failed or was cancelled: $STATUS"
              exit 1
            fi
            echo "Verification workflow still running, waiting... (Attempt $i/30)"
            sleep 30
          done
          echo "Error: Verification workflow did not complete in time"
          exit 1
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Tag and push verified image
        run: |
          IMAGE=ghcr.io/rocm/therock_pytorch_dev_ubuntu_24_04_${{ matrix.targets.amdgpu_target }}
          DIGEST="sha256:e9264097876429cea59f3dd6eedc0e7e22647cc1ba74c479fba84c5b12f8bc23"
          VERSION=test-version002


          echo "Using image: $IMAGE"
          echo "Using digest: $DIGEST"
          echo "Using version: $VERSION"

          docker pull $IMAGE@$DIGEST
          docker tag $IMAGE@$DIGEST $IMAGE:$VERSION
          docker push $IMAGE:$VERSION
