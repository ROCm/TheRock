# Matrix orchestrator for multi-arch Linux PyTorch wheel releases.
#
# The reusable build workflow owns the per-matrix build shape:
#   - One fat build_prod_wheels.py invocation per (python_version,
#     pytorch_git_ref) matrix cell, covering all gfx targets expanded
#     from the inputs.amdgpu_families set. Builds torch, torchaudio,
#     torchvision, triton, and apex in a single invocation.
#   - kpack-split the fat torch and torchvision wheels into host wheels
#     plus per-gfx amd-torch-device-* / amd-torchvision-device-* wheels.
#     torchaudio, triton, and apex ship as-is.
#   - Upload the result to s3://therock-{release_type}-python/v4/whl/
#     (server-side indexing handles the index page).
#
# For convergence with CI and testing plans see:
# * https://github.com/ROCm/TheRock/issues/3332
# * https://github.com/ROCm/TheRock/issues/3291

name: Multi-Arch Release Linux PyTorch Wheels

on:
  workflow_call:
    inputs:
      amdgpu_families:
        description: >-
          Semicolon-separated list of AMD GPU families to build PyTorch for
          (e.g. 'gfx94X-dcgpu;gfx120X-all'). Expanded to gfx targets at
          build time via cmake/therock_amdgpu_targets.cmake.
        type: string
        required: true
      rocm_version:
        description: ROCm package version to install and build against (e.g. 7.10.0.dev0)
        type: string
        required: true
      rocm_package_find_links_url:
        description: URL for pip --find-links to install ROCm packages
        type: string
        required: true
      release_type:
        description: 'Release type: "dev", "nightly", or "prerelease". Selects the S3 bucket.'
        type: string
        required: true
      repository:
        description: "Repository to checkout. Defaults to github.repository."
        type: string
        default: ""
      ref:
        description: "Branch, tag, or SHA to checkout. Defaults to the triggering ref."
        type: string
        default: ""
      cache_type:
        description: "Compiler cache type ('none', 'sccache', or 'ccache')"
        type: string
        default: "none"
  workflow_dispatch:
    inputs:
      amdgpu_families:
        description: >-
          Semicolon-separated list of AMD GPU families to build PyTorch for
          (e.g. 'gfx94X-dcgpu;gfx120X-all'). Expanded to gfx targets at
          build time via cmake/therock_amdgpu_targets.cmake.
        type: string
        required: true
      rocm_version:
        description: ROCm package version to install and build against (e.g. 7.10.0.dev0)
        type: string
        required: true
      rocm_package_find_links_url:
        description: URL for pip --find-links to install ROCm packages
        type: string
        required: true
      release_type:
        description: 'Release type: "dev", "nightly", or "prerelease". Selects the S3 bucket.'
        type: string
        required: true
      repository:
        description: "Repository to checkout. Defaults to github.repository."
        type: string
        default: ""
      ref:
        description: "Branch, tag, or SHA to checkout. Defaults to the triggering ref."
        type: string
        default: ""
      cache_type:
        description: "Compiler cache type"
        type: choice
        options:
          - none
          - sccache
          - ccache
        default: none

run-name: Release Linux PyTorch Wheels (${{ inputs.release_type }}, ${{ inputs.rocm_version }}, ${{ inputs.amdgpu_families }})

permissions:
  contents: read

jobs:
  generate_pytorch_manifests:
    name: Generate PyTorch Manifests
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    env:
      MANIFEST_DIR: ${{ github.workspace }}/output/manifests
      RELEASE_TYPE: ${{ inputs.release_type }}
      PYTHON_VERSIONS: "3.10 3.11 3.12 3.13 3.14"
      PYTORCH_GIT_REFS: "release/2.8 release/2.9 release/2.10 release/2.11 release/2.12 nightly"
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || '' }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Python requirements
        run: |
          pip install packaging boto3

      - name: Record TheRock checkout
        id: therock
        run: |
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "repo=https://github.com/${{ inputs.repository || github.repository }}" >> "$GITHUB_OUTPUT"
          echo "branch=${{ inputs.ref || github.ref_name }}" >> "$GITHUB_OUTPUT"

      # determine_version.py sets version_suffix in GITHUB_ENV.
      - name: Determine PyTorch version suffix
        run: |
          python build_tools/github_actions/determine_version.py \
            --rocm-version ${{ inputs.rocm_version }}

      - name: Generate PyTorch manifests
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python build_tools/github_actions/generate_pytorch_manifest_upfront.py \
            --rocm-version "${{ inputs.rocm_version }}" \
            --version-suffix "${version_suffix}" \
            --platform linux \
            --manifest-dir "${MANIFEST_DIR}" \
            --pytorch-git-refs "${PYTORCH_GIT_REFS}" \
            --therock-commit "${{ steps.therock.outputs.commit }}" \
            --therock-repo "${{ steps.therock.outputs.repo }}" \
            --therock-branch "${{ steps.therock.outputs.branch }}"

      - name: Configure AWS Credentials for artifacts
        uses: ./.github/actions/configure_aws_artifacts_credentials
        with:
          release_type: ${{ inputs.release_type }}

      - name: Upload PyTorch manifests to S3 artifacts
        id: upload-manifests
        run: |
          python build_tools/github_actions/upload_pytorch_manifests.py \
            --manifest-dir "${MANIFEST_DIR}" \
            --run-id "${{ github.run_id }}"

      - name: Generate PyTorch build matrix
        id: matrix
        run: |
          python build_tools/github_actions/generate_pytorch_manifest_matrix.py \
            --manifest-dir "${MANIFEST_DIR}" \
            --manifest-dir-url "${{ steps.upload-manifests.outputs.manifest_dir_url }}" \
            --python-versions "${PYTHON_VERSIONS}" \
            --pytorch-git-refs "${PYTORCH_GIT_REFS}" \
            --exclude "release/2.8|3.14"

  build_pytorch_wheels:
    name: Build | py ${{ matrix.python_version }} | torch ${{ matrix.pytorch_git_ref }}
    needs: [generate_pytorch_manifests]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate_pytorch_manifests.outputs.matrix) }}

    uses: ./.github/workflows/multi_arch_build_portable_linux_pytorch_wheels.yml
    with:
      amdgpu_families: ${{ inputs.amdgpu_families }}
      python_version: ${{ matrix.python_version }}
      pytorch_git_ref: ${{ matrix.pytorch_git_ref }}
      manifest_url: ${{ matrix.manifest_url }}
      rocm_version: ${{ inputs.rocm_version }}
      rocm_package_find_links_url: ${{ inputs.rocm_package_find_links_url }}
      release_type: ${{ inputs.release_type }}
      repository: ${{ inputs.repository || github.repository }}
      ref: ${{ inputs.ref || '' }}
      cache_type: ${{ inputs.cache_type }}
    permissions:
      contents: read
      id-token: write
