name: Multi-Arch Build Portable Linux PyTorch Wheels

on:
  workflow_call:
    inputs:
      amdgpu_families:
        description: >-
          Semicolon-separated list of AMD GPU families to build PyTorch for
          (e.g. 'gfx94X-dcgpu;gfx120X-all'). Expanded to gfx targets at
          build time via cmake/therock_amdgpu_targets.cmake.
        type: string
        required: true
      python_version:
        description: Python version to build wheels for.
        type: string
        required: true
      pytorch_git_ref:
        description: PyTorch ref to checkout. Typically "nightly" or "release/X.Y".
        type: string
        required: true
      manifest_url:
        description: >-
          Optional explicit URL to a pre-generated PyTorch manifest. If empty,
          this workflow generates and uploads a manifest for pytorch_git_ref.
        type: string
        default: ""
      rocm_version:
        description: ROCm package version to install and build against (e.g. 7.10.0.dev0)
        type: string
        required: true
      rocm_package_find_links_url:
        description: URL for pip --find-links to install ROCm packages
        type: string
        required: true
      release_type:
        description: 'Release type: "dev", "nightly", or "prerelease". Selects the S3 bucket.'
        type: string
        required: true
      repository:
        description: "Repository to checkout. Defaults to github.repository."
        type: string
        default: ""
      ref:
        description: "Branch, tag, or SHA to checkout. Defaults to the triggering ref."
        type: string
        default: ""
      cache_type:
        description: "Compiler cache type ('none', 'sccache', or 'ccache')"
        type: string
        default: "none"
    outputs:
      cp_version:
        description: Python ABI tag for the selected Python version.
        value: ${{ jobs.build_pytorch_wheels.outputs.cp_version }}
      torch_version:
        description: torch package version from the manifest.
        value: ${{ jobs.build_pytorch_wheels.outputs.torch_version }}
      torchaudio_version:
        description: torchaudio package version from the manifest.
        value: ${{ jobs.build_pytorch_wheels.outputs.torchaudio_version }}
      apex_version:
        description: apex package version from the manifest.
        value: ${{ jobs.build_pytorch_wheels.outputs.apex_version }}
      torchvision_version:
        description: torchvision package version from the manifest.
        value: ${{ jobs.build_pytorch_wheels.outputs.torchvision_version }}
      triton_version:
        description: triton package version from the manifest.
        value: ${{ jobs.build_pytorch_wheels.outputs.triton_version }}
  workflow_dispatch:
    inputs:
      amdgpu_families:
        description: >-
          Semicolon-separated list of AMD GPU families to build PyTorch for
          (e.g. 'gfx94X-dcgpu;gfx120X-all'). Expanded to gfx targets at
          build time via cmake/therock_amdgpu_targets.cmake.
        type: string
        required: true
      python_version:
        description: Python version to build wheels for.
        type: string
        default: "3.12"
      pytorch_git_ref:
        description: PyTorch ref to checkout. Typically "nightly" or "release/X.Y".
        type: string
        default: "release/2.12"
      manifest_url:
        description: >-
          Optional explicit URL to a pre-generated PyTorch manifest. If empty,
          this workflow generates and uploads a manifest for pytorch_git_ref.
        type: string
        default: ""
      rocm_version:
        description: ROCm package version to install and build against (e.g. 7.10.0.dev0)
        type: string
        required: true
      rocm_package_find_links_url:
        description: URL for pip --find-links to install ROCm packages
        type: string
        required: true
      release_type:
        description: 'Release type: "dev", "nightly", or "prerelease". Selects the S3 bucket.'
        type: string
        required: true
      repository:
        description: "Repository to checkout. Defaults to github.repository."
        type: string
        default: ""
      ref:
        description: "Branch, tag, or SHA to checkout. Defaults to the triggering ref."
        type: string
        default: ""
      cache_type:
        description: "Compiler cache type"
        type: choice
        options:
          - none
          - sccache
          - ccache
        default: none

run-name: Build Multi-Arch Linux PyTorch Wheels (${{ inputs.release_type }}, ${{ inputs.python_version }}, ${{ inputs.pytorch_git_ref }})

permissions:
  contents: read

jobs:
  prepare_pytorch_manifest:
    name: Prepare Manifest | torch ${{ inputs.pytorch_git_ref }}
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
    outputs:
      manifest_url: ${{ steps.prepare.outputs.manifest_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || '' }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Python requirements
        run: |
          pip install packaging boto3

      - name: Configure AWS Credentials for artifacts
        if: ${{ inputs.manifest_url == '' }}
        uses: ./.github/actions/configure_aws_artifacts_credentials
        with:
          release_type: ${{ inputs.release_type }}

      - name: Prepare PyTorch manifest
        id: prepare
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python build_tools/github_actions/prepare_pytorch_manifests.py \
            --manifest-url "${{ inputs.manifest_url }}" \
            --rocm-version "${{ inputs.rocm_version }}" \
            --run-id "${{ github.run_id }}" \
            --release-type "${{ inputs.release_type }}" \
            --platform linux \
            --manifest-dir "${{ github.workspace }}/output/manifests" \
            --pytorch-git-refs "${{ inputs.pytorch_git_ref }}" \
            --therock-repo "https://github.com/${{ inputs.repository || github.repository }}" \
            --therock-branch "${{ inputs.ref || github.ref_name }}"

  build_pytorch_wheels:
    name: Build | py ${{ inputs.python_version }} | torch ${{ inputs.pytorch_git_ref }}
    needs: [prepare_pytorch_manifest]
    runs-on: ${{ github.repository_owner == 'ROCm' && 'azure-linux-scale-rocm' || 'ubuntu-24.04' }}
    permissions:
      id-token: write
      contents: read
    container:
      image: ghcr.io/rocm/therock_build_manylinux_x86_64@sha256:702a5133851e6d1daf1207d2c9fbb01c2667914a5b6dc5a01faeb3ce66ea6421
      options: -v /runner/config:/home/awsconfig/
    env:
      AWS_SHARED_CREDENTIALS_FILE: /home/awsconfig/credentials.ini
      PACKAGE_DIST_DIR: ${{ github.workspace }}/output/packages/dist
      MANIFEST_DIR: ${{ github.workspace }}/output/manifests
      RELEASE_TYPE: ${{ inputs.release_type }}
      optional_build_prod_arguments: ""
      SCCACHE_BUCKET: "therock-${{ inputs.release_type }}-pytorch-sccache"
      SCCACHE_REGION: us-east-2
      SCCACHE_S3_KEY_PREFIX: "/linux/multiarch/v1/"
      SCCACHE_S3_USE_SSL: "true"
      SCCACHE_S3_SERVER_SIDE_ENCRYPTION: "true"
      SCCACHE_IDLE_TIMEOUT: "600"
      SCCACHE_LOG: warn
    outputs:
      cp_version: ${{ env.cp_version }}
      torch_version: ${{ steps.manifest-versions.outputs.torch_version }}
      torchaudio_version: ${{ steps.manifest-versions.outputs.torchaudio_version }}
      apex_version: ${{ steps.manifest-versions.outputs.apex_version }}
      torchvision_version: ${{ steps.manifest-versions.outputs.torchvision_version }}
      triton_version: ${{ steps.manifest-versions.outputs.triton_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || '' }}

      - name: Configure Git Identity
        run: |
          git config --global user.name "therockbot"
          git config --global user.email "therockbot@amd.com"

      - name: Select Python version
        run: |
          python build_tools/github_actions/python_to_cp_version.py \
            --python-version ${{ inputs.python_version }}

      - name: Add selected Python version to PATH
        run: |
          python_dir="/opt/python/${{ env.cp_version }}"
          if ! [ -x "${python_dir}/bin/python" ]; then
            echo "ERROR: Could not find python: ${python_dir}"
            exit 1
          fi
          echo "${python_dir}/bin" >> "$GITHUB_PATH"

      - name: Install python deps for CI
        run: |
          pip install -r external-builds/pytorch/requirements-ci.txt

      # determine_version.py sets optional_build_prod_arguments and
      # version_suffix in GITHUB_ENV.
      - name: Determine optional arguments passed to `build_prod_wheels.py`
        run: |
          python build_tools/github_actions/determine_version.py \
            --rocm-version ${{ inputs.rocm_version }}

      - name: Set manifest path
        run: |
          mkdir -p "${MANIFEST_DIR}"
          echo "MANIFEST_FILE=${MANIFEST_DIR}/pytorch_manifest.json" >> "$GITHUB_ENV"

      - name: Checkout PyTorch source repos from manifest
        run: |
          python ./external-builds/pytorch/checkout_from_manifest.py \
            --manifest-url "${{ needs.prepare_pytorch_manifest.outputs.manifest_url }}" \
            --manifest-output "${MANIFEST_FILE}" \
            --checkout-root ./external-builds/pytorch \
            --expected-pytorch-git-ref "${{ inputs.pytorch_git_ref }}"

      - name: Write PyTorch package version outputs
        id: manifest-versions
        run: |
          python build_tools/github_actions/write_pytorch_manifest_versions.py \
            --manifest "${MANIFEST_FILE}"

      - name: Configure AWS Credentials for sccache
        if: ${{ inputs.cache_type == 'sccache' && github.repository_owner == 'ROCm' }}
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          aws-region: us-east-2
          role-to-assume: arn:aws:iam::692859939525:role/therock-${{ inputs.release_type }}

      - name: Verify sccache
        if: ${{ inputs.cache_type == 'sccache' }}
        run: |
          echo "sccache version: $(sccache --version)"
          echo "SCCACHE_BUCKET=${SCCACHE_BUCKET}"
          echo "SCCACHE_S3_KEY_PREFIX=${SCCACHE_S3_KEY_PREFIX}"

      - name: Expand amdgpu families to gfx targets
        id: expand
        run: |
          targets=$(python build_tools/github_actions/expand_amdgpu_families.py \
            --amdgpu-families "${{ inputs.amdgpu_families }}")
          echo "Expanded families '${{ inputs.amdgpu_families }}' -> '${targets}'"
          echo "targets=${targets}" >> "$GITHUB_OUTPUT"

      - name: Build PyTorch wheels
        run: |
          cache_flag=""
          if [ "${{ inputs.cache_type }}" = "sccache" ]; then
            cache_flag="--use-sccache"
          elif [ "${{ inputs.cache_type }}" = "ccache" ]; then
            cache_flag="--use-ccache"
          fi

          ./external-builds/pytorch/build_prod_wheels.py \
            build \
            --install-rocm \
            --find-links "${{ inputs.rocm_package_find_links_url }}" \
            --clean \
            --output-dir "${PACKAGE_DIST_DIR}" \
            ${cache_flag} \
            --pytorch-rocm-arch ${{ steps.expand.outputs.targets }} \
            ${optional_build_prod_arguments}

      - name: Report cache stats
        if: ${{ !cancelled() && inputs.cache_type != 'none' }}
        run: |
          if [ "${{ inputs.cache_type }}" = "sccache" ]; then
            echo "sccache stats:"
            echo "--------------"
            sccache --show-stats || true
          elif [ "${{ inputs.cache_type }}" = "ccache" ]; then
            echo "ccache stats:"
            echo "-------------"
            ccache -s -v || true
          fi

      - name: Sanity check wheel
        run: |
          python external-builds/pytorch/sanity_check_wheel.py \
            ${{ env.PACKAGE_DIST_DIR }}/

      # The kpack wheel splitter takes the fat torch wheel and produces a
      # smaller host wheel plus one device wheel per gfx target. Source-install
      # from the TheRock checkout - kpack has no published wheel today.
      # The outer actions/checkout skips submodules for speed, so pull in
      # rocm-systems only when we actually need it.
      - name: Init rocm-systems submodule
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git submodule update --init --depth=1 rocm-systems

      - name: Install kpack tooling
        run: |
          pip install \
            -e rocm-systems/python/rocm-bootstrap \
            -e rocm-systems/shared/kpack

      - name: Split fat wheels (torch + torchvision)
        run: |
          # The splitter writes the host wheel under the same filename as
          # the input, so relocate each fat wheel out of PACKAGE_DIST_DIR
          # before invoking the splitter. torchaudio, triton, and apex ship
          # as-is: torchaudio and triton have no fat binaries to split, and
          # apex's ROCm fork ships JIT-loader shims rather than precompiled
          # extensions, so its wheel is constant-size in arch count.
          FAT_STAGE="${RUNNER_TEMP:-/tmp}/pytorch-fat"
          mkdir -p "${FAT_STAGE}"

          ROCM_SDK_VERSION="$(python -m rocm_sdk version)"

          mv "${PACKAGE_DIST_DIR}"/torch-*.whl "${FAT_STAGE}/"
          python -m rocm_kpack.tools.split_python_wheels \
            --input "${FAT_STAGE}"/torch-*.whl \
            --output-dir "${PACKAGE_DIST_DIR}" \
            --device-package-prefix amd-torch-device \
            --overlay-root torch/ \
            --wheel-type torch-fat \
            --device-requires-dist "rocm-sdk-device-@GFXARCH@ == ${ROCM_SDK_VERSION}" \
            --compression zstd \
            -j "$(nproc)"
          rm -f "${FAT_STAGE}"/torch-*.whl

          mv "${PACKAGE_DIST_DIR}"/torchvision-*.whl "${FAT_STAGE}/"
          python -m rocm_kpack.tools.split_python_wheels \
            --input "${FAT_STAGE}"/torchvision-*.whl \
            --output-dir "${PACKAGE_DIST_DIR}" \
            --device-package-prefix amd-torchvision-device \
            --overlay-root torchvision/ \
            --device-requires-dist "rocm-sdk-device-@GFXARCH@ == ${ROCM_SDK_VERSION}" \
            --compression zstd \
            -j "$(nproc)"

          rm -rf "${FAT_STAGE}"
          echo "Post-split contents of ${PACKAGE_DIST_DIR}:"
          ls -lh "${PACKAGE_DIST_DIR}/"

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure_aws_artifacts_credentials
        with:
          release_type: ${{ inputs.release_type }}

      - name: Upload PyTorch wheels to release bucket
        run: |
          python build_tools/github_actions/publish_pytorch_to_release_bucket.py \
            --source-dir="${PACKAGE_DIST_DIR}" \
            --release-type="${{ inputs.release_type }}"
