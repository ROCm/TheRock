name: Test Multi-Arch Linux JAX Wheels

on:
  workflow_call:
    inputs:
      test_amdgpu_family:
        description: GPU family to test (e.g. gfx94X-dcgpu, gfx110X-all)
        required: true
        type: string
      package_index_url:
        description: "Base URL for the multi-arch Python package index (release path). Use wheel_find_links_url instead for CI-built wheels."
        type: string
        default: ""
      wheel_find_links_url:
        description: "pip --find-links URL for CI-built JAX wheels (PR path). Takes precedence over package_index_url when set."
        type: string
        default: ""
      rocm_version:
        description: ROCm version
        required: true
        type: string
      rocm_package_find_links_url:
        description: "URL for pip --find-links to install ROCm packages for the JAX manylinux build."
        type: string
        default: ""
      release_type:
        description: "Release type"
        type: string
        required: true
      test_size:
        description: "Test size: small (PR, curated subset), medium (nightly, full UT + 2 e2e), large (weekly, full UT + full e2e)."
        type: string
        default: "small"
      python_version:
        description: Python version to test
        required: true
        type: string
      repository:
        description: "Repository to checkout. Defaults to github.repository."
        type: string
        default: ""
      ref:
        description: "Branch, tag or SHA to checkout."
        type: string
        default: ""
      jax_ref:
        description: "rocm-jax repository ref/branch to check out"
        required: true
        type: string
      jax_version:
        description: "Built JAX version"
        required: false
        type: string
      jaxlib_version:
        description: "Built jaxlib version"
        required: false
        type: string
      jax_plugin_version:
        description: "Built jax_rocm7_plugin version"
        required: false
        type: string
      jax_pjrt_version:
        description: "Built jax_rocm7_pjrt version"
        required: false
        type: string
      test_runs_on:
        description: Runner label to execute tests on
        required: true
        type: string
  workflow_dispatch:
    inputs:
      test_amdgpu_family:
        description: GPU family to test (e.g. gfx94X-dcgpu, gfx110X-all)
        type: string
        default: "gfx94X-dcgpu"
      package_index_url:
        description: Base URL for the multi-arch Python package index
        type: string
        default: "https://rocm.nightlies.amd.com/whl-multi-arch/"
      wheel_find_links_url:
        description: "pip --find-links URL for CI-built JAX wheels (PR path). Takes precedence over package_index_url when set."
        type: string
        default: ""
      rocm_version:
        description: ROCm version
        type: string
        default: "7.14.0.dev0"
      rocm_package_find_links_url:
        description: "URL for pip --find-links to install ROCm packages for the JAX manylinux build."
        type: string
        default: ""
      release_type:
        description: 'Release type; developer-triggered jobs should use "dev".'
        type: choice
        options:
          - dev
        default: dev
      test_size:
        description: "Test size to run."
        type: choice
        options:
          - small
          - medium
          - large
        default: small
      python_version:
        description: Python version to test
        type: string
        default: "3.13"
      repository:
        description: "Repository to checkout. Defaults to github.repository."
        type: string
        default: ""
      ref:
        description: "Branch, tag or SHA to checkout."
        type: string
        default: ""
      jax_ref:
        description: "rocm-jax repository ref/branch to check out"
        type: string
        default: "rocm-jaxlib-v0.9.1"
      jax_version:
        description: "Built JAX version"
        type: string
        default: ""
      jaxlib_version:
        description: "Built jaxlib version"
        type: string
        default: ""
      jax_plugin_version:
        description: "Built jax_rocm7_plugin version"
        type: string
        default: ""
      jax_pjrt_version:
        description: "Built jax_rocm7_pjrt version"
        type: string
        default: ""
      test_runs_on:
        description: Runner label to use. The selected runner should have a GPU supported by test_amdgpu_family
        type: string
        default: "linux-gfx942-1gpu-ccs-csp-ossci-rocm"
permissions:
  contents: read
  id-token: write

jobs:
  test_jax_wheels:
    name: Test JAX | ${{ inputs.test_size }} | ${{ inputs.jax_ref }} | Python ${{ inputs.python_version }} | ${{ inputs.test_amdgpu_family }}
    runs-on: ${{ inputs.test_runs_on }}
    # Upper bound for the whole job (setup + tests). Per-size enforcement is on
    # the "Run JAX tests" step below.
    timeout-minutes: 360

    container:
      image: ghcr.io/rocm/no_rocm_image_ubuntu24_04@sha256:405945a40deaff9db90b9839c0f41d4cba4a383c1a7459b28627047bf6302a26
      options: >-
        --shm-size=128g
        --device /dev/kfd
        --device /dev/dri
        --group-add render
        --group-add video
        --user root
        --env-file /etc/podinfo/gha-gpu-isolation-settings
        --dns 8.8.8.8
        --dns 8.8.4.4

    defaults:
      run:
        shell: bash

    env:
      VIRTUAL_ENV: ${{ github.workspace }}/.venv
      PYTHON_VERSION: ${{ inputs.python_version }}
      WHEEL_INDEX_URL: ${{ inputs.package_index_url }}
      WHEEL_FIND_LINKS_URL: ${{ inputs.wheel_find_links_url }}
      ROCM_PACKAGE_FIND_LINKS_URL: ${{ inputs.rocm_package_find_links_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || '' }}

      - name: Checkout rocm-jax
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: rocm-jax
          repository: ROCm/rocm-jax
          ref: ${{ inputs.jax_ref }}

      - name: Checkout JAX
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: jax
          repository: ROCm/jax
          ref: ${{ inputs.jax_ref }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ inputs.python_version }}
          check-latest: true

      - name: System deps, venv configure
        run: |
          python3 -m venv "${VIRTUAL_ENV}"
          echo "PATH=${VIRTUAL_ENV}/bin:${PATH}" >> "$GITHUB_ENV"
          python3 build_tools/setup_venv.py \
            "${VIRTUAL_ENV}" \
            --activate-in-future-github-actions-steps

      - name: Install base JAX test requirements
        run: |
          pip install -r external-builds/jax/requirements-jax.txt

      - name: Determine JAX package versions
        run: |
          if [ -n "${{ inputs.jax_plugin_version }}" ] && [ -n "${{ inputs.jax_version }}" ]; then
            echo "JAX_VERSION=${{ inputs.jax_version }}" >> "$GITHUB_ENV"
            echo "JAXLIB_VERSION=${{ inputs.jaxlib_version }}" >> "$GITHUB_ENV"
            echo "JAX_PLUGIN_VERSION=${{ inputs.jax_plugin_version }}" >> "$GITHUB_ENV"
            echo "JAX_PJRT_VERSION=${{ inputs.jax_pjrt_version }}" >> "$GITHUB_ENV"
          else
            pip install packaging

            python build_tools/github_actions/compute_jax_package_version.py \
              --rocm-version "${{ inputs.rocm_version }}" \
              --jax-requirements rocm-jax/build/requirements.txt
          fi
      - name: Compute ROCm device extras
        id: expand
        run: |
          python build_tools/github_actions/expand_amdgpu_families.py \
            --amdgpu-families "${{ inputs.test_amdgpu_family }}" \
            --output-mode=device-extras

      - name: Install ROCm packages
        run: |
          python -m pip install --upgrade pip

          pkg="rocm[libraries]"
          if [ -n "${{ steps.expand.outputs.device_extras }}" ]; then
            pkg="${pkg%]},${{ steps.expand.outputs.device_extras }}]"
          fi

          python -m pip install --pre \
            --find-links "${ROCM_PACKAGE_FIND_LINKS_URL}" \
            "${pkg}==${{ inputs.rocm_version }}"

          echo "ROCM_ROOT=$(rocm-sdk path --root)" >> "$GITHUB_ENV"

      - name: Install JAX wheels from package index
        run: |
          # Release path publishes to a package index (--index-url); the PR/CI
          # path uploads run-scoped wheels to a --find-links URL. Prefer
          # find-links when provided.
          if [ -n "${WHEEL_FIND_LINKS_URL}" ]; then
            WHEEL_SRC=(--find-links "${WHEEL_FIND_LINKS_URL}")
            echo "Installing JAX wheels via find-links: ${WHEEL_FIND_LINKS_URL}"
          else
            WHEEL_SRC=(--index-url "${WHEEL_INDEX_URL}")
            echo "Installing JAX wheels via index: ${WHEEL_INDEX_URL}"
          fi

          pip install "${WHEEL_SRC[@]}" \
            "jax_rocm7_plugin==${JAX_PLUGIN_VERSION}" \
            "jax_rocm7_pjrt==${JAX_PJRT_VERSION}"

          if [ -n "${JAXLIB_VERSION}" ]; then
            pip install "${WHEEL_SRC[@]}" "jaxlib==${JAXLIB_VERSION}"

            pip install "jax==${JAX_VERSION}"
          else
            pip install \
              "jax==${JAX_VERSION}" \
              "jaxlib==${JAX_VERSION}"
          fi

      - name: Run JAX tests
        # Per-size execution-time enforcement using GH actions timeout):
        #   small  -> 45 min   (PR curated subset)
        #   medium -> 120 min  (nightly: full UT + 2 e2e workloads)
        #   large  -> 300 min  (weekly: full UT + full e2e workloads)
        timeout-minutes: ${{ inputs.test_size == 'small' && 45 || (inputs.test_size == 'medium' && 120 || 300) }}
        env:
          TEST_SIZE: ${{ inputs.test_size }}
          # Avoid large upfront GPU memory reservation.
          XLA_PYTHON_CLIENT_PREALLOCATE: "false"

          # Set XLA allocator. JAX 0.10.2 uses the default allocator; all
          # other releases keep the platform allocator.
          XLA_PYTHON_CLIENT_ALLOCATOR: ${{ inputs.jax_ref == 'rocm-jaxlib-v0.10.2' && 'default' || 'platform' }}

          # JAX 0.10.2 only: ROCm/HIP runtime tuning to avoid a pytest
          # slowdown/hang; other releases keep the runtime defaults.
          # TODO:(magaonka-amd) remove these as soon as fixes from corresponding system teams lands.
          ROCPROFILER_QUEUE_INTERPOSITION: ${{ inputs.jax_ref == 'rocm-jaxlib-v0.10.2' && '0' }}
          DEBUG_HIP_DYNAMIC_QUEUES: ${{ inputs.jax_ref == 'rocm-jaxlib-v0.10.2' && '0' }}
          HSA_NO_SCRATCH_RECLAIM: ${{ inputs.jax_ref == 'rocm-jaxlib-v0.10.2' && '1' }}

          # Reduce compilation/autotune memory pressure.
          XLA_FLAGS: >-
            --xla_gpu_force_compilation_parallelism=1
            --xla_gpu_enable_nccl_comm_splitting=false
            --xla_gpu_enable_command_buffer=

        run: |
          set -euxo pipefail

          unset ROCM_ROOT
          unset HIP_DEVICE_LIB_PATH
          unset JAX_ROCM_PLUGIN_INTERNAL_BITCODE_PATH
          unset JAX_ROCM_PLUGIN_INTERNAL_LLD_PATH
          unset HIP_VISIBLE_DEVICES
          unset ROCR_VISIBLE_DEVICES

          python -c "import jax; print(jax.local_devices())"

          run_full_ut_suite() {
            # TODO(#6558): replace with rocm-jax/ci/run_pytest_rocm.sh once that
            # PR merges, so medium/large run the complete ROCm JAX UT suite.
            echo "::warning::Full JAX UT suite is a placeholder (runs a subset only) until #6558 merges"
            echo "=== Full JAX UT suite (placeholder until #6558) ==="
            pytest jax/tests/multi_device_test.py -q --log-cli-level=INFO
            pytest jax/tests/core_test.py -q --log-cli-level=INFO
            pytest jax/tests/util_test.py -q --log-cli-level=INFO
            pytest jax/tests/scipy_stats_test.py -q --log-cli-level=INFO
          }

          run_e2e_workloads() {
            # $1 = "partial" (medium: llama + mixtral) or "full" (large: all jax-lab)
            # TODO: wire the maxtext jax-lab end-to-end workloads. For medium run
            # llama + mixtral; for large run the full jax-lab workload set.
            echo "::warning::End-to-end workloads ($1) not yet wired (placeholder, no e2e executed)"
            echo "=== End-to-end workloads ($1) — placeholder, not yet wired ==="
          }

          case "${TEST_SIZE}" in
            small)
              SMALL_LIST="external-builds/jax/test_selection/small_tests.txt"
              mapfile -t SMALL_TESTS < "${SMALL_LIST}"
              # Filter to tests present in this jax_ref: the curated list is
              # generated from one JAX snapshot, but test files can be
              # added/removed/renamed between JAX versions.
              PRESENT=(); MISSING=()
              for t in "${SMALL_TESTS[@]}"; do
                if [ -f "jax/${t}" ]; then PRESENT+=("jax/${t}"); else MISSING+=("${t}"); fi
              done
              if [ "${#MISSING[@]}" -gt 0 ]; then
                echo "::warning::small suite: ${#MISSING[@]} listed test(s) absent in this jax_ref and skipped: ${MISSING[*]}"
              fi
              if [ "${#PRESENT[@]}" -eq 0 ]; then
                echo "::error::small suite: none of the curated tests exist in this jax_ref" >&2
                exit 1
              fi
              echo "=== small: curated subset (${#PRESENT[@]}/${#SMALL_TESTS[@]} tests present) ==="
              pytest "${PRESENT[@]}" -q --log-cli-level=INFO
              ;;
            medium)
              echo "=== medium: full UT suite + 2 e2e workloads ==="
              run_full_ut_suite
              run_e2e_workloads partial
              ;;
            large)
              echo "=== large: full UT suite + full e2e workloads ==="
              run_full_ut_suite
              run_e2e_workloads full
              ;;
            *)
              echo "Unknown TEST_SIZE='${TEST_SIZE}' (expected small|medium|large)" >&2
              exit 1
              ;;
          esac
