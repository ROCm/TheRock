name: Build Native Linux Packages

on:
  workflow_call:
    inputs:
      artifact_group:
        description: gfx arch group for the s3 server
        type: string
        default: gfx94X-dcgpu
      artifact_run_id:
        description: workflow run id to download the artifacts from.
        required: true
        type: string
      rocm_version:
        description: ROCm version to append to the package (8.0.0, 8.0.1rc1, ...).
        required: true
        type: string
      native_package_type:
        description: Specify whether debian or rpm packages are needed (deb or rpm).
        required: true
        type: string
      package_suffix:
        description: The suffix to be added to package name (asan, tsan, static or rpath).
        required: false
        type: string
      release_type:
        description: The type of release to build ("dev", "nightly", or "prerelease"). All developer-triggered jobs should use "dev"!
        required: false
        type: string
      install_prefix:
        description: Installation prefix for install test (default /opt/rocm/core). Used by test_native_linux_packages_install.
        required: false
        type: string
        default: "/opt/rocm/core"
      cloudfront_base_url:
        description: "CloudFront base URL (no trailing slash). For nightly use e.g. https://rocm.nightlies.amd.com; for prerelease use e.g. https://rocm.prereleases.amd.com/packages. Used to build repo_url for install test; for prerelease, GPG key URL is derived as <this_url>/gpg/rocm.gpg."
        required: false
        type: string
        default: "https://rocm.nightlies.amd.com"
      repository:
        description: "Repository to checkout. Otherwise, defaults to `github.repository`."
        type: string
      ref:
        description: "Branch, tag or SHA to checkout. Defaults to the reference or SHA that triggered the workflow."
        type: string
  workflow_dispatch:
    inputs:
      artifact_group:
        type: string
        default: gfx94X-dcgpu
      artifact_run_id:
        description: workflow run id to download the artifacts from
        type: string
      rocm_version:
        description: ROCm version to append to the package (8.0.0, 8.0.1rc1, ...).
        type: string
        default: "0.0.1"
      native_package_type:
        description: Specify whether debian or rpm packages are needed (deb or rpm).
        required: true
        type: choice
        options:
          - rpm
          - deb
        default: "rpm"
      package_suffix:
        description: The suffix to be added to package name (asan, tsan, static or rpath).
        type: string
        required: false
      release_type:
        description: The type of release to build ("dev", "nightly", or "prerelease"). All developer-triggered jobs should use "dev"!
        type: string
        default: "dev"
      install_prefix:
        description: Installation prefix for install test.
        type: string
        default: "/opt/rocm/core"
      cloudfront_base_url:
        description: "CloudFront base URL (nightly e.g. https://rocm.nightlies.amd.com; prerelease e.g. https://rocm.prereleases.amd.com/packages)."
        type: string
        default: "https://rocm.nightlies.amd.com"
      ref:
        description: "Branch, tag or SHA to checkout. Defaults to the reference or SHA that triggered the workflow."
        type: string

permissions:
  id-token: write
  contents: read

run-name: Build native Linux packages (${{ inputs.artifact_group }}, ${{ inputs.rocm_version }}, ${{ inputs.native_package_type }}, ${{ inputs.package_suffix }}, ${{ inputs.release_type }})

jobs:
  build_native_packages:
    name: Build Linux native Packages
    strategy:
      fail-fast: false
    runs-on: ${{ github.repository_owner == 'ROCm' && 'azure-linux-scale-rocm' || 'ubuntu-24.04' }}
    outputs:
      s3_prefix: ${{ steps.repo-metadata.outputs.s3_prefix }}
    env:
      BUILD_IMAGE: ghcr.io/rocm/therock_build_manylinux_x86_64@sha256:d6ae5712a9c7e8b88281d021e907b312cd8a26295b95690baef3e8dde4805858
      ARTIFACT_RUN_ID: ${{ inputs.artifact_run_id || github.run_id }}
      PACKAGE_SUFFIX: ${{ inputs.package_suffix != '' && inputs.package_suffix || '' }}
      OUTPUT_DIR: ${{ github.workspace }}/output
      ARTIFACTS_DIR: ${{ github.workspace }}/output/artifacts
      PACKAGE_DIST_DIR: ${{ github.workspace }}/output/packages
      RELEASE_TYPE: ${{ inputs.release_type || '' }}
      S3_BUCKET_NATIVE: "therock-${{ inputs.release_type }}-packages"
    steps:
      - name: "Checking out repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || '' }}

# TODO: remove repo-metadata once s3_prefix is available PR#3561,
# repo-metadata is a work around only for generating s3_prefix.
      - name: Set repo_sub_folder
        id: repo-metadata
        run: |
          BUILD_DATE=$(date +%Y%m%d)
          REPO_SUB_FOLDER="${BUILD_DATE}-${{ env.ARTIFACT_RUN_ID }}"
          if [ "${{ inputs.release_type }}" = "prerelease" ]; then
            S3_PREFIX="v3/packages/${{ inputs.native_package_type }}"
          else
            S3_PREFIX="v3/packages/${{ inputs.native_package_type }}/${REPO_SUB_FOLDER}"
          fi
          echo "s3_prefix=${S3_PREFIX}" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install Python requirements
        run: |
          pip install pyelftools boto3 jinja2

      - name: Install System requirements
        run: |
          # Install the needed tools for creating rpm / deb packages
          # Also install tools for creating repo files
          sudo apt update
          sudo apt install -y llvm
          sudo apt install -y rpm debhelper-compat build-essential
          sudo apt install -y dpkg-dev createrepo-c

      - name: Fetch Artifacts
        run: |
          echo "Fetching artifacts for build ${{ inputs.artifact_run_id }}"
          python ./build_tools/fetch_artifacts.py \
            --run-id=${{ env.ARTIFACT_RUN_ID }} \
            --run-github-repo=${{ github.repository }} \
            --artifact-group=${{ inputs.artifact_group }} \
            --output-dir=${{ env.ARTIFACTS_DIR }}

      - name: Build Packages
        id: build-packages
        run: |
          echo "Building ${{ inputs.native_package_type }} packages for ${{ inputs.artifact_group }} ${{ inputs.artifact_run_id }}"
          python ./build_tools/packaging/linux/build_package.py \
            --dest-dir ${{ env.PACKAGE_DIST_DIR }} \
            --rocm-version ${{ inputs.rocm_version }} \
            --target ${{ inputs.artifact_group }} \
            --artifacts-dir ${{ env.ARTIFACTS_DIR }} \
            --pkg-type ${{ inputs.native_package_type }} \
            --version-suffix ${{ env.ARTIFACT_RUN_ID }}

      - name: Simulated install Test
        id: test-packages
        run: |
          echo "Simulate ${{ inputs.native_package_type }} package installation"
          if [ "${{ inputs.native_package_type }}" = "deb" ]; then
            echo "Simulate installing DEB packages on host system for testing"
            sudo apt install --simulate ${{ env.PACKAGE_DIST_DIR }}/*.deb
          else
            echo "Simulate installing RPM packages in Docker container for testing"
            sudo rpm -Uvh --test --nodeps ${{ env.PACKAGE_DIST_DIR }}/*.rpm
          fi

      - name: Install AWS CLI
        run: bash ./dockerfiles/install_awscli.sh

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          aws-region: us-east-2
          role-to-assume: arn:aws:iam::692859939525:role/therock-${{ inputs.release_type }}

      - name: Upload Package repo to S3
        id: upload-packages
        run: |
          echo "Uploading to s3 bucket : ${{ inputs.release_type }}"
          python ./build_tools/packaging/linux/upload_package_repo.py \
            --pkg-type ${{ inputs.native_package_type }} \
            --s3-bucket ${{ env.S3_BUCKET_NATIVE }} \
            --amdgpu-family ${{ inputs.artifact_group }} \
            --artifact-id ${{ env.ARTIFACT_RUN_ID }} \
            --job ${{ inputs.release_type }}

  get_install_test_profiles:
    name: Get Install test OS profiles for ${{ inputs.native_package_type }}
    runs-on: ubuntu-24.04
    needs: [build_native_packages]
    outputs:
      os_profiles: ${{ steps.set.outputs.os_profiles }}
      gfx_arch: ${{ steps.set.outputs.gfx_arch }}
      repo_base_url: ${{ steps.get-base-url.outputs.repo_base_url }}
      repo_sub_folder: ${{ steps.get-repo-sub-folder.outputs.repo_sub_folder }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get base URL (repo_base_url) from CloudFront URL
        id: get-base-url
        run: python build_tools/packaging/linux/get_url_repo_params.py get-base-url --from-url "${{ inputs.cloudfront_base_url }}" >> $GITHUB_OUTPUT

      - name: Get repo_sub_folder from S3 prefix (get_url_repo_params)
        id: get-repo-sub-folder
        run: python build_tools/packaging/linux/get_url_repo_params.py get-repo-sub-folder --from-s3-prefix "${{ needs.build_native_packages.outputs.s3_prefix }}" >> $GITHUB_OUTPUT

      - name: Set os_profiles and gfx_arch
        id: set
        run: |
          PKG_TYPE="${{ inputs.native_package_type }}"
          if [ "$PKG_TYPE" = "deb" ]; then
            OS_PROFILES='["ubuntu2204","ubuntu2404","debian12","debian13"]'
          else
            OS_PROFILES='["rhel8","rhel9","rhel10","sles15","sles16","azl3"]'
          fi
          GFX_ARCH=$(echo "${{ inputs.artifact_group }}" | cut -d'-' -f1 | tr '[:upper:]' '[:lower:]')
          echo "os_profiles=${OS_PROFILES}" >> $GITHUB_OUTPUT
          echo "gfx_arch=${GFX_ARCH}" >> $GITHUB_OUTPUT

  test_native_linux_packages_install:
    name: Test Native Linux Packages Install - ${{ matrix.os_profile }}
    needs: [build_native_packages, get_install_test_profiles]
    strategy:
      fail-fast: false
      matrix:
        os_profile: ${{ fromJson(needs.get_install_test_profiles.outputs.os_profiles) }}
    uses: ./.github/workflows/test_native_linux_packages_install.yml
    with:
      repo_base_url: ${{ needs.get_install_test_profiles.outputs.repo_base_url }}
      repo_sub_folder: ${{ needs.get_install_test_profiles.outputs.repo_sub_folder }}
      os_profile: ${{ matrix.os_profile }}
      gpg_key_url: ${{ inputs.release_type == 'prerelease' && format('{0}/gpg/rocm.gpg', needs.get_install_test_profiles.outputs.repo_base_url) || '' }}
      gfx_arch: ${{ needs.get_install_test_profiles.outputs.gfx_arch }}
      install_prefix: ${{ inputs.install_prefix || '/opt/rocm/core' }}
