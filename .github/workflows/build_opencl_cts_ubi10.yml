name: Build opencl-cts (ubi10)

on:
  workflow_call:
    inputs:
      artifact_group:
        type: string
      package_version:
        type: string
        default: ADHOCBUILD
      release_type:
        type: string
        default: ""
      repository:
        description: "Repository to checkout. Defaults to github.repository."
        type: string
        default: ""
      ref:
        description: "Branch, tag, or SHA to checkout. Defaults to the triggering ref."
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      artifact_group:
        type: string
        default: gfx94X-dcgpu
      package_version:
        type: string
        default: ADHOCBUILD

permissions:
  contents: read

jobs:
  build_opencl_cts_ubi10:
    name: Build opencl-cts (ubi10)
    runs-on: azure-linux-scale-rocm
    timeout-minutes: 120
    permissions:
      id-token: write
    container:
      image: ghcr.io/rocm/no_rocm_image_ubuntu24_04_ocl_rt@sha256:b4966196b9cec5742776504fd76e7deb4d3765471da687354be9edcaf689c151
      options: --user 0:0
    env:
      CACHE_DIR: ${{ github.workspace }}/.container-cache
      CCACHE_CONFIGPATH: ${{ github.workspace }}/.ccache/ccache.conf
    steps:
      - name: Install opencl-cts build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            ccache \
            opencl-headers \
            spirv-tools \
            spirv-headers

      - name: Setup python3
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: 3.12

      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}

      - name: Install python deps
        run: |
          pip install -r requirements.txt

      - name: Adjust git config
        run: |
          git config --global --add safe.directory $PWD
          git config fetch.parallel 10

      - name: Setup ccache
        run: |
          ./build_tools/setup_ccache.py \
            --config-preset "github-oss-dev" \
            --dir "$(dirname $CCACHE_CONFIGPATH)" \
            --local-path "$CACHE_DIR/ccache"

      - name: Fetch sources
        timeout-minutes: 30
        run: |
          ./build_tools/fetch_sources.py --jobs 12 --source-sets opencl-cts

      - name: Configure
        env:
          # opencl-cts is target-neutral; any single valid family satisfies CMake.
          amdgpu_families: gfx94X-dcgpu
          package_version: ${{ inputs.package_version }}
          extra_cmake_options: >-
            -DTHEROCK_ENABLE_ALL=OFF
            -DTHEROCK_ENABLE_OPENCL_CTS=ON
            -DTHEROCK_BUNDLE_SYSDEPS=OFF
          BUILD_DIR: build
        run: |
          python3 build_tools/github_actions/build_configure.py

      - name: Build opencl-cts
        run: |
          cmake --build build --target opencl-cts -- -k 0

      - name: Report
        if: ${{ !cancelled() }}
        run: |
          if [ -d "./build" ]; then
            echo "Artifact Archives:"
            echo "------------------"
            ls -lh build/artifacts/*.tar.xz || true
          else
            echo "[ERROR] Build directory ./build does not exist."
            exit 1
          fi

      - name: Configure AWS Credentials
        if: ${{ always() }}
        uses: ./.github/actions/configure_aws_artifacts_credentials
        with:
          release_type: ${{ inputs.release_type }}

      - name: Post Build Upload
        if: always()
        run: |
          python3 build_tools/github_actions/post_build_upload.py \
            --run-id ${{ github.run_id }} \
            --artifact-group "${{ inputs.artifact_group }}" \
            --build-dir build \
            --upload
