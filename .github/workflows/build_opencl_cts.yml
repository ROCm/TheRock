name: Build opencl-cts

on:
  workflow_call:
    inputs:
      package_version:
        type: string
        default: ADHOCBUILD
      release_type:
        type: string
        default: ""
      repository:
        description: "Repository to checkout. Defaults to github.repository."
        type: string
        default: ""
      ref:
        description: "Branch, tag, or SHA to checkout. Defaults to the triggering ref."
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      package_version:
        type: string
        default: ADHOCBUILD

permissions:
  contents: read

jobs:
  build_opencl_cts:
    name: Build opencl-cts
    runs-on: azure-linux-scale-rocm
    timeout-minutes: 120
    permissions:
      id-token: write
    container:
      image: ghcr.io/rocm/no_rocm_image_ubuntu24_04_ocl_rt@sha256:b4966196b9cec5742776504fd76e7deb4d3765471da687354be9edcaf689c151
      options: --user 0:0
    env:
      STAGE_NAME: opencl-cts
      BUILD_DIR: build
      CACHE_DIR: ${{ github.workspace }}/.container-cache
      CCACHE_CONFIGPATH: ${{ github.workspace }}/.ccache/ccache.conf
      RELEASE_TYPE: ${{ inputs.release_type }}
    steps:
      - name: Install opencl-cts build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            ccache \
            spirv-tools

      - name: Setup python3
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: 3.12

      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}

      - name: Install python deps
        run: |
          pip install -r requirements.txt

      - name: Adjust git config
        run: |
          git config --global --add safe.directory $PWD
          git config fetch.parallel 10

      - name: Setup ccache
        run: |
          ./build_tools/setup_ccache.py \
            --config-preset "github-oss-dev" \
            --dir "$(dirname $CCACHE_CONFIGPATH)" \
            --local-path "$CACHE_DIR/ccache"

      - name: Fetch sources
        timeout-minutes: 30
        run: |
          ./build_tools/fetch_sources.py --jobs 12 --source-sets base rocm-systems

      - name: Checkout opencl-cts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: KhronosGroup/OpenCL-CTS
          ref: db69e92a03c91b1bcedb23d7142fe1c6e2ab1761
          path: opencl/opencl-cts

      - name: Checkout opencl-headers
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: KhronosGroup/OpenCL-Headers
          ref: 8b61a0ef8fe061afa1b3b291cbb9781a96827e41
          path: opencl/opencl-headers

      - name: Checkout spirv-headers
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: KhronosGroup/SPIRV-Headers
          ref: f88a2d766840fc825af1fc065977953ba1fa4a91
          path: opencl/spirv-headers

      - name: Configure
        run: |
          cmake -B "${BUILD_DIR}" -S . -GNinja \
            -DTHEROCK_PACKAGE_VERSION=${{ inputs.package_version }} \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DTHEROCK_AMDGPU_FAMILIES=gfx94X-dcgpu \
            -DTHEROCK_ENABLE_ALL=OFF \
            -DTHEROCK_ENABLE_OPENCL_CTS=ON \
            -DTHEROCK_BUNDLE_SYSDEPS=OFF

      - name: Build opencl-cts
        run: |
          cmake --build "${BUILD_DIR}" --target stage-${STAGE_NAME} archive-${STAGE_NAME} -- -k 0

      - name: Report
        if: ${{ !cancelled() }}
        run: |
          echo "CCache Stats:"
          ccache -s -v
          echo "Artifacts:"
          ls -lh "${BUILD_DIR}"/artifacts/*.tar.xz 2>/dev/null || echo "No artifacts found"

      - name: Configure AWS Credentials
        if: ${{ always() }}
        uses: ./.github/actions/configure_aws_artifacts_credentials
        with:
          release_type: ${{ inputs.release_type }}

      - name: Push stage artifacts
        run: |
          python build_tools/artifact_manager.py push \
            --run-id=${{ github.run_id }} \
            --stage="${STAGE_NAME}" \
            --build-dir="${BUILD_DIR}"

      - name: Upload stage logs
        if: ${{ always() }}
        run: |
          python build_tools/github_actions/post_stage_upload.py \
            --run-id=${{ github.run_id }} \
            --stage="${STAGE_NAME}" \
            --build-dir="${BUILD_DIR}"
