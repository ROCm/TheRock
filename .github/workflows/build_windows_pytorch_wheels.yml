name: Build Windows PyTorch Wheels

on:
  workflow_call:
    inputs:
      amdgpu_family:
        required: true
        type: string
      python_version:
        required: true
        type: string
      release_type:
        description: The type of release to build ("nightly", or "dev")
        required: true
        type: string
      s3_subdir:
        description: S3 subdirectory, not including the GPU-family
        required: true
        type: string
      cloudfront_url:
        description: CloudFront URL pointing to Python index
        required: true
        type: string
      rocm_version:
        description: ROCm version to pip install
        type: string
  workflow_dispatch:
    inputs:
      amdgpu_family:
        type: choice
        options:
          - gfx110X-dgpu
          - gfx1151
          - gfx120X-all
          - gfx94X-dcgpu
          - gfx950-dcgpu
        default: gfx1151
      python_version:
        required: true
        type: string
        default: "3.12"
      release_type:
        description: The type of release to build ("nightly", or "dev")
        type: string
        default: "dev"
      s3_subdir:
        description: S3 subdirectory, not including the GPU-family
        type: string
        default: "v2"
      cloudfront_url:
        description: CloudFront base URL pointing to Python index
        type: string
        default: "https://d25kgig7rdsyks.cloudfront.net/v2"
      rocm_version:
        description: ROCm version to pip install
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  build_pytorch_wheels:
    name: Build Windows PyTorch Wheels | ${{ inputs.amdgpu_family }} | Python ${{ inputs.python_version }}
    runs-on: ${{ github.repository_owner == 'ROCm' && 'azure-windows-scale-rocm' || 'windows-2022' }}
    env:
      CHECKOUT_ROOT: B:/src
      OUTPUT_DIR: ${{ github.workspace }}/output
      # Note the \ here instead of /. This should be used from 'cmd' not 'bash'!
      PACKAGE_DIST_DIR: ${{ github.workspace }}\output\packages\dist
      S3_BUCKET_PY: "therock-${{ inputs.release_type }}-python"
      optional_build_prod_arguments: ""
    outputs:
      torch_version: ${{ steps.build-pytorch-wheels.outputs.torch_version }}
    defaults:
      run:
        # Note: there are mixed uses of 'bash' (this default) and 'cmd' below
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Configure Git for Windows filesystem 
        run: |
          git config --system core.protectNTFS false
          git config --global core.precomposeunicode true
          git config --global core.longpaths true
          git config --system core.longpaths true

      - name: Configure Git Identity
        run: |
          git config --global user.name "therockbot"
          git config --global user.email "therockbot@amd.com"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ inputs.python_version }}

      # TODO(amd-justchen): share with build_windows_packages.yml. Include in VM image? Dockerfile?
      - name: Install requirements
        run: |
          # ninja pinned due to a bug in the 1.13.0 release:
          # https://github.com/ninja-build/ninja/issues/2616
          choco install --no-progress -y ninja --version 1.12.1
          choco install --no-progress -y awscli
          echo "$PATH;C:\Program Files\Amazon\AWSCLIV2" >> $GITHUB_PATH

      # After other installs, so MSVC get priority in the PATH.
      - name: Configure MSVC
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - name: Checkout PyTorch source repos (main branch)
        run: |
          git config --global core.longpaths true
          python ./external-builds/pytorch/pytorch_torch_repo.py checkout \
            --repo ${{ env.CHECKOUT_ROOT }}/torch \
            --repo-hashtag main
          python ./external-builds/pytorch/pytorch_audio_repo.py checkout \
            --repo ${{ env.CHECKOUT_ROOT }}/audio \
            --repo-hashtag main
          python ./external-builds/pytorch/pytorch_vision_repo.py checkout \
            --repo ${{ env.CHECKOUT_ROOT }}/vision \
            --repo-hashtag main

      - name: Heal dirty submodules (force checkout)
        shell: bash
        run: |
          set -euo pipefail

          echo "=== Scan submodules for DIRTY status ==="
          TFILE="$(mktemp)"
          # Collect DIRTY submodules into $TFILE; print a concise status line for each.
          git submodule foreach --recursive '
            st="$(git status --porcelain -u --ignore-submodules=all || true)"
            if [ -n "$st" ]; then
              echo "DIRTY  $sm_path"
              echo "$sm_path" >> "$tfile"
            else
              echo "CLEAN  $sm_path"
            fi
          ' tfile="$TFILE"

          if [ ! -s "$TFILE" ]; then
            echo "All submodules are clean"
            rm -f "$TFILE"
            exit 0
          fi

          echo ""
          echo "=== Attempting self-heal for DIRTY submodules ==="
          mapfile -t DIRTY_LIST < "$TFILE"
          rm -f "$TFILE"

          for sm in "${DIRTY_LIST[@]}"; do
            echo ""
            echo ">>> Healing: $sm"
            # Make sure the directory exists (init if missing)
            git submodule update --init -- "$sm"

            # Try a clean forced checkout of the recorded commit (shallow first, then full)
            if ! git submodule update --force --checkout --recursive -j 1 --depth 1 -- "$sm"; then
              echo "Shallow update failed for $sm; retrying without --depth"
              git submodule update --force --checkout --recursive -j 1 -- "$sm"
            fi

            # Ensure worktree is clean (remove stray/untracked)
            ( cd "$sm" && git reset --hard && git clean -fdx )

            # Re-verify this submodule only
            if ( cd "$sm" && test -z "$(git status --porcelain -u --ignore-submodules=all)" ); then
              echo "Healed $sm"
            else
              echo "Still DIRTY ❌ $sm"
              STILL_BAD=1
            fi
          done

          echo ""
          echo "=== Final verification pass (all submodules) ==="
          BAD=0
          git submodule foreach --recursive '
            st="$(git status --porcelain -u --ignore-submodules=all || true)"
            if [ -n "$st" ]; then
              echo "DIRTY (post-heal)  $sm_path"
              echo "$st"
              exit 10
            else
              echo "CLEAN (post-heal)  $sm_path"
            fi
          ' || BAD=$?

          if [ "${STILL_BAD:-0}" -ne 0 ] || [ "$BAD" -ne 0 ]; then
            echo "::error::Some submodules remain DIRTY after forced checkout."
            exit 1
          fi

          echo "All targeted submodules healed and clean"

