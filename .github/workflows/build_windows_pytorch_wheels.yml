name: Build Windows PyTorch Wheels

on:
  workflow_call:
    inputs:
      amdgpu_family:
        required: true
        type: string
      python_version:
        required: true
        type: string
      release_type:
        description: The type of release to build ("nightly", or "dev")
        required: true
        type: string
      s3_subdir:
        description: S3 subdirectory, not including the GPU-family
        required: true
        type: string
      cloudfront_url:
        description: CloudFront URL pointing to Python index
        required: true
        type: string
      rocm_version:
        description: ROCm version to pip install
        type: string
  workflow_dispatch:
    inputs:
      amdgpu_family:
        type: choice
        options:
          - gfx110X-dgpu
          - gfx1151
          - gfx120X-all
          - gfx94X-dcgpu
          - gfx950-dcgpu
        default: gfx1151
      python_version:
        required: true
        type: string
        default: "3.12"
      release_type:
        description: The type of release to build ("nightly", or "dev")
        type: string
        default: "dev"
      s3_subdir:
        description: S3 subdirectory, not including the GPU-family
        type: string
        default: "v2"
      cloudfront_url:
        description: CloudFront base URL pointing to Python index
        type: string
        default: "https://d25kgig7rdsyks.cloudfront.net/v2"
      rocm_version:
        description: ROCm version to pip install
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  build_pytorch_wheels:
    name: Build Windows PyTorch Wheels | ${{ inputs.amdgpu_family }} | Python ${{ inputs.python_version }}
    runs-on: ${{ github.repository_owner == 'ROCm' && 'azure-windows-scale-rocm' || 'windows-2022' }}
    env:
      CHECKOUT_ROOT: B:/src
      OUTPUT_DIR: ${{ github.workspace }}/output
      # Note the \ here instead of /. This should be used from 'cmd' not 'bash'!
      PACKAGE_DIST_DIR: ${{ github.workspace }}\output\packages\dist
      S3_BUCKET_PY: "therock-${{ inputs.release_type }}-python"
      optional_build_prod_arguments: ""
    outputs:
      torch_version: ${{ steps.build-pytorch-wheels.outputs.torch_version }}
    defaults:
      run:
        # Note: there are mixed uses of 'bash' (this default) and 'cmd' below
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Configure Git for Windows filesystem 
        run: |
          git config --system core.protectNTFS false
          git config --global core.precomposeunicode true
          git config --global core.longpaths true
          git config --system core.longpaths true

      - name: Configure Git Identity
        run: |
          git config --global user.name "therockbot"
          git config --global user.email "therockbot@amd.com"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ inputs.python_version }}

      # TODO(amd-justchen): share with build_windows_packages.yml. Include in VM image? Dockerfile?
      - name: Install requirements
        run: |
          # ninja pinned due to a bug in the 1.13.0 release:
          # https://github.com/ninja-build/ninja/issues/2616
          choco install --no-progress -y ninja --version 1.12.1
          choco install --no-progress -y awscli
          echo "$PATH;C:\Program Files\Amazon\AWSCLIV2" >> $GITHUB_PATH

      # After other installs, so MSVC get priority in the PATH.
      - name: Configure MSVC
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - name: Checkout PyTorch source repos (main branch)
        run: |
          git config --global core.longpaths true
          python ./external-builds/pytorch/pytorch_torch_repo.py checkout \
            --repo ${{ env.CHECKOUT_ROOT }}/torch \
            --repo-hashtag main
          python ./external-builds/pytorch/pytorch_audio_repo.py checkout \
            --repo ${{ env.CHECKOUT_ROOT }}/audio \
            --repo-hashtag main
          python ./external-builds/pytorch/pytorch_vision_repo.py checkout \
            --repo ${{ env.CHECKOUT_ROOT }}/vision \
            --repo-hashtag main

      - name: Diagnose missing files
        shell: bash
        run: |
          echo "=== Running Git diagnostics across all repos (including submodules) ==="

          REPOS="$CHECKOUT_ROOT/torch $CHECKOUT_ROOT/audio $CHECKOUT_ROOT/vision"

          for repo in $REPOS; do
            if [ ! -d "$repo/.git" ]; then
              echo "Skipping $repo (not a git repo)"
              continue
            fi

            echo ""
            echo "===== Checking $repo ====="
            cd "$repo"

            echo "--- git status warnings (top-level) ---"
            git status 2>&1 | grep "could not open directory" || true

            if [ -d "onnx/backend/test/data/node" ]; then
              echo "--- Checking ONNX test data in $repo ---"
              find onnx/backend/test/data/node -type f | head -10 | while read -r path; do
                echo "Checking: $path"
                [ -f "$path" ] && echo "  Exists OK" || echo "  Missing"
                python -c "import os,sys,pathlib; p=sys.argv[1]; print('  Path length:', len(str(pathlib.Path(p).resolve())))" "$path" || true
                git ls-files --error-unmatch "$path" >/dev/null 2>&1 \
                  && echo "  Tracked by Git OK" \
                  || echo "  Not tracked by Git"
              done
            fi

            echo ""
            echo "--- Submodule list (recursive) ---"
            # List submodules (paths are in column 2)
            git submodule status --recursive | awk '{print $2}' > /tmp/submods.txt || true

            while read -r sm; do
              [ -z "$sm" ] && continue
              if [ ! -d "$sm/.git" ]; then
                echo ">>> Submodule $sm (no .git dir) — skipping"
                continue
              fi

              echo ""
              echo ">>> Submodule: $sm"
              (
                cd "$sm"
                echo "--- git status warnings (submodule) ---"
                git status 2>&1 | grep "could not open directory" || true

                if [ -d "onnx/backend/test/data/node" ]; then
                  echo "--- Checking ONNX test data in submodule $sm ---"
                  # (No python -c here to avoid nested quoting issues)
                  find onnx/backend/test/data/node -type f | head -10 | while read -r sp; do
                    echo "Checking: $sp"
                    [ -f "$sp" ] && echo "  Exists OK" || echo "  Missing"
                    git ls-files --error-unmatch "$sp" >/dev/null 2>&1 \
                      && echo "  Tracked by Git OK" \
                      || echo "  Not tracked by Git"
                  done
                fi
              )
            done < /tmp/submods.txt
          done
