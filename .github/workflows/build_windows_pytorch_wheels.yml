name: Build Windows PyTorch Wheels

on:
  workflow_call:
    inputs:
      amdgpu_family:
        required: true
        type: string
      python_version:
        required: true
        type: string
      release_type:
        description: The type of release to build ("nightly", or "dev")
        required: true
        type: string
      s3_subdir:
        description: S3 subdirectory, not including the GPU-family
        required: true
        type: string
      cloudfront_url:
        description: CloudFront URL pointing to Python index
        required: true
        type: string
      rocm_version:
        description: ROCm version to pip install
        type: string
  workflow_dispatch:
    inputs:
      amdgpu_family:
        type: choice
        options:
          - gfx110X-dgpu
          - gfx1151
          - gfx120X-all
          - gfx94X-dcgpu
          - gfx950-dcgpu
        default: gfx1151
      python_version:
        required: true
        type: string
        default: "3.12"
      release_type:
        description: The type of release to build ("nightly", or "dev")
        type: string
        default: "dev"
      s3_subdir:
        description: S3 subdirectory, not including the GPU-family
        type: string
        default: "v2"
      cloudfront_url:
        description: CloudFront base URL pointing to Python index
        type: string
        default: "https://d25kgig7rdsyks.cloudfront.net/v2"
      rocm_version:
        description: ROCm version to pip install
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  build_pytorch_wheels:
    name: Build Windows PyTorch Wheels | ${{ inputs.amdgpu_family }} | Python ${{ inputs.python_version }}
    runs-on: ${{ github.repository_owner == 'ROCm' && 'azure-windows-scale-rocm' || 'windows-2022' }}
    env:
      CHECKOUT_ROOT: B:/src
      OUTPUT_DIR: ${{ github.workspace }}/output
      # Note the \ here instead of /. This should be used from 'cmd' not 'bash'!
      PACKAGE_DIST_DIR: ${{ github.workspace }}\output\packages\dist
      S3_BUCKET_PY: "therock-${{ inputs.release_type }}-python"
      optional_build_prod_arguments: ""
    outputs:
      torch_version: ${{ steps.build-pytorch-wheels.outputs.torch_version }}
    defaults:
      run:
        # Note: there are mixed uses of 'bash' (this default) and 'cmd' below
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Configure Git for Windows filesystem 
        run: |
          git config --system core.protectNTFS false
          git config --global core.precomposeunicode true
          git config --global core.longpaths true
          git config --system core.longpaths true

      - name: Configure Git Identity
        run: |
          git config --global user.name "therockbot"
          git config --global user.email "therockbot@amd.com"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ inputs.python_version }}

      # TODO(amd-justchen): share with build_windows_packages.yml. Include in VM image? Dockerfile?
      - name: Install requirements
        run: |
          # ninja pinned due to a bug in the 1.13.0 release:
          # https://github.com/ninja-build/ninja/issues/2616
          choco install --no-progress -y ninja --version 1.12.1
          choco install --no-progress -y awscli
          echo "$PATH;C:\Program Files\Amazon\AWSCLIV2" >> $GITHUB_PATH

      # After other installs, so MSVC get priority in the PATH.
      - name: Configure MSVC
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - name: Checkout PyTorch source repos (main branch)
        run: |
          git config --global core.longpaths true
          python ./external-builds/pytorch/pytorch_torch_repo.py checkout \
            --repo ${{ env.CHECKOUT_ROOT }}/torch \
            --repo-hashtag main
          python ./external-builds/pytorch/pytorch_audio_repo.py checkout \
            --repo ${{ env.CHECKOUT_ROOT }}/audio \
            --repo-hashtag main
          python ./external-builds/pytorch/pytorch_vision_repo.py checkout \
            --repo ${{ env.CHECKOUT_ROOT }}/vision \
            --repo-hashtag main

      - name: Diagnose submodules 
        shell: bash
        run: |
          echo "=== Diagnose submodules ==="
          set -euo pipefail

          # Make sure submodules are at least initialized so we can inspect them
          git config core.longpaths true || true
          git submodule sync --recursive || true
          git submodule update --init --recursive --jobs 8 || true

          SM_LIST_FILE="/tmp/submods.txt"
          echo ""
          echo "--- Collecting submodule status ---"
          git submodule status --recursive > "$SM_LIST_FILE" || true

          echo ""
          echo ">>> Top-level repo: $(pwd)"
          echo "--- git status (top-level, ignoring submodules) ---"
          git status --porcelain -u --ignore-submodules || true

          echo ""
          echo "--- Top-level ONNX sample ---"
          top_test_path="onnx/backend/test/data/node"
          if [ -d "$top_test_path" ]; then
            find "$top_test_path" -type f | head -10 | while read -r p; do
              [ -f "$p" ] && echo "  Exists: $p" || echo "  Missing: $p"
            done
          else
            echo "  No ONNX test data dir at $(pwd)/$top_test_path"
          fi

          echo ""
          echo "--- Walking submodules (NO LFS checks) ---"
          while read -r line; do
            sha_raw=$(printf "%s\n" "$line" | awk '{print $1}')
            sm_path=$(printf "%s\n" "$line" | awk '{print $2}')
            [ -n "${sm_path:-}" ] || continue

            echo ""
            echo ">>> Submodule: $sm_path"

            if [ ! -d "$sm_path" ]; then
              echo "  ERROR: path missing"
              continue
            fi

            if (cd "$sm_path" && git rev-parse --is-inside-work-tree >/dev/null 2>&1); then
              :
            else
              echo "  ERROR: not a git work-tree (.git missing or invalid)"
              continue
            fi

            (
              cd "$sm_path"

              # Clean/dirty
              dirty=$(git status --porcelain -u --ignore-submodules)
              if [ -n "$dirty" ]; then
                echo "  Status: DIRTY"
                echo "$dirty"
              else
                echo "  Status: clean"
              fi

              # Commit alignment with recorded index
              sha_expected="${sha_raw#[-+ ]}"
              sha_expected="${sha_expected%% *}"
              sha_actual=$(git rev-parse HEAD 2>/dev/null || echo "")

              case "$sha_raw" in
                -*)
                  echo "  WARNING: submodule not initialized or checkout incomplete (status='$sha_raw')"
                  ;;
                +*)
                  echo "  NOTE: submodule commit differs from recorded index"
                  echo "        expected: $sha_expected"
                  echo "        actual  : $sha_actual"
                  ;;
                *)
                  if [ -n "$sha_expected" ] && [ "$sha_expected" != "$sha_actual" ]; then
                    echo "  WARNING: HEAD ($sha_actual) != expected ($sha_expected)"
                  else
                    echo "  Commit OK: $sha_actual"
                  fi
                  ;;
              esac

              # Small ONNX presence probe
              test_path="onnx/backend/test/data/node"
              if [ -d "$test_path" ]; then
                echo "  ONNX sample in $sm_path:"
                find "$test_path" -type f | head -5 | while read -r p; do
                  [ -f "$p" ] && echo "    Exists: $p" || echo "    Missing: $p"
                done
              else
                echo "  No ONNX test data dir in $sm_path (looked for: $test_path)"
              fi
            )
          done < "$SM_LIST_FILE"

          echo ""
          echo "=== Diagnose submodules complete (NO LFS) ==="
