name: Build Linux Runfile Installer

on:
  push: 
  workflow_call:
    inputs:
  #     artifact_group:
  #       description: gfx arch group for the s3 server
  #       type: string
  #       default: gfx110x
  #     artifact_run_id:
  #       description: workflow run id to download the artifacts from.
  #       required: true
  #       type: string

      # isdev:
      #   description: Set to True if this is a developer triggered job. Ensures any binaries are uploaded to rocm.devreleases.amd.com
      #   default: true
      pull_tag:
        description: Set build date in the format (YYYYMMDD) to specify nightly build to build runfile installer off of. Only needed if release_type is nightly.
        required: false
        type: string
      pull_run_id:
        description: Workflow run id of deb and rpm packages used to build runfile installer off of. Only needed if release_type is nightly.
        required: false
        type: string
      rocm_version:
        # description: ROCm version to append to the package (8.0.0, 8.0.1rc1, ...).
        description: ROCm version used to build runfile installer (7.12.0~20260218 for nightly, 7.11.0~rc2 for 7.11 prerelease RC2 or 7.12.0 if you're triggering the job manually)
        required: true
        type: string
      release_type:
        description: The type of release to build ("dev", "nightly", or "prerelease"). All developer-triggered jobs should use "dev"!
        # required: false
        type: string
        default: "dev"
      pull_type:
        description: Specify where you want to pull packages from ("nightly" or "prereleases") which pull from rocm.nightlies.amd.com or rocm.prereleases.amd.com
        type: string
        default: "nightly"
  workflow_dispatch:
    inputs:
  #     artifact_group:
  #       type: string
  #       default: gfx94X-dcgpu
  #     artifact_run_id:
  #       description: workflow run id to download the artifacts from
  #       type: string
  #     rocm_version:
  #       description: ROCm version to append to the package (8.0.0, 8.0.1rc1, ...).
  #       type: string
  #       default: "0.0.1"
      rocm_version:
        # description: ROCm version to append to the package (8.0.0, 8.0.1rc1, ...).
        description: ROCm version used to build runfile installer (7.12.0~20260218 for nightly, 7.11.0~rc2 for 7.11 prerelease RC2 or 7.12.0 if you're triggering the job manually).
        required: true
        type: string
      
      pull_pkg:
        description: Set base package name with optional type prefix (default: amdrocm-core-sdk). Can set it to base:amdrocm-amdsmi to quickly test your code. Otherwise, leave empty.
        required: false
        type: string

      release_type:
        description: The type of release to build. All developer-triggered jobs should use "dev"!
        type: choice
        options:
          - dev
          - nightly
          - prerelease
        default: "dev"
      pull_tag:
        description: Set build date in the format (YYYYMMDD) to specify nightly build to build runfile installer off of. Only needed if release_type is nightly.
        required: false
        type: string
      pull_run_id:
        description: Workflow run id of deb and rpm packages used to build runfile installer off of. Only needed if release_type is nightly.
        required: false
        type: string
      pull_type:
        description: Specify where you want to pull packages from, which pull from rocm.nightlies.amd.com or rocm.prereleases.amd.com
        type: choice
        options:
          - nightly
          - prerelease
        default: "nightly"
permissions:
  id-token: write
  contents: read

# run-name: Build Linux Runfile Installer (${{ inputs.artifact_group }}, ${{ inputs.rocm_version }}, ${{ inputs.native_package_type }}, ${{ inputs.package_suffix }}, ${{ inputs.release_type }})
run-name: Build Linux Runfile Installer Test job (${{ inputs.rocm_version }}, ${{ inputs.release_type }}, ${{ inputs.pull_type }}, ${{ inputs.pull_run_id }})

jobs:
  build_linux_runfile_installer:
    name: Build and Release Linux Runfile Installer
    strategy:
      fail-fast: false
    # runs-on: ${{ github.repository_owner == 'ROCm' && 'azure-linux-scale-rocm' || 'ubuntu-24.04' }}
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/rocm/therock_build_manylinux_x86_64@sha256:d6ae5712a9c7e8b88281d021e907b312cd8a26295b95690baef3e8dde4805858
    defaults:
      run:
        working-directory: build_tools/packaging/runfile-installer
    env:
      BUILD_IMAGE: ghcr.io/rocm/therock_build_manylinux_x86_64@sha256:d6ae5712a9c7e8b88281d021e907b312cd8a26295b95690baef3e8dde4805858
      # ARTIFACT_RUN_ID: ${{ inputs.artifact_run_id || github.run_id }}
      BUILD_RUN_ID: ${{ github.run_id }}
      OUTPUT_DIR: ${{ github.workspace }}/build
      # ARTIFACTS_DIR: ${{ github.workspace }}/build/artifacts
      # PACKAGE_DIST_DIR: ${{ github.workspace }}/build/packages
      RUNFILE_BUILD_DIR: ${{ github.workspace }}/build
      RELEASE_TYPE: ${{ inputs.release_type }}
      PULL_TAG: ${{ inputs.pull_tag }}
      PULL_RUN_ID: ${{ inputs.pull_run_id }}
      PULL_TYPE: ${{ inputs.pull_type }}
      PULL_PKG: ${{ inputs.pull_pkg }}
      ADDITIONAL_ARGS: "" # gets populated if user sets value of pull_pkg when trigger build.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set ROCM_VERSION
        run: |
          ROCM_VERSION=$(echo "${{ inputs.rocm_version }}" | cut -d'~' -f1)
          echo "Set value of ROCM_VERSION = '$ROCM_VERSION'"
          echo "ROCM_VERSION=$ROCM_VERSION" >> $GITHUB_ENV
        
      - name: Set PULL_TAG
        run: |
          if [[ -z $PULL_TAG ]]; then
            PULL_TAG=$(echo "${{ inputs.rocm_version }}" | cut -d'~' -f2)
            echo "Set value of PULL_TAG = '$PULL_TAG'"
            echo "PULL_TAG=$PULL_TAG" >> $GITHUB_ENV
          fi
        
      - name: Set MSCOMP
        run: |
          if [[ $RELEASE_TYPE == "dev" ]]; then
            MSCOMP=dev
          else
            MSCOMP=normal
          fi

          echo "Set value of MSCOMP = '$MSCOMP'"
          echo "MSCOMP=$MSCOMP" >> $GITHUB_ENV
      
      - name: Set ADDITIONAL_ARGS
        run: |
          if [[ -n $PULL_PKG ]]; then
            ADDITIONAL_ARGS="pullpkg=$PULL_PKG"
            echo "Set value of ADDITIONAL_ARGS = '$ADDITIONAL_ARGS'"
            echo "ADDITIONAL_ARGS=$ADDITIONAL_ARGS" >> $GITHUB_ENV
          fi

      # - name: Run setup-installer.sh
      #   run: bash setup-installer.sh rocm rocm-archs=gfx110x pull=prereleases pullbuild=7.11 pullrocmver=7.11

      - name: Run build-runfile-installer.sh (pull_type=nightly)
        if: ${{ inputs.pull_type == 'nightly' }}
        # env:
        #   PULL_TYPE: nightly
        run: |
          echo "Run command: bash build-runfile-installer.sh rocm rocm-archs=gfx110x pull=$PULL_TYPE pulltag=$PULL_TAG pullrunid=$PULL_RUN_ID buildrunid=$BUILD_RUN_ID pullrocmver=$ROCM_VERSION pullpkg=base:amdrocm-amdsmi noamdgpu nogui mscomp=$MSCOMP $ADDITIONAL_ARGS"

          bash build-runfile-installer.sh rocm rocm-archs=gfx110x pull=$PULL_TYPE pulltag=$PULL_TAG pullrunid=$PULL_RUN_ID buildrunid=$BUILD_RUN_ID pullrocmver=$ROCM_VERSION pullpkg=base:amdrocm-amdsmi noamdgpu nogui mscomp=$MSCOMP $ADDITIONAL_ARGS

          # bash build-runfile-installer.sh rocm rocm-archs=gfx110x pull=nightly pulltag=20260212 pullrunid=21933875966 buildrunid=1234 pullrocmver=7.12.0 pullpkg=base:amdrocm-amdsmi noamdgpu nogui mscomp=dev

      - name: Run build-runfile-installer.sh (pull_type=prerelease)
        if: ${{ inputs.pull_type == 'prerelease' }}
        # env:
        #   PULL_TYPE: prerelease
        run: |
          echo "Run command: bash build-runfile-installer.sh rocm rocm-archs=gfx110x pull=$PULL_TYPE pullrocmver=$ROCM_VERSION pulltag=$PULL_TAG buildrunid=$BUILD_RUN_ID pullpkg=base:amdrocm-amdsmi noamdgpu nogui mscomp=$MSCOMP ADDITIONAL_ARGS"

          bash build-runfile-installer.sh rocm rocm-archs=gfx110x pull=$PULL_TYPE pullrocmver=$ROCM_VERSION pulltag=$PULL_TAG buildrunid=$BUILD_RUN_ID pullpkg=base:amdrocm-amdsmi noamdgpu nogui mscomp=$MSCOMP ADDITIONAL_ARGS
      
      # - name: Run build-installer.sh
      #   run: bash build-installer.sh noamdgpu

      - name: Show .run file
        run: find . -name "*.run" -type f

      - name: Install AWS CLI
        working-directory: ${{ github.workspace }}
        run: bash ./dockerfiles/install_awscli.sh

      - name: Configure AWS Credentials
        if: ${{ github.repository_owner == 'ROCm' }}
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::692859939525:role/therock-${{ inputs.release_type || 'dev' }}

      - name: Upload runfile to S3
        if: ${{ github.repository_owner == 'ROCm' }}
        env:
          # S3_BUCKET_RUNFILE: "therock-${{ inputs.release_type }}-runfile"
          S3_BUCKET_RUNFILE: "therock-${{ env.RELEASE_TYPE }}-runfile"
          S3_SUBDIR: "$(date -u +%Y%m%d)-${{ github.run_id }}"
        run: |
          RUNFILE=$(find . -name "*.run" -type f | head -1)
          if [ -z "$RUNFILE" ]; then
            echo "ERROR: No .run file found"
            exit 1
          fi
          echo "Uploading $RUNFILE to s3://${{ env.S3_BUCKET_RUNFILE }}/$(date -u +%Y%m%d)-${{ github.run_id }}/"
          aws s3 cp "$RUNFILE" "s3://${{ env.S3_BUCKET_RUNFILE }}/$(date -u +%Y%m%d)-${{ github.run_id }}/"
