name: Test Native Linux Packages Install

on:
  workflow_call:
    inputs:
      repo_base_url:
        description: "Base repository URL (scheme + netloc, no trailing slash). repo_url is computed via get_url_repo_params get-repo-url using os_profile, gpg_key_url, and repo_sub_folder."
        required: true
        type: string
      repo_sub_folder:
        description: "Repo subfolder (e.g. YYYYMMDD-<id> for dev/nightly; empty for prerelease). Passed from build_native_linux_packages."
        required: false
        type: string
        default: ""
      release_type:
        description: "Release line (dev, nightly, prerelease). Passed to get_url_repo_params get-repo-url and logged; native_linux_package_install_test.py maps dev/nightly to nightly and prerelease to prerelease."
        required: true
        type: string
      gpg_key_url:
        description: "GPG key URL for signed repos"
        required: false
        type: string
        default: ""
      os_profile:
        description: OS profile (e.g., ubuntu2404, rhel10, sles16). Package type (deb/rpm) is derived from this.
        required: true
        type: string
      gfx_arch:
        description: GPU architecture for package names (e.g. gfx94x). Default gfx94x.
        required: false
        type: string
        default: "gfx94x"
      install_prefix:
        description: Installation prefix path (optional, defaults to /opt/rocm/core).
        required: false
        type: string
        default: "/opt/rocm/core"
      test_type:
        description: "Test type: sanity (install + basic verification), full (install + basic + rdhc). If not set, script default is used."
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      repo_base_url:
        description: "Base repository URL (no trailing slash)"
        required: true
        type: string
      repo_sub_folder:
        description: "Repo subfolder (e.g. YYYYMMDD-id; empty for prerelease)"
        type: string
        default: ""
      release_type:
        description: "Release line (dev, nightly, or prerelease)"
        required: true
        type: choice
        options:
          - dev
          - nightly
          - prerelease
      gpg_key_url:
        description: "GPG key URL for signed repos"
        type: string
        default: ""
      os_profile:
        description: OS profile (package type deb/rpm is derived from this).
        required: true
        type: choice
        options:
          - ubuntu2404
          - rhel10
          - sles16
      gfx_arch:
        description: GPU architecture (e.g. gfx94x)
        type: string
        default: "gfx94x"
      install_prefix:
        description: Installation prefix path
        type: string
        default: "/opt/rocm/core"
        required: false
      test_type:
        description: "Test type: sanity or full (optional; leave empty for script default)"
        type: string
        default: ""

permissions:
  id-token: write
  contents: read

run-name: Test - Native Linux packages Install (${{ inputs.os_profile }})

jobs:
  compute_repo_url:
    name: Get repo URL (get-repo-url)
    runs-on: ubuntu-24.04
    outputs:
      repo_url: ${{ steps.get-repo-url.outputs.repo_url }}
      pkg_type: ${{ steps.get-repo-url.outputs.pkg_type }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Get repo URL from params (get_url_repo_params get-repo-url)
        id: get-repo-url
        run: |
          case "${{ inputs.os_profile }}" in
            ubuntu*|debian*) PKG_TYPE="deb" ;;
            *) PKG_TYPE="rpm" ;;
          esac
          echo "pkg_type=${PKG_TYPE}" >> $GITHUB_OUTPUT
          python build_tools/packaging/linux/get_url_repo_params.py get-repo-url \
            --release-type "${{ inputs.release_type }}" \
            --native-package-type "${PKG_TYPE}" \
            --repo-base-url "${{ inputs.repo_base_url }}" \
            --os-profile "${{ inputs.os_profile }}" \
            --repo-sub-folder "${{ inputs.repo_sub_folder }}" >> $GITHUB_OUTPUT

  test_native_linux_packages_install:
    name: Test Native Linux Packages Installation - ${{ inputs.os_profile }}
    needs: [compute_repo_url]
    strategy:
      fail-fast: false
    runs-on: ${{ github.repository_owner == 'ROCm' && 'linux-gfx942-1gpu-ossci-rocm' || 'ubuntu-24.04' }}
    container:
      # Images by OS profile: sles* -> SUSE BCI 16; ubuntu*/debian* -> ubuntu:24.04; other rpm (e.g. rhel10) -> RHEL UBI 9.4.
      image: ${{ startsWith(inputs.os_profile, 'sles') && 'registry.suse.com/bci/bci-base:16.0' || ((startsWith(inputs.os_profile, 'ubuntu') || startsWith(inputs.os_profile, 'debian')) && 'ubuntu:24.04') || 'registry.access.redhat.com/ubi9/ubi:9.4' }}
      options: --ipc host
        --privileged
    env:
      REPO_URL: ${{ needs.compute_repo_url.outputs.repo_url }}
      GPG_KEY_URL: ${{ inputs.gpg_key_url || '' }}
      OS_PROFILE: ${{ inputs.os_profile }}
      PKG_TYPE: ${{ needs.compute_repo_url.outputs.pkg_type }}
      RELEASE_TYPE: ${{ inputs.release_type }}
      GFX_ARCH: ${{ inputs.gfx_arch || 'gfx94x' }}
      INSTALL_PREFIX: ${{ inputs.install_prefix || '/opt/rocm/core' }}
      TEST_TYPE: ${{ inputs.test_type || 'sanity' }}
    steps:
      - name: Install System Prerequisites
        run: |
          echo "Installing prerequisites for ${{ env.PKG_TYPE }} on container"

          if [ "${{ env.PKG_TYPE }}" = "deb" ]; then
            apt update
            apt install -y \
              wget \
              curl \
              ca-certificates \
              git \
              lsb-release
            if [ "$TEST_TYPE" = "full" ]; then
              echo "Extra OS packages for --test-type full (e.g. rdhc): pciutils, kmod, apt-utils"
              apt install -y pciutils kmod apt-utils
            fi
          elif [[ "${{ inputs.os_profile }}" == sles* ]]; then
            # SLES prerequisites (uses BCI base - zypper)
            zypper refresh
            zypper install -y \
              python313 \
              python313-pip \
              wget \
              curl \
              ca-certificates \
              git \
              lsb-release \
              update-alternatives
            if [ "$TEST_TYPE" = "full" ]; then
              echo "Extra OS packages for --test-type full on SLES (e.g. rdhc): pciutils, kmod"
              zypper install -y pciutils kmod
            fi
          else
            # rpm (non-SLES, e.g. rhel10): RHEL UBI 9.4; Use --allowerasing to handle curl-minimal conflict on RHEL UBI 9.4
            dnf install -y --allowerasing \
              python3.12 \
              python3.12-pip \
              wget \
              curl \
              ca-certificates \
              git \
              dnf-plugins-core
            if [ "$TEST_TYPE" = "full" ]; then
              echo "Extra OS packages for --test-type full (e.g. rdhc): pciutils, kmod"
              dnf install -y --allowerasing pciutils kmod
            fi
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        if: ${{ env.PKG_TYPE == 'deb' }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          if [ "${{ env.PKG_TYPE }}" = "deb" ]; then
            python -m pip install --upgrade pip
            python -m pip install -r build_tools/packaging/linux/tests/requirements.txt
          elif [[ "${{ inputs.os_profile }}" == sles* ]]; then
            python3.13 -m pip install --upgrade pip
            python3.13 -m pip install -r build_tools/packaging/linux/tests/requirements.txt
          else
            python3.12 -m pip install --upgrade pip
            python3.12 -m pip install -r build_tools/packaging/linux/tests/requirements.txt
          fi

      - name: Package Installation Test
        id: install-test
        run: |
          echo "TEST - OS:${{ inputs.os_profile }} REPO:${{ env.REPO_URL }} Arch:${{ env.GFX_ARCH }} Type:${{ env.RELEASE_TYPE }}"
          if [ "${{ env.PKG_TYPE }}" = "deb" ]; then
            python build_tools/packaging/linux/native_linux_package_install_test.py \
              --test-type "$TEST_TYPE" \
              --os-profile "$OS_PROFILE" \
              --repo-url "$REPO_URL" \
              --gfx-arch "$GFX_ARCH" \
              --install-prefix "$INSTALL_PREFIX" \
              --release-type "$RELEASE_TYPE" \
              --gpg-key-url "$GPG_KEY_URL"
          elif [[ "${{ inputs.os_profile }}" == sles* ]]; then
            python3.13 build_tools/packaging/linux/native_linux_package_install_test.py \
              --test-type "$TEST_TYPE" \
              --os-profile "$OS_PROFILE" \
              --repo-url "$REPO_URL" \
              --gfx-arch "$GFX_ARCH" \
              --install-prefix "$INSTALL_PREFIX" \
              --release-type "$RELEASE_TYPE" \
              --gpg-key-url "$GPG_KEY_URL"
          else
            python3.12 build_tools/packaging/linux/native_linux_package_install_test.py \
              --test-type "$TEST_TYPE" \
              --os-profile "$OS_PROFILE" \
              --repo-url "$REPO_URL" \
              --gfx-arch "$GFX_ARCH" \
              --install-prefix "$INSTALL_PREFIX" \
              --release-type "$RELEASE_TYPE" \
              --gpg-key-url "$GPG_KEY_URL"
          fi

      - name: Test Report
        if: always()
        run: |
          sep='=========================================================================='
          TT=$(echo "${TEST_TYPE:-sanity}" | tr '[:upper:]' '[:lower:]')
          case "$TT" in
            full)
              msg_ok='Package installation full verification completed successfully (repo setup, install, basic verification, RDHC).'
              msg_fail='Package installation full verification did not complete (repo setup, install, basic verification, or RDHC may have failed).'
              ;;
            simulate)
              msg_ok='Simulated package install completed successfully.'
              msg_fail='Simulated package install did not complete successfully.'
              ;;
            *)
              msg_ok='Package installation sanity verification completed successfully (repo setup, install, basic verification).'
              msg_fail='Package installation sanity verification did not complete (repo setup, install, or basic verification may have failed).'
              ;;
          esac

          printf '\n%s\nINSTALL TEST REPORT\n%s\n' "$sep" "$sep"

          if [ "${{ steps.install-test.outcome }}" = "success" ]; then
            printf 'INSTALLATION TEST PASSED\n\nSummary:\n - %s\n\nInstalled at: %s\nFrom: %s\n%s\n' \
              "$msg_ok" "${{ env.INSTALL_PREFIX }}" "${{ env.REPO_URL }}" "$sep"
          else
            printf 'INSTALLATION TEST FAILED\n\n%s\nPlease check the logs above for detailed error messages.\n%s\n' \
              "$msg_fail" "$sep"
            exit 1
          fi
