name: Release portable Linux PyTorch Wheels

on:
  workflow_call:
    inputs:
      amdgpu_family:
        required: true
        type: string
      release_type:
        description: The type of release to build ("dev", "nightly", or "prerelease"). All developer-triggered jobs should use "dev"!
        type: string
        default: "dev"
      s3_subdir:
        description: S3 subdirectory, not including the GPU-family
        type: string
        default: "v2"
      s3_staging_subdir:
        description: Staging subdirectory to push the wheels for test
        type: string
        default: "v2-staging"
      cloudfront_url:
        description: CloudFront URL pointing to Python index
        required: true
        type: string
      cloudfront_staging_url:
        description: CloudFront base URL pointing to staging Python index
        required: true
        type: string
      rocm_version:
        description: ROCm version to pip install (e.g. "7.10.0a20251124")
        type: string
      run_full_pytorch_tests:
        description: Run full PyTorch tests after nightly release wheel builds complete
        type: boolean
        default: false
      ref:
        description: "Branch, tag or SHA to checkout. Defaults to the reference or SHA that triggered the workflow."
        type: string
  workflow_dispatch:
    inputs:
      amdgpu_family:
        type: choice
        options:
          - gfx101X-dgpu
          - gfx103X-all
          - gfx110X-all
          - gfx1150
          - gfx1151
          - gfx1152
          - gfx1153
          - gfx120X-all
          - gfx900
          - gfx906
          - gfx908
          - gfx90a
          - gfx94X-dcgpu
          - gfx950-dcgpu
        default: gfx94X-dcgpu
      release_type:
        description: The type of release to build ("dev", "nightly", or "prerelease"). All developer-triggered jobs should use "dev"!
        type: string
        default: "dev"
      s3_subdir:
        description: S3 subdirectory, not including the GPU-family
        type: string
        default: "v2"
      s3_staging_subdir:
        description: "Staging subdirectory to push the wheels for test"
        type: string
        default: "v2-staging"
      cloudfront_url:
        description: CloudFront URL pointing to Python index
        type: string
        default: "https://rocm.devreleases.amd.com/v2"
      cloudfront_staging_url:
        description: CloudFront base URL pointing to staging Python index
        type: string
        default: "https://rocm.devreleases.amd.com/v2-staging"
      rocm_version:
        description: ROCm version to pip install (e.g. "7.10.0a20251124")
        type: string
      run_full_pytorch_tests:
        description: Run full PyTorch tests after nightly release wheel builds complete
        type: boolean
        default: false
      ref:
        description: "Branch, tag or SHA to checkout. Defaults to the reference or SHA that triggered the workflow."
        type: string
        default: ''

permissions:
  id-token: write
  contents: read

run-name: Release portable Linux PyTorch Wheels (${{ inputs.release_type }}, ${{ inputs.rocm_version }}, ${{ inputs.amdgpu_family }})

jobs:
  release:
    name: Release | ${{ inputs.amdgpu_family }} | py ${{ matrix.python_version }} | torch ${{ matrix.pytorch_git_ref }}
    strategy:
      fail-fast: false
      matrix:
        python_version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        pytorch_git_ref: ["release/2.8", "release/2.9", "release/2.10", "release/2.11", "release/2.12", "nightly"]
        # redefine arch as inputs.x vars are not available in matrix context
        arch: ["${{ inputs.amdgpu_family }}"]
        exclude:
        # Python 3.14 support was added in PyTorch 2.9
        - pytorch_git_ref: "release/2.8"
          python_version: "3.14"
        # gfx1153 support is only available in pytorch 2.10+
        # see https://github.com/ROCm/TheRock/issues/2723
        - arch: "gfx1153"
          pytorch_git_ref: "release/2.8"
        - arch: "gfx1153"
          pytorch_git_ref: "release/2.9"

    uses: ./.github/workflows/build_portable_linux_pytorch_wheels.yml
    with:
      amdgpu_family: ${{ inputs.amdgpu_family }}
      python_version: ${{ matrix.python_version }}
      release_type: ${{ inputs.release_type }}
      s3_subdir: ${{ inputs.s3_subdir }}
      s3_staging_subdir: ${{ inputs.s3_staging_subdir }}
      cloudfront_url: ${{ inputs.cloudfront_url }}
      cloudfront_staging_url: ${{ inputs.cloudfront_staging_url }}
      rocm_version: ${{ inputs.rocm_version }}
      pytorch_git_ref: ${{ matrix.pytorch_git_ref }}
      ref: ${{ inputs.ref || '' }}

  dispatch_pytorch_wheels_full_test:
    name: Dispatch PyTorch Full Test | ${{ inputs.amdgpu_family }} | torch ${{ matrix.pytorch_git_ref }}
    if: >-
      ${{
        inputs.run_full_pytorch_tests &&
        inputs.release_type == 'nightly' &&
        inputs.amdgpu_family == 'gfx94X-dcgpu' &&
        needs.release.result == 'success'
      }}
    needs: [release]
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - pytorch_git_ref: release/2.9
            pytorch_git_repo: ROCm/pytorch
            torch_package: "torch==2.9.*"
            dispatch_on: daily
          - pytorch_git_ref: release/2.10
            pytorch_git_repo: ROCm/pytorch
            torch_package: "torch==2.10.*"
            dispatch_on: daily
          - pytorch_git_ref: release/2.11
            pytorch_git_repo: ROCm/pytorch
            torch_package: "torch==2.11.*"
            dispatch_on: daily
          - pytorch_git_ref: nightly
            pytorch_git_repo: pytorch/pytorch
            torch_package: "torch"
            dispatch_on: sunday
    env:
      AMDGPU_FAMILY: ${{ inputs.amdgpu_family }}
      PACKAGE_INDEX_URL: ${{ inputs.cloudfront_staging_url }}
      PYTHON_VERSION: "3.12"
      TORCH_PACKAGE: ${{ matrix.torch_package }}
    steps:
      - name: Check full test cadence
        id: cadence
        run: |
          if [ "${{ matrix.dispatch_on }}" = "daily" ] || [ "$(date -u +%u)" = "7" ]; then
            echo "dispatch=true" >> "$GITHUB_OUTPUT"
          else
            echo "dispatch=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve staged torch version
        if: ${{ steps.cadence.outputs.dispatch == 'true' }}
        id: resolve
        run: |
          INDEX_URL="${PACKAGE_INDEX_URL%/}/${AMDGPU_FAMILY}"
          REPORT_PATH="${RUNNER_TEMP}/torch-install-report.json"

          python -m pip install "${TORCH_PACKAGE}" \
            --dry-run \
            --ignore-installed \
            --no-deps \
            --only-binary=:all: \
            --pre \
            --index-url "${INDEX_URL}" \
            --python-version "${PYTHON_VERSION}" \
            --platform linux_x86_64 \
            --report "${REPORT_PATH}"

          TORCH_VERSION=$(python -c 'import json, sys; print(json.load(open(sys.argv[1]))["install"][0]["metadata"]["version"])' "${REPORT_PATH}")

          if [ -z "${TORCH_VERSION}" ]; then
            echo "::error::Failed to resolve ${TORCH_PACKAGE} from ${INDEX_URL}"
            exit 1
          fi

          echo "torch_version=${TORCH_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved torch_version: ${TORCH_VERSION}"

      - name: Dispatch full PyTorch test workflow
        if: ${{ steps.cadence.outputs.dispatch == 'true' }}
        uses: benc-uk/workflow-dispatch@7a027648b88c2413826b6ddd6c76114894dc5ec4 # v1.3.1
        with:
          workflow: test_pytorch_wheels_full.yml
          inputs: |
            { "amdgpu_family": "${{ inputs.amdgpu_family }}",
              "test_runs_on": "linux-gfx942-1gpu-ossci-rocm",
              "test_runs_on_multi_gpu": "linux-gfx942-8gpu-ossci-rocm",
              "package_index_url": "${{ inputs.cloudfront_staging_url }}",
              "python_version": "3.12",
              "torch_version": "${{ steps.resolve.outputs.torch_version }}",
              "pytorch_git_ref": "${{ matrix.pytorch_git_ref }}",
              "pytorch_git_repo": "${{ matrix.pytorch_git_repo }}",
              "test_configs": "default distributed inductor",
              "tests_to_include": ""
            }
