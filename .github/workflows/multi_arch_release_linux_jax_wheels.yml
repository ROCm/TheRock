# Multi-arch release variant of the JAX wheel build flow.
#
# This workflow is the JAX counterpart to
# multi_arch_release_linux_pytorch_wheels.yml:
#   - one matrixed build job per (python_version, jax_ref)
#   - build directly from a TheRock tarball
#   - upload wheels to the release staging bucket
#
# This is build-only. Testing/promotion are handled elsewhere.

name: Multi-Arch Release Linux JAX Wheels

on:
  workflow_call:
    inputs:
      amdgpu_family:
        description: AMD GPU family to build JAX for.
        type: string
        required: true
      release_type:
        description: 'Release type: "dev", "nightly", or "prerelease".'
        type: string
        required: true
      rocm_version:
        description: ROCm package version to install and build against.
        type: string
        required: true
      s3_subdir:
        description: S3 subdirectory, not including the GPU-family.
        type: string
        default: "v2"
      s3_staging_subdir:
        description: Staging subdirectory to push the wheels for test.
        type: string
        default: "v2-staging"
      tar_url:
        description: URL to the TheRock tarball to build against.
        type: string
        required: true
      repository:
        description: Repository to checkout. Defaults to github.repository.
        type: string
        default: ""
      ref:
        description: Branch, tag, or SHA to checkout.
        type: string
        default: ""
      cache_type:
        description: Compiler cache type ('none', 'sccache', or 'ccache').
        type: string
        default: "none"
  workflow_dispatch:
    inputs:
      amdgpu_family:
        type: choice
        options:
          - gfx101X-dgpu
          - gfx103X-all
          - gfx110X-all
          - gfx1150
          - gfx1151
          - gfx1152
          - gfx1153
          - gfx120X-all
          - gfx900
          - gfx906
          - gfx908
          - gfx90a
          - gfx94X-dcgpu
          - gfx950-dcgpu
        default: gfx94X-dcgpu
      release_type:
        description: 'Release type: "dev", "nightly", or "prerelease".'
        type: choice
        options:
          - dev
          - nightly
          - prerelease
        default: dev
      rocm_version:
        description: ROCm package version to install and build against.
        type: string
        required: true
      s3_subdir:
        description: S3 subdirectory, not including the GPU-family.
        type: string
        default: "v2"
      s3_staging_subdir:
        description: Staging subdirectory to push the wheels for test.
        type: string
        default: "v2-staging"
      tar_url:
        description: URL to the TheRock tarball to build against.
        type: string
        required: true
      repository:
        description: Repository to checkout.
        type: string
        default: ""
      ref:
        description: Branch, tag, or SHA to checkout.
        type: string
        default: ""
      cache_type:
        description: Compiler cache type.
        type: choice
        options:
          - none
          - sccache
          - ccache
        default: none

permissions:
  contents: read
  id-token: write
  packages: read

run-name: Multi-Arch Release Linux JAX Wheels (${{ inputs.amdgpu_family }}, ${{ inputs.release_type }}, ${{ inputs.rocm_version }})

jobs:
  build_jax_wheels:
    name: Build Linux JAX Wheels (${{ inputs.amdgpu_family }}, ${{ matrix.python_version }}, ${{ inputs.release_type }})

    strategy:
      fail-fast: false
      matrix:
        python_version: ["3.11", "3.12", "3.13", "3.14"]
        jax_ref: ["rocm-jaxlib-v0.8.2", "rocm-jaxlib-v0.9.0", "rocm-jaxlib-v0.9.1"]
        include:
          # JAX >= 0.9.1 installs jaxlib from upstream PyPI.
          - jax_ref: "rocm-jaxlib-v0.8.2"
            build_jaxlib: true
          - jax_ref: "rocm-jaxlib-v0.9.0"
            build_jaxlib: true
          - jax_ref: "rocm-jaxlib-v0.9.1"
            build_jaxlib: false
    runs-on: ${{ github.repository_owner == 'ROCm' && 'azure-linux-scale-rocm' || 'ubuntu-24.04' }}
    permissions:
      contents: read
      id-token: write
      packages: read
    env:
      PACKAGE_DIST_DIR: ${{ github.workspace }}/rocm-jax/jax_rocm_plugin/wheelhouse
      S3_BUCKET_PY: "therock-${{ inputs.release_type }}-python"
      RELEASE_TYPE: ${{ inputs.release_type }}
    steps:
      - name: Checkout TheRock
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || '' }}

      - name: Checkout rocm-jax
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: rocm-jax
          repository: ROCm/rocm-jax
          ref: ${{ matrix.jax_ref }}

      - name: Checkout JAX (source for jaxlib build)
        if: ${{ matrix.build_jaxlib }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: jax
          repository: ROCm/jax
          ref: ${{ matrix.jax_ref }}

      - name: Configure Git Identity
        run: |
          git config --global user.name "therockbot"
          git config --global user.email "therockbot@amd.com"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python_version }}

      - name: Select Python version
        run: |
          python build_tools/github_actions/python_to_cp_version.py \
            --python-version ${{ matrix.python_version }}

      - name: Add selected Python version to PATH
        run: |
          python_dir="/opt/python/${{ env.cp_version }}"
          if ! [ -x "${python_dir}/bin/python" ]; then
            echo "ERROR: Could not find python: ${python_dir}"
            exit 1
          fi
          echo "${python_dir}/bin" >> "$GITHUB_PATH"

      - name: Install python deps for CI
        run: |
          pip install -r rocm-jax/jax_rocm_plugin/requirements-ci.txt

      - name: Determine build arguments
        run: |
          if [ "${{ matrix.build_jaxlib }}" = "true" ]; then
            echo "SOURCE_ARG=--jax-source-dir=${{ github.workspace }}/jax" >> "$GITHUB_ENV"
          else
            echo "SOURCE_ARG=" >> "$GITHUB_ENV"
          fi

      - name: Build JAX wheels
        env:
          ROCM_VERSION: ${{ inputs.rocm_version }}
        run: |
          pushd rocm-jax
          python3 build/ci_build \
            --compiler=clang \
            --python-versions="${{ matrix.python_version }}" \
            --rocm-version="${ROCM_VERSION}" \
            --therock-path="${{ inputs.tar_url }}" \
            ${SOURCE_ARG} \
            dist_wheels
          popd

      - name: Generate JAX manifest
        if: ${{ matrix.build_jaxlib }}
        working-directory: build_tools
        run: |
          python3 -m github_actions.generate_jax_manifest \
            --manifest-dir "${{ env.PACKAGE_DIST_DIR }}/manifests" \
            --python-version "${{ matrix.python_version }}" \
            --jax-git-ref "${{ matrix.jax_ref }}" \
            --jax-dir "${{ github.workspace }}/jax"

      - name: Extract JAX versions from built wheels
        id: write_jax_versions
        run: |
          python ./build_tools/github_actions/write_jax_versions.py \
            --dist-dir ${{ env.PACKAGE_DIST_DIR }}

      - name: Install AWS CLI
        if: ${{ github.repository_owner == 'ROCm' }}
        run: bash ./dockerfiles/install_awscli.sh

      - name: Configure AWS Credentials
        if: ${{ github.repository_owner == 'ROCm' }}
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          aws-region: us-east-2
          role-to-assume: arn:aws:iam::692859939525:role/therock-${{ inputs.release_type }}

      - name: Upload wheels to staging S3
        if: ${{ github.repository_owner == 'ROCm' }}
        run: |
          aws s3 cp ${{ env.PACKAGE_DIST_DIR }}/ \
            s3://${{ env.S3_BUCKET_PY }}/${{ inputs.s3_staging_subdir }}/${{ inputs.amdgpu_family }}/ \
            --recursive --exclude "*" --include "*.whl"

      - name: Install boto3 for manifest upload
        if: ${{ github.repository_owner == 'ROCm' && matrix.build_jaxlib }}
        run: |
          python3 -m pip install boto3

      - name: Upload JAX manifest to artifacts S3
        if: ${{ github.repository_owner == 'ROCm' && matrix.build_jaxlib }}
        working-directory: build_tools
        run: |
          python3 -m github_actions.upload_jax_manifest \
            --dist-dir "${{ env.PACKAGE_DIST_DIR }}" \
            --run-id "${{ github.run_id }}" \
            --amdgpu-family "${{ inputs.amdgpu_family }}" \
            --python-version "${{ matrix.python_version }}" \
            --jax-git-ref "${{ matrix.jax_ref }}"

      - name: (Re-)Generate Python package release index
        if: ${{ github.repository_owner == 'ROCm' }}
        env:
          CUSTOM_PREFIX: "${{ inputs.s3_staging_subdir }}/${{ inputs.amdgpu_family }}"
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip3 install boto3 packaging
          python3 ./build_tools/third_party/s3_management/manage.py ${{ env.CUSTOM_PREFIX }}
