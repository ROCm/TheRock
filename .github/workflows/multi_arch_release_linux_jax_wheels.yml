# Multi-arch release variant of the JAX wheel build flow.
#
# Built shape:
#   - One build/ci_build invocation per (python_version, jax_ref)
#     matrix cell.
#   - Builds directly against a TheRock ROCm tarball passed in
#     via inputs.tar_url.
#   - Uploads built wheels to:
#       s3://therock-{release_type}-python/v2-staging/
#
# Triggered via workflow_call from
# multi_arch_release_linux.yml's build_jax_wheels job.
#
# Build phase only: testing and promotion are deferred follow-ups.
#
# Similar orchestration pattern to:
#   .github/workflows/multi_arch_release_linux_pytorch_wheels.yml
#
# Related:
#   https://github.com/ROCm/TheRock/issues/3878

name: Multi-Arch Release Linux JAX Wheels

on:
  workflow_call:
    inputs:
      amdgpu_families:
        description: 'Comma-separated list of Linux GPU families. "all" = all, "none" = skip platform.'
        type: string
        required: true
      release_type:
        description: 'Release type: "dev", "nightly", or "prerelease".'
        type: string
        required: true
      rocm_version:
        description: ROCm package version to build against.
        type: string
        required: true
      tar_url:
        description: URL to the TheRock tarball used for the build.
        type: string
        required: true
      repository:
        description: Repository to checkout. Defaults to github.repository.
        type: string
        default: ""
      ref:
        description: Branch, tag, or SHA to checkout.
        type: string
        default: ""

  workflow_dispatch:
    inputs:
      amdgpu_families:
        description: 'Comma-separated list of Linux GPU families. "all" = all, "none" = skip platform.'
        type: string
        default: "gfx94X-dcgpu"
      release_type:
        description: Release type for developer-triggered runs.
        type: choice
        options:
          - dev
        default: dev
      rocm_version:
        description: ROCm package version to build against.
        type: string
        required: true
      tar_url:
        description: URL to the TheRock tarball used for the build.
        type: string
        required: true
      repository:
        description: Repository to checkout.
        type: string
        default: ""
      ref:
        description: Branch, tag, or SHA to checkout.
        type: string
        default: ""

permissions:
  contents: read
  id-token: write
  packages: read

run-name: Multi-Arch Release Linux JAX Wheels (${{ inputs.release_type }}, ${{ inputs.rocm_version }}, ${{ inputs.amdgpu_families }})

jobs:
  build_jax_wheels:
    name: Build Linux JAX Wheels (${{ inputs.release_type }}, ${{ inputs.rocm_version }}, ${{ inputs.amdgpu_families }})

    strategy:
      fail-fast: false
      matrix:
        python_version: ["3.11", "3.12", "3.13", "3.14"]
        jax_ref:
          - "rocm-jaxlib-v0.8.2"
          - "rocm-jaxlib-v0.9.0"
          - "rocm-jaxlib-v0.9.1"
        include:
          # JAX >= 0.9.1 installs jaxlib from upstream PyPI.
          - jax_ref: "rocm-jaxlib-v0.8.2"
            build_jaxlib: true
          - jax_ref: "rocm-jaxlib-v0.9.0"
            build_jaxlib: true
          - jax_ref: "rocm-jaxlib-v0.9.1"
            build_jaxlib: false

    runs-on: ${{ github.repository_owner == 'ROCm' && 'azure-linux-scale-rocm' || 'ubuntu-24.04' }}

    permissions:
      contents: read
      id-token: write
      packages: read

    env:
      PACKAGE_DIST_DIR: ${{ github.workspace }}/rocm-jax/jax_rocm_plugin/wheelhouse
      S3_BUCKET_PY: "therock-${{ inputs.release_type }}-python"
      RELEASE_TYPE: ${{ inputs.release_type }}

    steps:
      - name: Checkout TheRock
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || '' }}

      - name: Checkout rocm-jax
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: rocm-jax
          repository: ROCm/rocm-jax
          ref: ${{ matrix.jax_ref }}

      - name: Checkout JAX (source for jaxlib build)
        if: ${{ matrix.build_jaxlib }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: jax
          repository: ROCm/jax
          ref: ${{ matrix.jax_ref }}

      - name: Configure Git Identity
        run: |
          git config --global user.name "therockbot"
          git config --global user.email "therockbot@amd.com"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python_version }}

      - name: Select Python version
        run: |
          python build_tools/github_actions/python_to_cp_version.py \
            --python-version ${{ matrix.python_version }}

      - name: Add selected Python version to PATH
        run: |
          python_dir="/opt/python/${{ env.cp_version }}"
          if ! [ -x "${python_dir}/bin/python" ]; then
            echo "ERROR: Could not find python: ${python_dir}"
            exit 1
          fi
          echo "${python_dir}/bin" >> "$GITHUB_PATH"

      - name: Install python deps for CI
        run: |
          pip install -r rocm-jax/jax_rocm_plugin/requirements-ci.txt

      - name: Determine build arguments
        run: |
          if [ "${{ matrix.build_jaxlib }}" = "true" ]; then
            echo "SOURCE_ARG=--jax-source-dir=${{ github.workspace }}/jax" >> "$GITHUB_ENV"
          else
            echo "SOURCE_ARG=" >> "$GITHUB_ENV"
          fi

      - name: Build JAX wheels
        env:
          ROCM_VERSION: ${{ inputs.rocm_version }}
        working-directory: rocm-jax
        run: |
          python3 build/ci_build \
            --compiler=clang \
            --python-versions="${{ matrix.python_version }}" \
            --rocm-version="${ROCM_VERSION}" \
            --therock-path="${{ inputs.tar_url }}" \
            ${SOURCE_ARG} \
            dist_wheels

      - name: Extract JAX versions from built wheels
        run: |
          python ./build_tools/github_actions/write_jax_versions.py \
            --dist-dir "${{ github.workspace }}/rocm-jax/jax_rocm_plugin/wheelhouse"


