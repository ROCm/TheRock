# Standalone torchaudio GPU test job.
#
# TheRock's test_pytorch_wheels only installs and tests `torch`. This workflow
# installs the built torch + torchaudio wheels from a package index and
# exercises torchaudio's ROCm GPU extensions (rnnt loss, forced_align, and the
# CUDA CTC decoder) on a GPU runner -- the code paths enabled by ROCm/audio's
# HIPIFY port (ROCm/audio#17) and pinned via ROCm/pytorch#3382.

name: Test torchaudio Wheels

on:
  # A push trigger on the development branch lets this run before the workflow
  # exists on the default branch (workflow_dispatch requires the default branch).
  push:
    branches:
      - ethanwee/torchaudio-gpu-tests
  workflow_dispatch:
    inputs:
      amdgpu_family:
        description: GPU family to test (e.g. gfx110X-all)
        type: string
        default: "gfx110X-all"
      test_runs_on:
        description: Runner label with a GPU supported by amdgpu_family
        type: string
        default: "windows-gfx110X-gpu-rocm"
      python_version:
        type: string
        default: "3.12"
      package_index_url:
        description: Base Python package index URL (dev/nightly), without the GPU family subdir
        type: string
        required: true
      torch_version:
        description: torch package version to install
        type: string
        required: true
      torchaudio_version:
        description: torchaudio package version to install
        type: string
        required: true
      audio_repo:
        description: torchaudio repo to checkout test sources from
        type: string
        default: "ROCm/audio"
      audio_ref:
        description: torchaudio ref to checkout test sources from
        type: string
        default: "release/2.11.0.1"

run-name: Test torchaudio (${{ inputs.amdgpu_family || 'gfx110X-all' }}, ${{ inputs.torchaudio_version || 'default' }})

permissions:
  contents: read

jobs:
  test_torchaudio:
    name: Test torchaudio | ${{ inputs.amdgpu_family || 'gfx110X-all' }}
    runs-on: ${{ inputs.test_runs_on || 'windows-gfx110X-gpu-rocm' }}
    defaults:
      run:
        shell: bash
    env:
      VENV_DIR: ${{ github.workspace }}/.venv
      GPU_FAMILY: ${{ inputs.amdgpu_family || 'gfx110X-all' }}
      PKG_INDEX_URL: ${{ inputs.package_index_url || 'https://rocm.devreleases.amd.com/whl-multi-arch/' }}
      TORCH_VERSION: ${{ inputs.torch_version || '2.12.0+devrocm7.14.0.dev0.331251018497de4049c7d8447c7b2d1dcdfd012e' }}
      TORCHAUDIO_VERSION: ${{ inputs.torchaudio_version || '2.11.0.1+devrocm7.14.0.dev0.331251018497de4049c7d8447c7b2d1dcdfd012e' }}
      AUDIO_REPO: ${{ inputs.audio_repo || 'ethanwee1/audio' }}
      AUDIO_REF: ${{ inputs.audio_ref || 'ew/rocm-24803-hipify-gpu-ext' }}
    steps:
      - name: Checkout TheRock
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python_version || '3.12' }}

      - name: Expand GPU family to device extras
        id: expand
        run: |
          python build_tools/github_actions/expand_amdgpu_families.py \
            --amdgpu-families "${GPU_FAMILY}" \
            --output-mode=device-extras

      - name: Set up virtual environment (torch + torchaudio)
        timeout-minutes: 20
        run: |
          python build_tools/setup_venv.py ${VENV_DIR} \
            --packages "torch[${{ steps.expand.outputs.device_extras }}]==${TORCH_VERSION}" "torchaudio==${TORCHAUDIO_VERSION}" \
            --index-url=${PKG_INDEX_URL} \
            --activate-in-future-github-actions-steps

      - name: Install test requirements
        run: |
          python -m pip install numpy expecttest parameterized pytest
          pip freeze

      - name: rocm-sdk sanity
        timeout-minutes: 5
        run: rocm-sdk test || true

      - name: torchaudio GPU smoke test
        timeout-minutes: 10
        run: |
          python .github/scripts/torchaudio_gpu_smoke_test.py

      - name: Checkout torchaudio test sources
        run: |
          git clone --depth 1 --branch "${AUDIO_REF}" \
            "https://github.com/${AUDIO_REPO}.git" audio_src

      - name: torchaudio GPU unit tests
        timeout-minutes: 30
        run: |
          cd audio_src
          python -m pytest -v \
            test/torchaudio_unittest/models/rnnt/rnnt_gpu_test.py \
            test/torchaudio_unittest/models/decoder/cuda_ctc_decoder_test.py \
            test/torchaudio_unittest/functional/functional_cuda_test.py \
            -k "cuda or CUDA or gpu or GPU or rnnt or forced_align" \
            --continue-on-collection-errors --import-mode=importlib
