# Reusable single-build workflow for the Linux JAX wheel CI flow.
#
# This workflow is called once per CI matrix cell from multi_arch_ci_linux.yml.
#
# Built shape:
#   - One manylinux JAX wheel build for one python_version and jax_ref matrix cell.
#   - Installs ROCm packages from the run-scoped CI find-links URL.
#   - Uploads the resulting wheels to run-scoped CI Python artifacts.
#   - Build-only for the first CI rollout; test wiring should be added separately.

name: Multi-Arch Build Linux JAX Wheels (CI)

on:
  workflow_call:
    inputs:
      artifact_group:
        description: "Artifact group for CI artifact upload."
        type: string
        required: true
      python_version:
        type: string
        default: "3.12"
      jax_repository:
        description: "Repository containing the JAX release branch."
        type: string
        required: true
      build_mode:
        description: "Build mode. CI currently supports manylinux only."
        type: string
        required: true
      gfx_arch:
        description: "ROCm device package selector used for the manylinux build (e.g. device-gfx942, device-gfx950, or device-all)."
        type: string
        required: false
        default: ""
      jax_ref:
        description: "JAX / rocm-jax release ref."
        type: string
        required: true
      rocm_version:
        description: "ROCm package version to install and build against."
        type: string
        required: true
      rocm_package_find_links_url:
        description: "URL for pip --find-links to install ROCm packages for the JAX manylinux build."
        type: string
        default: ""
      repository:
        description: "Repository to checkout. Defaults to github.repository."
        type: string
        default: ""
      ref:
        description: "Branch, tag, or SHA to checkout. Defaults to the triggering ref."
        type: string
        default: ""
      test_amdgpu_family:
        description: "GPU family to run JAX tests on. Empty means skip tests."
        type: string
        default: ""
      test_size:
        description: "JAX test size to run (small|medium|large)."
        type: string
        default: "small"
    outputs:
      package_find_links_url:
        description: "pip --find-links URL for CI-uploaded JAX wheels."
        value: ${{ jobs.build_jax_wheels.outputs.package_find_links_url }}
      jax_version:
        value: ${{ jobs.build_jax_wheels.outputs.jax_version }}
      jaxlib_version:
        value: ${{ jobs.build_jax_wheels.outputs.jaxlib_version }}
      jax_plugin_version:
        value: ${{ jobs.build_jax_wheels.outputs.jax_plugin_version }}
      jax_pjrt_version:
        value: ${{ jobs.build_jax_wheels.outputs.jax_pjrt_version }}
  workflow_dispatch:
    inputs:
      artifact_group:
        description: "Artifact group for CI artifact upload."
        type: string
        required: true
      python_version:
        type: string
        default: "3.12"
      jax_repository:
        description: "GitHub repository in owner/repo format containing the JAX release branch."
        type: string
        default: "ROCm/jax"
      build_mode:
        description: "Build mode."
        type: choice
        options:
          - manylinux
        required: true
      gfx_arch:
        description: "ROCm device package selector used for the manylinux build (e.g. device-gfx942, device-gfx950, or device-all)."
        type: string
        required: false
        default: ""
      jax_ref:
        description: "JAX / rocm-jax release ref (e.g. rocm-jaxlib-v0.10.0, rocm-jaxlib-v0.10.2)."
        type: string
        required: true
      rocm_version:
        description: "ROCm package version to install and build against."
        type: string
        required: true
      rocm_package_find_links_url:
        description: "URL for pip --find-links to install ROCm packages for the JAX manylinux build."
        type: string
        default: ""
      repository:
        description: "Repository to checkout. Defaults to github.repository."
        type: string
        default: ""
      ref:
        description: "Branch, tag, or SHA to checkout. Defaults to the triggering ref."
        type: string
        default: ""
      test_amdgpu_family:
        description: "GPU family to run JAX tests on. Empty means skip tests."
        type: string
        default: ""
      test_size:
        description: "JAX test size to run."
        type: choice
        options:
          - small
          - medium
          - large
        default: small
run-name: Build Multi-Arch Linux JAX Wheels CI (${{ inputs.artifact_group }}, ${{ inputs.rocm_version }}, py${{ inputs.python_version }}, ${{ inputs.jax_ref }})
permissions:
  contents: read
  id-token: write

jobs:
  build_jax_wheels:
    name: Build JAX | ${{ inputs.artifact_group }} | jax ${{ inputs.jax_ref }} | py ${{ inputs.python_version }}
    runs-on: ${{ github.repository_owner == 'ROCm' && 'azure-linux-scale-rocm' || 'ubuntu-24.04' }}
    outputs:
      package_find_links_url: ${{ steps.upload_jax_wheels.outputs.package_find_links_url }}
      jax_version: ${{ steps.write_jax_versions.outputs.jax_version }}
      jaxlib_version: ${{ steps.write_jax_versions.outputs.jaxlib_version }}
      jax_plugin_version: ${{ steps.write_jax_versions.outputs.jax_plugin_version }}
      jax_pjrt_version: ${{ steps.write_jax_versions.outputs.jax_pjrt_version }}
    env:
      MANYLINUX_IMAGE_TAG: therock-jax-manylinux:${{ inputs.jax_ref }}-${{ inputs.python_version }}
      RELEASE_TYPE: ci
      PACKAGE_DIST_DIR: ${{ github.workspace }}/jax-source/dist

    steps:
      - name: Checkout TheRock
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}

      - name: Checkout rocm-jax
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: rocm-jax
          repository: ROCm/rocm-jax
          ref: ${{ inputs.jax_ref }}

      - name: Checkout JAX
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: jax-source
          repository: ${{ inputs.jax_repository }}
          ref: ${{ inputs.jax_ref }}


      - name: Configure Git Identity
        run: |
          git config --global user.name "therockbot"
          git config --global user.email "therockbot@amd.com"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install python deps for CI
        run: |
          pip install -r external-builds/jax/requirements-jax.txt

      - name: Validate CI build mode
        run: |
          if [ "${{ inputs.build_mode }}" != "manylinux" ]; then
            echo "Only build_mode=manylinux is supported by this CI workflow."
            exit 1
          fi

      - name: Build manylinux image
        working-directory: jax-source
        env:
          THEROCK_VERSION: ""
          GFX_ARCH: ${{ inputs.gfx_arch }}
          ROCM_PACKAGE_FIND_LINKS_URL: ${{ inputs.rocm_package_find_links_url }}
        run: |
          cp ../rocm-jax/docker/manylinux/Dockerfile.jax-manylinux_2_28-therock \
            Dockerfile.jax-manylinux_2_28-therock

          # TODO(#6388): Replace this per-run rocm-jax Dockerfile build with a
          # frozen/prebuilt CI image and refine when JAX CI should run.
          docker build \
            -t "${MANYLINUX_IMAGE_TAG}" \
            --file=Dockerfile.jax-manylinux_2_28-therock \
            --build-arg=THEROCK_INDEX_URL="${ROCM_PACKAGE_FIND_LINKS_URL}" \
            --build-arg=THEROCK_VERSION="${THEROCK_VERSION}" \
            --build-arg=GFX_ARCH="${GFX_ARCH}" \
            --progress=plain \
            .

      - name: Determine wheel version suffix
        run: |
          python build_tools/github_actions/determine_version.py \
            --rocm-version "${{ inputs.rocm_version }}"

      - name: Build JAX Wheels in manylinux container
        working-directory: jax-source
        env:
          ROCM_VERSION: ${{ inputs.rocm_version }}
          PYTHON_VERSION: ${{ inputs.python_version }}
        run: |
          docker run --rm \
            --user root \
            --env ROCM_VERSION="${ROCM_VERSION}" \
            --env PYTHON_VERSION="${PYTHON_VERSION}" \
            --env ML_WHEEL_VERSION_SUFFIX="${version_suffix}" \
            --env PACKAGE_DIST_DIR="/workspace/jax-source/dist" \
            --volume "${GITHUB_WORKSPACE}:/workspace" \
            --workdir /workspace/jax-source \
            "${MANYLINUX_IMAGE_TAG}" \
            bash -lc '
              python build/build.py build \
                --wheels=jax-rocm-plugin,jax-rocm-pjrt \
                --python_version="${PYTHON_VERSION}" \
                --bazel_startup_options=--bazelrc=build/rocm/rocm.bazelrc \
                --bazel_options=--config=rocm_release_wheel \
                --bazel_options=--repo_env=ROCM_PATH=$(rocm-sdk path --root) \
                --bazel_options=--repo_env=ML_WHEEL_TYPE=release \
                --bazel_options=--repo_env=ML_WHEEL_VERSION_SUFFIX="${ML_WHEEL_VERSION_SUFFIX}" \
                --bazel_options=--//jaxlib/tools:jaxlib_git_hash=$(git rev-parse HEAD) \
                --verbose \
                --detailed_timestamped_log \
                --output_path=$(pwd)/dist
            '

      - name: Extract JAX versions from built wheels
        id: write_jax_versions
        run: |
          python3 ./build_tools/github_actions/write_jax_versions.py \
            --dist-dir "${{ env.PACKAGE_DIST_DIR }}"

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure_aws_artifacts_credentials
        with:
          release_type: ci

      - name: Upload JAX wheels to CI artifacts
        id: upload_jax_wheels
        run: |
          python build_tools/github_actions/upload_python_packages.py \
            --input-packages-dir="${{ env.PACKAGE_DIST_DIR }}" \
            --artifact-group="${{ inputs.artifact_group }}" \
            --run-id="${{ github.run_id }}" \
            --multiarch

  generate_target_to_run:
    name: Generate target_to_run
    if: ${{ inputs.test_amdgpu_family != '' }}
    runs-on: ubuntu-24.04
    outputs:
      test_runs_on: ${{ steps.configure.outputs.test-runs-on }}
    steps:
      - name: Checking out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref_name }}

      - name: Checkout CI config
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ROCm/therock-ci-config
          ref: main
          path: ci-config
        continue-on-error: true

      - name: Generating target to run
        id: configure
        env:
          TARGET: ${{ inputs.test_amdgpu_family }}
          PLATFORM: linux
          CI_CONFIG_PATH: ci-config
        run: python ./build_tools/github_actions/configure_target_run.py

  test_jax_wheels:
    if: ${{ inputs.test_amdgpu_family != '' }}
    needs: [build_jax_wheels, generate_target_to_run]
    name: Test JAX wheels | ${{ inputs.test_size }} | py ${{ inputs.python_version }} | jax ${{ inputs.jax_ref }}
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/test_linux_jax_wheels_partial.yml
    with:
      test_amdgpu_family: ${{ inputs.test_amdgpu_family }}
      # CI builds publish wheels to a run-scoped find-links URL (not an index).
      wheel_find_links_url: ${{ needs.build_jax_wheels.outputs.package_find_links_url }}
      rocm_version: ${{ inputs.rocm_version }}
      rocm_package_find_links_url: ${{ inputs.rocm_package_find_links_url }}
      release_type: ci
      test_size: ${{ inputs.test_size }}
      python_version: ${{ inputs.python_version }}
      repository: ${{ inputs.repository || github.repository }}
      ref: ${{ inputs.ref }}
      jax_ref: ${{ inputs.jax_ref }}
      jax_version: ${{ needs.build_jax_wheels.outputs.jax_version }}
      jaxlib_version: ${{ needs.build_jax_wheels.outputs.jaxlib_version }}
      jax_plugin_version: ${{ needs.build_jax_wheels.outputs.jax_plugin_version }}
      jax_pjrt_version: ${{ needs.build_jax_wheels.outputs.jax_pjrt_version }}
      test_runs_on: ${{ needs.generate_target_to_run.outputs.test_runs_on }}
