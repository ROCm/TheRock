name: GPU Index Validation
on:
  push:
    branches:
      - validate-gpu-index

jobs:
  validate-gfx1030:
    runs-on: linux-shark39-gfx1030-gpu-rocm
    steps:
      - name: Check GPU env vars + arch
        run: |
          echo "HIP_VISIBLE_DEVICES=$HIP_VISIBLE_DEVICES"
          echo "ROCR_VISIBLE_DEVICES=$ROCR_VISIBLE_DEVICES"
          echo "GPU_DEVICE_ORDINAL=$GPU_DEVICE_ORDINAL"
          /opt/host-rocm/bin/rocminfo 2>&1 | grep -E "Name:.*gfx" || echo "no gfx found"

  validate-gfx1100:
    runs-on: linux-shark39-gfx1100-gpu-rocm
    steps:
      - name: Check GPU env vars + arch
        run: |
          echo "HIP_VISIBLE_DEVICES=$HIP_VISIBLE_DEVICES"
          echo "ROCR_VISIBLE_DEVICES=$ROCR_VISIBLE_DEVICES"
          echo "GPU_DEVICE_ORDINAL=$GPU_DEVICE_ORDINAL"
          /opt/host-rocm/bin/rocminfo 2>&1 | grep -E "Name:.*gfx" || echo "no gfx found"
