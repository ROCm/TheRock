name: GPU Index Validation
on:
  push:
    branches:
      - validate-gpu-index

jobs:
  validate-gfx1030:
    runs-on: prolense-shark39-gfx1030-scaleset-shark39
    steps:
      - name: Check GPU env vars + arch
        run: |
          echo "HIP_VISIBLE_DEVICES=$HIP_VISIBLE_DEVICES"
          echo "ROCR_VISIBLE_DEVICES=$ROCR_VISIBLE_DEVICES"
          echo "GPU_DEVICE_ORDINAL=$GPU_DEVICE_ORDINAL"
          rocminfo | grep "Name:" | grep gfx

  validate-gfx1100:
    runs-on: prolense-shark39-gfx1100-scaleset-shark39
    steps:
      - name: Check GPU env vars + arch
        run: |
          echo "HIP_VISIBLE_DEVICES=$HIP_VISIBLE_DEVICES"
          echo "ROCR_VISIBLE_DEVICES=$ROCR_VISIBLE_DEVICES"
          echo "GPU_DEVICE_ORDINAL=$GPU_DEVICE_ORDINAL"
          rocminfo | grep "Name:" | grep gfx
