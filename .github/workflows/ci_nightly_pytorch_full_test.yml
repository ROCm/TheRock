# Runs the full PyTorch unit-test suite against nightly wheels from v2-staging.
#
# Automatically tests all GPU families that have:
#   - A runner label (non-empty test-runs-on) in amdgpu_family_matrix.py
#   - The run-full-tests-only flag set to True
#
# To add a new GPU family to the full UT suite:
#   1. Set "run-full-tests-only": True on the family's platform entry in
#      amdgpu_family_matrix.py.
#   2. Optionally add the family to AMDGPU_FAMILY_TO_BUILD_ENV in
#      run_pytorch_tests_full.py for better shard balancing (falls back to
#      mi300 timings if absent).
#   3. Add family-specific test skips in skip_tests/ as needed.
#
# TODO: This schedule-based trigger assumes the nightly build has completed.
#       Neither is guaranteed — the build could fail or take longer than
#       expected, in which case this re-runs tests against the previous
#       nightly. Consider integrating into the existing build/release
#       workflows (build_portable_linux_pytorch_wheels.yml /
#       release_portable_linux_packages.yml) so tests only run after a
#       successful build, or use a workflow_dispatch trigger / Quartz.

name: CI Nightly PyTorch Full Test

on:
  schedule:
    - cron: "0 12 * * *" # 12:00 UTC, after nightly builds (~04:00 UTC) have completed
  workflow_dispatch:
    inputs:
      package_index_url:
        description: "Base package index URL (without GPU family subdir)"
        type: string
        default: "https://rocm.nightlies.amd.com/v2-staging"
      torch_version:
        description: "Torch version to test (leave empty to auto-detect latest nightly)"
        type: string
        default: ""
      pytorch_git_ref:
        description: "PyTorch git ref for test sources"
        type: string
        default: "nightly"
      pytorch_git_repo:
        description: "PyTorch git repo for test sources (Options: rocm/pytorch, pytorch/pytorch)"
        type: string
        default: "pytorch/pytorch"
      test_configs:
        description: "Space-separated test configs to run"
        type: string
        default: "default distributed inductor"
      python_version:
        description: "Python version"
        type: string
        default: "3.12"

permissions:
  contents: read

run-name: >-
  CI Nightly PyTorch Full Test
  (${{ inputs.pytorch_git_ref || 'nightly' }})

env:
  PACKAGE_INDEX_URL: ${{ inputs.package_index_url || 'https://rocm.nightlies.amd.com/v2-staging' }}
  TORCH_VERSION_INPUT: ${{ inputs.torch_version || '' }}
  PYTORCH_GIT_REF: ${{ inputs.pytorch_git_ref || 'nightly' }}
  PYTORCH_GIT_REPO: ${{ inputs.pytorch_git_repo || 'pytorch/pytorch' }}
  TEST_CONFIGS: ${{ inputs.test_configs || 'default distributed inductor' }}
  PYTHON_VERSION: ${{ inputs.python_version || '3.12' }}

jobs:
  generate_matrix:
    name: Generate GPU family matrix
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate matrix from amdgpu_family_matrix
        id: gen
        run: python build_tools/github_actions/generate_full_test_matrix.py --platform linux

  resolve_torch_version:
    needs: generate_matrix
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate_matrix.outputs.matrix) }}
    outputs:
      torch_version: ${{ steps.resolve.outputs.torch_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve latest nightly torch version
        id: resolve
        env:
          AMDGPU_FAMILY: ${{ matrix.amdgpu_family }}
        run: |
          pip install packaging

          python -c "
          import os, sys
          sys.path.insert(0, 'external-builds/pytorch')
          from pytorch_utils import resolve_torch_version

          torch_version_input = os.environ.get('TORCH_VERSION_INPUT', '')
          if torch_version_input:
              version = torch_version_input
              print(f'Using provided torch_version: {version}')
          else:
              family = os.environ['AMDGPU_FAMILY']
              index_url = os.environ['PACKAGE_INDEX_URL'] + '/' + family
              python_version = os.environ.get('PYTHON_VERSION', '')
              version = resolve_torch_version(
                  index_url=index_url,
                  python_version=python_version,
                  platform='linux_x86_64',
              )
              print(f'Resolved torch_version for {family}: {version}')

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'torch_version={version}\n')
          "

  run_full_tests:
    needs: [generate_matrix, resolve_torch_version]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate_matrix.outputs.matrix) }}
    uses: ./.github/workflows/test_pytorch_wheels_full.yml
    with:
      amdgpu_family: ${{ matrix.amdgpu_family }}
      test_runs_on: ${{ matrix.test_runs_on }}
      test_runs_on_multi_gpu: ${{ matrix.test_runs_on_multi_gpu }}
      package_index_url: ${{ inputs.package_index_url || 'https://rocm.nightlies.amd.com/v2-staging' }}
      python_version: ${{ inputs.python_version || '3.12' }}
      torch_version: ${{ needs.resolve_torch_version.outputs.torch_version }}
      pytorch_git_repo: ${{ inputs.pytorch_git_repo || 'pytorch/pytorch' }}
      pytorch_git_ref: ${{ inputs.pytorch_git_ref || 'nightly' }}
      test_configs: ${{ inputs.test_configs || 'default distributed inductor' }}
      tests_to_include: ""
