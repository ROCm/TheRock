name: Build Spack ROCm Packages

on:
  push:
    branches:
      - main
      - develop
      - 'stage/docker/**'
    paths:
      - dockerfiles/spack_ubuntu24_04.Dockerfile
      - dockerfiles/rocm-spack-env/**
      - .github/workflows/build_spack_rocm_packages.yml
  workflow_dispatch:
  schedule:
    # Run weekly on Mondays at 2 AM UTC
    - cron: "0 2 * * 1"

permissions:
  contents: read

jobs:
  build:
    name: Build Spack ROCm Container
    runs-on: aws-linux-scale-rocm-prod
    timeout-minutes: 1440
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build Docker Image
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: dockerfiles/
          file: dockerfiles/spack_ubuntu24_04.Dockerfile
          push: false
          tags: spack-rocm:latest

      - name: Report Summary
        if: always()
        run: |
          {
            echo "## Docker image build"
            if [[ "${{ steps.build.outcome }}" == "success" ]]; then
              echo "Docker image built successfully with ROCm packages installed via Spack."
            else
              echo "Build did not succeed. Check the **Build Docker Image** step logs."
            fi
          } | tee -a "$GITHUB_STEP_SUMMARY"
