# Reusable Workflow: Build Stage Artifacts
#
# This workflow builds TheRock stage artifacts for all stages.
# Handles both generic stages (compiler-runtime, profiler-apps, etc.) and
# per-arch stages (math-libs, comm-libs) using conditional logic.
#
# Artifacts flow between stages via S3 using the artifact_manager.py tool.
#
# TODO: When kpack splitting is permanently enabled, change fetch commands to use
# --generic-only instead of --amdgpu-families for efficiency. Subsequent build
# stages only need generic (host) artifacts; device-specific kpacks are not
# needed until final packaging.

name: Build Stage Artifacts

on:
  workflow_call:
    inputs:
      stage_name:
        type: string
        required: true
        description: "Stage name (e.g., compiler-runtime, math-libs)"
      stage_display_name:
        type: string
        required: true
        description: "Human-readable display name for the job"
      timeout_minutes:
        type: number
        required: true
        description: "Job timeout in minutes"
      amdgpu_family:
        type: string
        required: false
        default: ""
        description: "GPU family for per-arch stages (empty for generic stages)"
      dist_amdgpu_families:
        type: string
        required: true
        description: "Semicolon-separated list of all GPU families for dist targets"
      rocm_package_version:
        type: string
        required: true
        description: "ROCm package version string"
      build_variant_cmake_preset:
        type: string
        required: false
        default: ""
        description: "CMake preset name for this build variant (optional)"
      release_type:
        description: 'Release type; controls artifact bucket and IAM role'
        type: string
        default: ci
      build_runs_on:
        description: "Build runner label (selected by configure script with weighted distribution)"
        type: string
        default: "aws-linux-scale-rocm-prod"
      repository:
        description: "Repository to checkout. Defaults to github.repository."
        type: string
        default: ""
      ref:
        description: "Branch, tag, or SHA to checkout. Defaults to the triggering ref."
        type: string
        default: ""
      external_repo_config:
        description: "JSON config for external repo checkout (generated by detect_external_repo_config.py)"
        type: string
        default: ""
      cache_type:
        description: "Compiler cache type (sccache, ccache, or none)"
        type: string
        default: "sccache"

jobs:
  build_stage:
    name: ${{ inputs.stage_display_name }}
    runs-on: ${{ inputs.build_runs_on }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      id-token: write
    container:
      image: ghcr.io/rocm/therock_build_manylinux_x86_64@sha256:a382085df3ba2419b58aa9051350883a0d0b732a4bc0a4ef60458f8161bb08c6
      options: -v /runner/config:/home/awsconfig/
    env:
      AWS_SHARED_CREDENTIALS_FILE: /home/awsconfig/credentials.ini
      STAGE_NAME: ${{ inputs.stage_name }}
      AMDGPU_FAMILIES: ${{ inputs.amdgpu_family }}
      BUILD_DIR: build
      CCACHE_CONFIGPATH: ${{ github.workspace }}/.ccache/ccache.conf
      CACHE_DIR: ${{ github.workspace }}/.container-cache
      TEATIME_FORCE_INTERACTIVE: 0
      RELEASE_TYPE: ${{ inputs.release_type }}
      EXTERNAL_FETCH_SOURCES_ARGS: ${{ inputs.external_repo_config != '' && fromJSON(inputs.external_repo_config).fetch_sources_args || '' }}
      SCCACHE_BUCKET: "therock-sccache-${{ inputs.release_type }}"
      SCCACHE_REGION: us-east-1
      SCCACHE_S3_KEY_PREFIX: "linux/multiarch/v1/"
      SCCACHE_S3_USE_SSL: "true"
      SCCACHE_S3_SERVER_SIDE_ENCRYPTION: "true"
      # DIAGNOSTIC (#5901 math-libs non-cacheable investigation): capture the
      # exact commands sccache refuses so we can see whether "multiple input
      # files" comes from Tensile or another component. Remove after diagnosis.
      SCCACHE_LOG: debug
      SCCACHE_ERROR_LOG: /tmp/sccache-debug.log
      # VALIDATION (#748): record every per-TU -cuid the launcher injects so we
      # can confirm each translation unit gets a distinct id (no __hip_cuid_
      # collisions). Remove after validation.
      THEROCK_CUID_LOG: /tmp/cuid-injections.log

    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}

      - name: Checkout external repository
        if: ${{ inputs.external_repo_config != '' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ fromJSON(inputs.external_repo_config).repository }}
          ref: ${{ fromJSON(inputs.external_repo_config).ref }}
          path: ${{ fromJSON(inputs.external_repo_config).checkout_path }}

      - name: Install python deps
        run: pip install -r requirements.txt

      - name: Adjust git config
        run: |
          git config --global --add safe.directory $PWD
          git config fetch.parallel 10

      - name: Setup ccache
        run: |
          ./build_tools/setup_ccache.py \
            --release-type "${{ inputs.release_type }}" \
            --dir "$(dirname $CCACHE_CONFIGPATH)" \
            --local-path "$CACHE_DIR/ccache"

      - name: Setup sccache
        if: ${{ inputs.cache_type == 'sccache' }}
        run: |
          python build_tools/setup_sccache_rocm.py --gha

      - name: Runner health status
        run: |
          ./build_tools/health_status.py

      # Note: no AWS credentials should be needed here since our CI buckets
      # all currently have public read access.
      - name: Fetch inbound artifacts
        run: |
          python build_tools/artifact_manager.py fetch \
            --run-id=${{ github.run_id }} \
            --stage="${STAGE_NAME}" \
            --amdgpu-families="${{ inputs.amdgpu_family }}" \
            --output-dir="${BUILD_DIR}" \
            --bootstrap

      - name: Fetch sources
        timeout-minutes: 30
        run: ./build_tools/fetch_sources.py --stage ${STAGE_NAME} --jobs 12 --depth 1 ${EXTERNAL_FETCH_SOURCES_ARGS}

      - name: Get stage configuration
        id: stage_config
        run: |
          python build_tools/configure_stage.py \
            --stage="${STAGE_NAME}" \
            --amdgpu-families="${{ inputs.amdgpu_family }}" \
            --dist-amdgpu-families="${{ inputs.dist_amdgpu_families }}" \
            --manylinux \
            --gha-output

      - name: Install stage python deps
        if: ${{ steps.stage_config.outputs.pip_install_cmd }}
        run: pip install ${{ steps.stage_config.outputs.pip_install_cmd }}

      - name: Configure AWS Credentials for sccache
        if: ${{ inputs.cache_type == 'sccache' && github.repository_owner == 'ROCm' }}
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::324352301041:role/therock-${{ inputs.release_type }}
          role-duration-seconds: 21600

      - name: Configure
        run: |
          COMPILER_LAUNCHER_ARGS=""
          if [ "${{ inputs.cache_type }}" = "sccache" ]; then
            # Route CMake-driven compiles through the per-TU -cuid launcher ahead
            # of sccache so RDC objects don't collide on __hip_cuid_ under caching
            # (ROCm/TheRock#748). The wrapper finds sccache via THEROCK_SCCACHE
            # (written to $GITHUB_ENV by setup_sccache_rocm.py --gha).
            CUID_LAUNCHER="${PWD}/build_tools/cuid_launcher.py"
            COMPILER_LAUNCHER_ARGS="-DCMAKE_C_COMPILER_LAUNCHER=${CUID_LAUNCHER} -DCMAKE_CXX_COMPILER_LAUNCHER=${CUID_LAUNCHER}"
          elif [ "${{ inputs.cache_type }}" = "ccache" ]; then
            COMPILER_LAUNCHER_ARGS="-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache"
          fi
          # Disable unity/jumbo builds so sccache can cache individual compilations.
          # Unity builds pass multiple source files per compiler invocation, which
          # sccache cannot cache (reported as "Non-cacheable: multiple input files").
          cmake -B "${BUILD_DIR}" -S . -GNinja \
            -DTHEROCK_PACKAGE_VERSION=${{ inputs.rocm_package_version }} \
            ${COMPILER_LAUNCHER_ARGS} \
            -DCMAKE_UNITY_BUILD=OFF \
            -DCMAKE_DISABLE_PRECOMPILE_HEADERS=ON \
            ${{ inputs.build_variant_cmake_preset && format('--preset={0}', inputs.build_variant_cmake_preset) }} \
            ${{ inputs.external_repo_config != '' && format('-DTHEROCK_{0}_SOURCE_DIR={1}', fromJSON(inputs.external_repo_config).source_package, fromJSON(inputs.external_repo_config).checkout_path) || '' }} \
            ${{ steps.stage_config.outputs.cmake_args }}

      - name: Build stage
        run: |
          # DIAGNOSTIC (#5901): restart the sccache server so it inherits
          # SCCACHE_LOG=debug + SCCACHE_ERROR_LOG and logs every cacheability
          # decision (the --gha setup does not start the server). Remove later.
          if [ "${{ inputs.cache_type }}" = "sccache" ]; then
            sccache --stop-server >/dev/null 2>&1 || true
            sccache --start-server || true
          fi
          cmake --build "${BUILD_DIR}" --target stage-${STAGE_NAME} therock-artifacts -- -k 0

      - name: Generate failed log summaries
        if: ${{ !cancelled() }}
        run: |
          python3 build_tools/github_actions/detect_failed_logs.py

      - name: Run build tests
        if: ${{ !cancelled() && inputs.stage_name == 'compiler-runtime' }}
        continue-on-error: true
        env:
          TEATIME_FORCE_INTERACTIVE: 1
        run: |
          cmake --build "${BUILD_DIR}" --target therock-build-tests -- -k 0

      - name: Report
        if: ${{ !cancelled() }}
        run: |
          if [ "${{ inputs.cache_type }}" = "sccache" ]; then
            echo "Sccache Stats:"
            sccache --show-stats || true
          elif [ "${{ inputs.cache_type }}" = "ccache" ]; then
            echo "CCache Stats:"
            ccache -s -v
          fi
          echo "Artifacts:"
          ls -lh "${BUILD_DIR}"/artifacts/*.tar.xz 2>/dev/null || echo "No artifacts found"

      # DIAGNOSTIC (#5901): surface the exact non-cacheable compile commands.
      # Remove after diagnosis.
      - name: Dump sccache non-cacheable commands
        if: ${{ !cancelled() && inputs.cache_type == 'sccache' }}
        run: |
          LOG="/tmp/sccache-debug.log"
          echo "=== sccache-debug.log size ==="; ls -lh "$LOG" 2>/dev/null || { echo "no debug log"; exit 0; }
          echo "=== non-cacheable reason lines (unique, top 40) ==="
          grep -aiE 'CannotCache|not cacheable|multiple input files|UnknownFlag' "$LOG" \
            | sed -E 's/[0-9]{4}-[0-9]{2}-[0-9]{2}T[^ ]+//; s#/tmp/[A-Za-z0-9._-]+#/tmp/X#g' \
            | sort | uniq -c | sort -rn | head -40
          echo "=== first 15 full non-cacheable command lines (verbatim) ==="
          grep -aiE 'CannotCache|not cacheable|multiple input files' "$LOG" | head -15

      # VALIDATION (#748): confirm the launcher gave every HIP TU a distinct
      # -cuid (injection count == unique-cuid count => no collisions).
      - name: Dump injected -cuid values
        if: ${{ !cancelled() && inputs.cache_type == 'sccache' }}
        run: |
          LOG="/tmp/cuid-injections.log"
          if [ ! -f "$LOG" ]; then echo "no -cuid injections logged"; exit 0; fi
          echo "=== total -cuid injections ==="; wc -l < "$LOG"
          echo "=== unique cuid ids (== total => no collisions) ==="; cut -f1 "$LOG" | sort -u | wc -l
          echo "=== duplicated cuid ids (should be empty) ==="
          cut -f1 "$LOG" | sort | uniq -d | head
          echo "=== sample injections (first 15) ==="; head -15 "$LOG"

      - name: Test Packaging
        run: |
          ctest --test-dir ${BUILD_DIR} --output-on-failure

      - name: Configure AWS credentials for artifact uploads
        if: ${{ always() }}
        uses: ./.github/actions/configure_aws_artifacts_credentials
        with:
          release_type: ${{ inputs.release_type }}

      # TODO(#3336): Attempt upload `always()`?
      #   * If some part of the build failed, partial artifacts may be useful for debugging.
      #   * This script fails if `build_dir / "artifacts"` does not exist. That's useful
      #     if the build succeeded but did not produce artifacts. That's _not_ useful
      #     if the workflow failed or was cancelled before the build even started though.
      - name: Push stage artifacts
        run: |
          python build_tools/artifact_manager.py push \
            --run-id ${{ github.run_id }} \
            --stage="${STAGE_NAME}" \
            --build-dir="${BUILD_DIR}"

      - name: Upload stage logs
        if: ${{ always() }}
        run: |
          python build_tools/github_actions/post_stage_upload.py \
            --run-id=${{ github.run_id }} \
            --stage="${STAGE_NAME}" \
            --build-dir="${BUILD_DIR}" \
            --amdgpu-family="${AMDGPU_FAMILIES}"
