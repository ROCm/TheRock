# Dispatches CI events to the Quartz repository for ingestion into DB

name: Notify Quartz

on:
  workflow_run:
    workflows:
      # - "Build Native Linux Packages"
      # - "Build Portable Linux Artifacts"
      # - "Build Portable Linux JAX Wheels"
      # - "Build Portable Linux PyTorch Wheels"
      # - "Build Portable Linux PyTorch Wheels (CI)"
      # - "Build Portable Linux Python Packages"
      # - "Build Stage Artifacts"
      # - "Build Windows Artifacts"
      # - "Build Windows PyTorch Wheels"
      # - "Build Windows PyTorch Wheels (CI)"
      # - "Build Windows Python Packages"
      # - "Bump Submodule automation"
      # - "CI"
      # - "CI - Linux"
      # - "CI - Windows"
      # - "CI ASAN"
      # - "CI Nightly"
      # - "CI TSAN"
      # - "Copy release to dev bucket"
      # - "Hip tagging automation"
      # - "Multi-Arch Build (Linux)"
      # - "Multi-Arch Build (Windows)"
      # - "Multi-Arch CI"
      # - "Multi-Arch CI - Linux"
      # - "Multi-Arch CI - Windows"
      # - "Publish build_manylinux_rccl_x86_64 images"
      # - "Publish build_manylinux_x86_64 images"
      # - "Publish no_rocm_image_ubuntu24_04 images"
      # - "Publish no_rocm_image_ubuntu24_04_ocl_rt images"
      # - "Publish no_rocm_image_ubuntu24_04_rocgdb images"
      # - "Publish TheRock Docker image"
      # - "Release native Linux Packages"
      # - "Release portable Linux JAX Wheels"
        - "Release portable Linux packages"
      # - "Release portable Linux PyTorch Wheels"
        - "Release Windows packages"
      # - "Release Windows PyTorch Wheels"
      # - "Setup"
      # - "Test Artifact Structure"
      # - "Test Artifacts"
      # - "Test Benchmarks"
      # - "Test component"
      # - "Test JAX Wheels"
      # - "Test Linux JAX Wheels"
      # - "Test PyTorch Wheels"
      # - "Test PyTorch Wheels (Full Suite)"
      # - "Test ROCm Wheels"
      # - "TheRock Manifest Diff Report"
      # - "TheRock Test Harness"
      # - "Unit Tests"
      # - "WIP Placeholder CI Weekly"
      # - "pre-commit"
    types: [requested, completed]
  pull_request:
    types: [opened, closed, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      quartz_repo:
        description: "Target Quartz repository (owner/repo)"
        type: string
        default: "ROCm/Quartz"
      quartz_workflow_ref:
        description: "Branch in Quartz repo where the ingest workflow lives"
        type: string
        default: "feat/ingestion"

permissions:
  contents: read
  actions: read
  checks: read

env:
  QUARTZ_REPO: ${{ inputs.quartz_repo || 'cgoea/Quartz' }}
  QUARTZ_WORKFLOW_REF: ${{ inputs.quartz_workflow_ref || 'feat/ingestion' }}

jobs:
  notify:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      # - name: Generate GitHub App token
      #   id: app-token
      #   uses: actions/create-github-app-token@2e564a0bb8e7cc2b907b2401a2afe177882d4325 # v3.0.0
      #   with:
      #     app-id: ${{ secrets.GH_APP_HAULY_ID }}
      #     private-key: ${{ secrets.GH_APP_HAULY_PRIVATE_KEY }}
      #     owner: "ROCm"

      - name: Dispatch event to Quartz
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          # github-token: ${{ steps.app-token.outputs.token }}
          github-token: ${{ secrets.QUARTZ_FORK_TEST_ONLY_CGOEA }}
          script: |
            const [owner, repo] = process.env.QUARTZ_REPO.split('/');
            const eventName = context.eventName;
            const fullRepo = `${context.repo.owner}/${context.repo.repo}`;
            let eventType, clientPayload;

            if (eventName === 'workflow_run') {
              const wr = context.payload.workflow_run;
              const action = context.payload.action;
              eventType = `workflow_run_${action}`;

              // Fetch full run details for inputs and metadata not in webhook payload
              let inputs = {};
              let referencedWorkflows = [];
              let checkSuiteId = null;
              try {
                const { data: runData } = await github.rest.actions.getWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: wr.id,
                });
                inputs = runData.inputs || {};
                referencedWorkflows = (runData.referenced_workflows || []).map(rw => ({
                  path: rw.path,
                  sha: rw.sha,
                  ref: rw.ref,
                }));
                checkSuiteId = runData.check_suite_id || null;
              } catch (e) {
                core.warning(`Failed to fetch run details: ${e.message}`);
              }

              // Fetch jobs to capture matrix/job names (including dynamic matrices).
              // Only meaningful for completed runs — on "requested" the jobs
              // (especially dynamic matrix expansions) don't exist yet.
              let jobs = [];
              if (action === 'completed') {
                try {
                  for (let page = 1; ; page++) {
                    const { data: jobsData } = await github.rest.actions.listJobsForWorkflowRun({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      run_id: wr.id,
                      per_page: 100,
                      page,
                    });
                    const batch = jobsData.jobs || [];
                    for (const j of batch) {
                      jobs.push({
                        id: j.id,
                        name: j.name,
                        status: j.status,
                        conclusion: j.conclusion,
                      });
                    }
                    if (batch.length < 100) break;
                  }
                } catch (e) {
                  core.warning(`Failed to fetch jobs: ${e.message}`);
                }
              }

              // Fetch job summaries ($GITHUB_STEP_SUMMARY content) via check runs.
              // Each Actions job is a check run; summaries live in output.summary.
              // Capped to stay within the ~65KB repository_dispatch payload limit.
              if (jobs.length > 0 && checkSuiteId) {
                const TOTAL_CAP = 49152;
                try {
                  const summaryMap = new Map();
                  for (let page = 1; ; page++) {
                    const { data: crData } = await github.rest.checks.listForSuite({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      check_suite_id: checkSuiteId,
                      per_page: 100,
                      page,
                    });
                    for (const cr of (crData.check_runs || [])) {
                      if (cr.output && cr.output.summary) {
                        summaryMap.set(cr.id, cr.output.summary);
                      }
                    }
                    if ((crData.check_runs || []).length < 100) break;
                  }
                  let totalSize = 0;
                  for (const job of jobs) {
                    const raw = summaryMap.get(job.id);
                    if (!raw) continue;
                    const remaining = TOTAL_CAP - totalSize;
                    if (remaining <= 0) {
                      core.warning('Total summary size exceeded limit, skipping remaining');
                      break;
                    }
                    if (raw.length <= remaining) {
                      job.summary = raw;
                      totalSize += raw.length;
                    } else {
                      job.summary = raw.substring(0, remaining) + '\n...[truncated]';
                      totalSize = TOTAL_CAP;
                      core.warning('Summary truncated to fit payload limit');
                      break;
                    }
                  }
                } catch (e) {
                  core.warning(`Failed to fetch job summaries: ${e.message}`);
                }
              }

              // Extract structured metrics from THEROCK_METRICS HTML comments
              // embedded in job summaries by emit_build_metrics.py.
              const metricsRe = /<!--\s*THEROCK_METRICS\s+(\{.*?\})\s*-->/g;
              for (const job of jobs) {
                if (!job.summary) continue;
                const allMetrics = {};
                let m;
                while ((m = metricsRe.exec(job.summary)) !== null) {
                  try { Object.assign(allMetrics, JSON.parse(m[1])); }
                  catch (_) {}
                }
                metricsRe.lastIndex = 0;
                if (Object.keys(allMetrics).length > 0) {
                  job.metrics = allMetrics;
                }
              }

              // Lucky solution to detect parent workflow via shared check suite.
              let parentWorkflow = null;
              if (checkSuiteId) {
                try {
                  const { data: suiteRuns } = await github.rest.actions.listWorkflowRunsForRepo({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    check_suite_id: checkSuiteId,
                    per_page: 10,
                  });
                  const parent = (suiteRuns.workflow_runs || []).find(r => r.id !== wr.id);
                  if (parent) {
                    parentWorkflow = {
                      id: parent.id,
                      name: parent.name,
                      workflow_id: parent.workflow_id,
                      path: parent.path,
                      event: parent.event,
                      html_url: parent.html_url,
                      status: parent.status,
                      conclusion: parent.conclusion,
                    };
                  }
                } catch (e) {
                  core.warning(`Failed to detect parent workflow: ${e.message}`);
                }
              }

              clientPayload = {
                event_type: eventType,
                repository: fullRepo,
                workflow_run: {
                  id: wr.id,
                  name: wr.name,
                  display_title: wr.display_title,
                  path: wr.path,
                  workflow_id: wr.workflow_id,
                  status: wr.status,
                  conclusion: wr.conclusion,
                  event: wr.event,
                  head_branch: wr.head_branch,
                  head_sha: wr.head_sha,
                  run_number: wr.run_number,
                  run_attempt: wr.run_attempt,
                  html_url: wr.html_url,
                  created_at: wr.created_at,
                  updated_at: wr.updated_at,
                  run_started_at: wr.run_started_at,
                  actor: wr.actor ? { login: wr.actor.login, id: wr.actor.id } : null,
                  triggering_actor: wr.triggering_actor
                    ? { login: wr.triggering_actor.login, id: wr.triggering_actor.id }
                    : null,
                  pull_requests: (wr.pull_requests || []).map(pr => ({
                    number: pr.number,
                    head: { ref: pr.head.ref, sha: pr.head.sha },
                    base: { ref: pr.base.ref, sha: pr.base.sha },
                  })),
                  inputs: inputs,
                  release_type: inputs.release_type || null,
                  jobs: jobs,
                  parent_workflow: parentWorkflow,
                  referenced_workflows: referencedWorkflows,
                },
              };

            } else if (eventName === 'pull_request') {
              const pr = context.payload.pull_request;
              eventType = 'pull_request_event';
              clientPayload = {
                event_type: eventType,
                repository: fullRepo,
                action: context.payload.action,
                pull_request: {
                  id: pr.id,
                  number: pr.number,
                  state: pr.state,
                  title: pr.title,
                  draft: pr.draft,
                  merged: pr.merged,
                  merge_commit_sha: pr.merge_commit_sha,
                  head: { ref: pr.head.ref, sha: pr.head.sha },
                  base: { ref: pr.base.ref, sha: pr.base.sha },
                  user: pr.user ? { login: pr.user.login } : null,
                  created_at: pr.created_at,
                  updated_at: pr.updated_at,
                  closed_at: pr.closed_at,
                  merged_at: pr.merged_at,
                  additions: pr.additions,
                  deletions: pr.deletions,
                  changed_files: pr.changed_files,
                  commits: pr.commits,
                },
              };

            } else if (eventName === 'push') {
              const p = context.payload;
              eventType = 'push_event';
              clientPayload = {
                event_type: eventType,
                repository: fullRepo,
                ref: p.ref,
                before: p.before,
                after: p.after,
                forced: p.forced || false,
                pusher: p.pusher || {},
                head_commit: p.head_commit
                  ? { timestamp: p.head_commit.timestamp }
                  : null,
                commits: (p.commits || []).map(c => ({
                  id: c.id,
                  timestamp: c.timestamp,
                })),
              };

            } else if (eventName === 'workflow_dispatch') {
              eventType = 'workflow_dispatch_test';
              clientPayload = {
                event_type: eventType,
                repository: fullRepo,
                triggered_by: context.actor,
                timestamp: new Date().toISOString(),
              };

            } else {
              core.info(`Unhandled event: ${eventName}, skipping dispatch.`);
              return;
            }

            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id: 'ingest_manual.yml',
              ref: process.env.QUARTZ_WORKFLOW_REF,
              inputs: {
                payload_json: JSON.stringify(clientPayload),
                fetch_jobs: 'true',
              },
            });
            core.info(`Dispatched workflow_dispatch to ${process.env.QUARTZ_REPO} (ref: ${process.env.QUARTZ_WORKFLOW_REF})`);