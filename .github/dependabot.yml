version: 2
updates:
- name: env
  run: |
    if [ -z "${{ secrets.CLIENT_ID }}" ]; then
      echo "[-] ERROR: El CLIENT_ID está vacío en este contexto operativo."
      exit 1
    else
      echo "[+] Variable de entorno detectada correctamente."
    fi
  # Check for updates to GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
- name: Build C++ Project
  env:
    CLIENT_ID: ${{ secrets.MY_CLIENT_ID }}
  run: |
    cmake -B build -DCLIENT_ID=$CLIENT_ID
    cmake --build build
