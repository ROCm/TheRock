# Spack environment for ROCm
# Packages are added dynamically at build time via: spack list -t rocm

spack:
  packages:
    all:
      require:
        - "%gcc"
      target: [x86_64]
      prefer:
        - ~cuda
        - +rocm
        - amdgpu_target=gfx90a
    opengl:
      buildable: false
  compilers:
    - compiler:
        spec: gcc@13
        paths:
          cc: /usr/bin/gcc
          cxx: /usr/bin/g++
          f77: /usr/bin/gfortran
          fc: /usr/bin/gfortran
        flags: {}
        operating_system: ubuntu24.04
        target: x86_64
        modules: []
        environment: {}
        extra_rpaths: []

  concretizer:
    reuse: true

  mirrors:
    spack-public:
      url: https://binaries.spack.io/releases/latest
      signed: false
    spack-source:
      url: https://mirror.spack.io/
      binary: false

  config:
    install_tree:
      root: /home/spack/spack-install
    build_stage: /home/spack/spack-stage
    source_cache: /home/spack/spack-cache


  view:
    default:
      root: /home/spack/spack-view
      link: roots

  specs:
  - amdsmi@develop
  - comgr@develop
  - composable-kernel@develop
  - hip@develop
  - hipblas@develop
  - hipblas-common@develop
  - hipblaslt@develop
  - hipcub@develop
  - hipdnn@develop
  - hipfft@develop
  - hipify-clang@develop
  - hiprand@develop
  - hipsolver@develop
  - hipsparse@develop
  - hipsparselt@develop
  - hsa-rocr-dev@develop
  - hsa-amd-aqlprofile@develop
  - llvm-amdgpu@develop
  - miopen-hip@develop
  - rccl@develop
  - rocblas@develop
  - rocdecode@develop
  - rocm-cmake@develop
  - rocm-core@develop
  - rocm-smi-lib@develop
  - rocfft@develop
  - rocminfo@develop
  - rocmlir@develop
  - rocprim@develop
  - rocprofiler-compute@develop
  - rocprofiler-dev@develop
  - rocprofiler-register@develop
  - rocprofiler-sdk@develop
  - rocprofiler-systems@develop
  - rocrand@develop
  - rocsolver@develop
  - rocsparse@develop
  - rocthrust@develop
  - roctracer-dev@develop
  - roctracer-dev-api@develop
