[options]
unmatched_exclude = [
  "lib/llvm/lib/objects-*/**",
]

[components.lib."core/amd-llvm-offload/stage"]
include = [
  "lib/llvm/lib/libomp.so*",
  "lib/llvm/lib/libomptarget.so*",
  "lib/llvm/lib/libomptarget*.bc",
  "lib/llvm/lib/amdgcn-amd-amdhsa/**",
  "lib/llvm/lib/clang/**/lib/amdgcn-amd-amdhsa/**",
  "lib/llvm/lib/clang/**/lib/x86_64-unknown-linux-gnu/libflang_rt*",
]
force_include = [
  "lib/llvm/lib/clang/**",
]

[components.run."core/amd-llvm-offload/stage"]
include = [
  "lib/llvm/bin/**",
]

[components.dev."core/amd-llvm-offload/stage"]
include = [
  "lib/llvm/include/flang/**",
  "lib/llvm/include/flang-rt/**",
  "lib/llvm/lib/cmake/openmp/**",
]

[components.dbg."core/amd-llvm-offload/stage"]

[components.doc."core/amd-llvm-offload/stage"]
