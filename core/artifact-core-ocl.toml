# ocl-clr
[components.lib."core/ocl-clr/stage"]
include = [
  "etc/**",
]
# ocltst libs/dlls belong to ocl_test package
exclude = [
  "bin/*oclgl*",
  "bin/*oclperf*",
  "bin/*oclruntime*",
]
[components.run."core/ocl-clr/stage"]
include = [
  "bin/clinfo*",
]
[components.dbg."core/ocl-clr/stage"]
[components.dev."core/ocl-clr/stage"]
[components.doc."core/ocl-clr/stage"]
[components.test."core/ocl-clr/stage"]
include = [
  "bin/ocltst*",
  "bin/*oclgl*",
  "bin/*oclperf*",
  "bin/*oclruntime*",
]
